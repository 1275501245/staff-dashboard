<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving SOP · Mini Hot Pot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#F5F0E8;color:#1a1a1a;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:1.25rem 1rem 4rem}
.topbar{display:flex;align-items:center;margin-bottom:1.25rem}
.back{display:flex;align-items:center;gap:4px;font-size:13px;color:#666;text-decoration:none}
.back svg{width:16px;height:16px}
.header{border-bottom:1.5px solid #2C2C2A;padding-bottom:12px;margin-bottom:20px}
.header h1{font-size:20px;font-weight:700;color:#2C2C2A;letter-spacing:-0.3px;line-height:1.3}
.header .sub{font-size:12px;color:#888780;margin-top:4px}

.card{margin:0 auto 12px;background:#fff;border-radius:14px;border:0.5px solid #D3D1C7;overflow:hidden}
.card-header{padding:12px 18px;display:flex;align-items:center;gap:12px}
.card-header h2{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.1px}
.step-badge{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}

.block{padding:14px 18px}
.block+.block{border-top:1px solid rgba(0,0,0,0.05)}
.block-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}

.rule-list{list-style:none}
.rule-list li{display:flex;align-items:flex-start;gap:10px;padding:5px 0;font-size:13px;color:#2C2C2A;line-height:1.5;border-bottom:0.5px solid rgba(0,0,0,0.05)}
.rule-list li:last-child{border-bottom:none}
.rule-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:6px}

.alert-box{border-radius:8px;padding:10px 14px;font-size:12px;font-weight:600;line-height:1.5;margin-top:2px}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="/sop" class="back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
      Back
    </a>
  </div>
  <div class="header" id="hdr"></div>
  <main id="cards"></main>
</div>

<script>
const SHEET_ID = "189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc";
const SHEET_NAME = "ReceivingSOP";

/* Fallback — used only if the live sheet is unreachable. Mirrors the sheet. */
const FALLBACK = [
  ['PAGE','','','','Goods Receiving — Photo Checklist','5 required photo types on every delivery'],
  ['CARD','goods','1','#2C5F8A','Goods Photo',''],
  ['BLOCK','goods','','','Requirements',''],
  ['RULE','goods','','','Photograph **all** incoming goods upon arrival.',''],
  ['RULE','goods','','','Items must **not be covered or obstructed** — product type and quantity must be clearly identifiable in the photo.',''],
  ['CARD','note','2','#3B6D11','Delivery Note Photo',''],
  ['BLOCK','note','','','Requirements',''],
  ['RULE','note','','','All items on the delivery note must be **ticked off** before signing.',''],
  ['RULE','note','','',"Receiver's **name must be written** on the note before taking the photo.",''],
  ['CARD','temp','3','#993C1D','Frozen Goods Temperature Photo',''],
  ['BLOCK','temp','','','Requirements',''],
  ['RULE','temp','','','Frozen goods temperature must be **below −15°C**.',''],
  ['RULE','temp','','','**3 or fewer** frozen product types — randomly check and photograph **1 item**.',''],
  ['RULE','temp','','','**More than 3** frozen product types — randomly check and photograph **3 items**.',''],
  ['ALERT','temp','','','⚠️ Temperature probe must be visible and reading must be clearly legible in the photo.',''],
  ['CARD','weigh','4','#6B4E9B','Re-weighing Photo',''],
  ['BLOCK','weigh','','','When to apply',''],
  ['RULE','weigh','','','Applies to **fresh produce sold by weight** where the packaging does not state a specific quantity — primarily **Pak Choi**.',''],
  ['BLOCK','weigh','','','How to photograph',''],
  ['RULE','weigh','','','Place the item **including its packaging box** on the digital scale.',''],
  ['RULE','weigh','','','Photograph the scale display showing the **weight in grams**.',''],
  ['CARD','quality','5','#BA7517','Quality Check Photo',''],
  ['BLOCK','quality','','','What to check',''],
  ['RULE','quality','','','**Cabbage** — check for excessive black spots.',''],
  ['RULE','quality','','','**Pak Choi** — check for excessive rotten or damaged leaves.',''],
  ['RULE','quality','','','**All other fresh produce** — check for any obvious quality issues.',''],
  ['ALERT','quality','','','⚠️ If any quality issue is found — photograph and report to management **on the same day as delivery**, without delay.','']
].map(r=>({type:r[0],card:r[1],step:r[2],color:r[3],text:r[4],sub:r[5]}));

const $ = s=>document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const md = s => esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');   // **bold** → <b>
function lighten(hex,amt){ // mix with white; amt 0..1 (higher = lighter)
  hex=hex.replace('#',''); if(hex.length!==6) return '#F5F5F5';
  const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  const m=v=>Math.round(v+(255-v)*amt);
  const h=v=>('0'+v.toString(16)).slice(-2);
  return '#'+h(m(r))+h(m(g))+h(m(b));
}

function parseCSV(text){
  const rows=[]; let row=[],field="",i=0,inQ=false;
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  while(i<text.length){const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue;} field+=ch;i++;continue; }
    else { if(ch==='"'){inQ=true;i++;continue;} if(ch===','){row.push(field);field="";i++;continue;}
      if(ch==='\r'){i++;continue;} if(ch==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;} field+=ch;i++;continue; }
  }
  row.push(field); rows.push(row);
  return rows.filter(r=>r.length>1||(r[0]&&r[0].trim()!==""));
}

async function loadLive(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1&t=${Date.now()}`;
  const rows=parseCSV(await (await fetch(url,{cache:"no-store"})).text()); const out=[];
  for(const c of rows){
    const type=(c[0]||"").trim();
    if(!type || type.toLowerCase()==="type") continue;
    out.push({type, card:(c[1]||"").trim(), step:(c[2]||"").trim(), color:(c[3]||"").trim(), text:(c[4]||"").trim(), sub:(c[5]||"").trim()});
  }
  if(!out.length) throw new Error("no rows");
  return out;
}

function build(rows){
  let page={title:"Goods Receiving — Photo Checklist",sub:""};
  const cards=[], map={};
  rows.forEach(r=>{
    if(r.type==="PAGE"){ page={title:r.text,sub:r.sub}; }
    else if(r.type==="CARD"){ const cd={key:r.card,step:r.step,color:r.color||'#555',title:r.text,blocks:[]}; map[r.card]=cd; cards.push(cd); }
    else if(r.type==="BLOCK"){ const cd=map[r.card]; if(cd) cd.blocks.push({label:r.text,rules:[],alert:false}); }
    else if(r.type==="RULE"){ const cd=map[r.card]; if(cd){ if(!cd.blocks.length||cd.blocks[cd.blocks.length-1].alert) cd.blocks.push({label:'',rules:[],alert:false}); cd.blocks[cd.blocks.length-1].rules.push(r.text); } }
    else if(r.type==="ALERT"){ const cd=map[r.card]; if(cd) cd.blocks.push({alert:true,text:r.text}); }
  });
  return {page,cards};
}

function render(model){
  $("#hdr").innerHTML = `<h1>${esc(model.page.title)}</h1>${model.page.sub?`<div class="sub">${esc(model.page.sub)}</div>`:""}`;
  $("#cards").innerHTML = model.cards.map(cd=>{
    const blocks = cd.blocks.map((bl,i)=>{
      if(bl.alert){
        return `<div class="block" style="background:${lighten(cd.color,0.90)};">
          <div class="alert-box" style="background:#fff;border:1px solid ${lighten(cd.color,0.6)};color:${cd.color};">${md(bl.text)}</div></div>`;
      }
      const items = bl.rules.map(t=>`<li><span class="rule-dot" style="background:${cd.color};"></span><span>${md(t)}</span></li>`).join("");
      const tint = i%2===0 ? lighten(cd.color,0.93) : lighten(cd.color,0.90);
      return `<div class="block" style="background:${tint};">
        ${bl.label?`<div class="block-label" style="color:${cd.color};">${esc(bl.label)}</div>`:""}
        <ul class="rule-list">${items}</ul></div>`;
    }).join("");
    return `<div class="card">
      <div class="card-header" style="background:${cd.color};"><div class="step-badge">${esc(cd.step)}</div><h2>${esc(cd.title)}</h2></div>
      ${blocks}
    </div>`;
  }).join("");
}

async function init(){
  let rows; try{ rows=await loadLive(); }catch(e){ rows=FALLBACK.slice(); }
  render(build(rows));
}
init();
</script>
</body>
</html>
