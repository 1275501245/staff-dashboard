<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Management</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f3f0;
  color: #1a1917;
  padding: 16px;
  padding-bottom: 40px;
}

.header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid #e0ddd8; background: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #555; flex-shrink: 0; text-decoration: none;
}
.header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-text p  { font-size: 12px; color: #888; margin-top: 1px; }

.section-card {
  background: #fff; border: 1.5px solid #e8e6e1;
  border-radius: 14px; margin-bottom: 10px; overflow: hidden;
}

.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 16px; gap: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.sec-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.sec-count { font-size: 12px; color: #aaa; margin-top: 2px; }

.chevron {
  width: 22px; height: 22px; flex-shrink: 0; color: #aaa;
  transition: transform 0.25s ease;
}
.section-card.open .chevron { transform: rotate(90deg); }

.sec-body {
  display: none;
  border-top: 1px solid #f0ece6;
  padding: 4px 16px 16px;
}
.section-card.open .sec-body { display: block; }

.category-block { margin-top: 14px; }
.category-block:first-child { margin-top: 12px; }
.category-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: #888; margin-bottom: 6px;
}

.item-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 0;
  font-size: 13.5px; line-height: 1.55; color: #333;
}
.item-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; flex-shrink: 0; margin-top: 8px; }

/* Script-style rendering for Customer Note Template / Phone Script */
.script-block {
  background: #f8f6f2; border-left: 3px solid #1a1917;
  border-radius: 0 8px 8px 0; padding: 10px 12px; margin-bottom: 10px;
}
.script-block .category-label { color: #7a6f5f; margin-bottom: 8px; }
.script-line {
  font-size: 13.5px; line-height: 1.65; color: #333; padding: 2px 0;
}

.status-block {
  border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
  border-left: 3px solid transparent;
}
.status-block.finished { background: #FAECE7; border-left-color: #D85A30; }
.status-block.almost   { background: #FAEEDA; border-left-color: #BA7517; }
.status-block.neutral  { background: #F1EFE8; border-left-color: #888780; }
.status-block.panda    { background: #FFF6D6; border-left-color: #E6B800; }
.status-block.deliveroo{ background: #E1F5EE; border-left-color: #1D9E75; }
.status-label {
  font-size: 12px; font-weight: 700; margin-bottom: 6px;
}
.status-block.finished .status-label { color: #712B13; }
.status-block.almost .status-label   { color: #633806; }
.status-block.neutral .status-label  { color: #444441; }
.status-block.panda .status-label    { color: #7A5E00; }
.status-block.deliveroo .status-label{ color: #085041; }
.status-item {
  font-size: 13.5px; line-height: 1.55; padding: 2px 0;
}
.status-block.finished .status-item { color: #4A1B0C; }
.status-block.almost .status-item   { color: #412402; }
.status-block.neutral .status-item  { color: #2C2C2A; }
.status-block.panda .status-item    { color: #4D3A00; }
.status-block.deliveroo .status-item{ color: #04342C; }

.state-msg { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; line-height: 1.6; }
.state-msg .emoji { font-size: 32px; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="/sop">&#8592;</a>
  <div class="header-text">
    <h1>Inventory</h1>
  </div>
</div>

<div id="content">
  <div class="state-msg"><span class="emoji">⏳</span>Loading guide…</div>
</div>

<script>
const SHEET_ID   = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'InventoryManagement';

// Sections rendered as sequential script lines instead of bulleted lists
const SCRIPT_CATEGORY_PREFIXES = ['customer note template', 'phone script'];
const STATUS_LABELS = {
  'finished': 'finished',
  'almost finished': 'almost',
  'found before order': 'neutral',
  'found after order – hungrypanda': 'panda',
  'found after order – deliveroo': 'deliveroo',
};

async function load() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    const rows = json.table.rows
      .map(r => ({
        section:  (r.c[0]?.v || '').trim(),
        category: (r.c[1]?.v || '').trim(),
        item:     (r.c[2]?.v || '').trim(),
      }))
      .filter(r => r.section && r.item);
    render(rows);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="state-msg"><span class="emoji">⚠️</span>Failed to load guide.<br>Check your connection and try again.</div>';
  }
}

function render(rows) {
  const sectionMap = {};
  const sectionOrder = [];
  rows.forEach(({ section, category, item }) => {
    if (!sectionMap[section]) { sectionMap[section] = {}; sectionOrder.push(section); }
    const cat = category || 'General';
    if (!sectionMap[section][cat]) sectionMap[section][cat] = [];
    sectionMap[section][cat].push(item);
  });

  let html = '';
  sectionOrder.forEach((sec, secIdx) => {
    const categories = sectionMap[sec];
    const totalItems = Object.values(categories).reduce((n, arr) => n + arr.length, 0);

    let bodyHtml = '';
    Object.entries(categories).forEach(([cat, items]) => {
      const catLower = cat.toLowerCase();
      const statusClass = STATUS_LABELS[catLower];
      const isScript = SCRIPT_CATEGORY_PREFIXES.some(p => catLower.startsWith(p));
      if (isScript) {
        bodyHtml += `
          <div class="script-block">
            <div class="category-label">${cat}</div>
            ${items.map(i => `<div class="script-line">${i}</div>`).join('')}
          </div>`;
      } else if (statusClass) {
        bodyHtml += `
          <div class="status-block ${statusClass}">
            <div class="status-label">${cat}</div>
            ${items.map(i => `<div class="status-item">${i}</div>`).join('')}
          </div>`;
      } else {
        bodyHtml += `
          <div class="category-block">
            <div class="category-label">${cat}</div>
            ${items.map(i => `<div class="item-row"><span class="item-dot"></span><span>${i}</span></div>`).join('')}
          </div>`;
      }
    });

    html += `
      <div class="section-card ${secIdx === 0 ? 'open' : ''}" id="sec-${secIdx}">
        <div class="sec-header" onclick="toggle(${secIdx})">
          <div>
            <div class="sec-title">${sec}</div>
            <div class="sec-count">${totalItems} item${totalItems !== 1 ? 's' : ''}</div>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none">
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="sec-body">${bodyHtml}</div>
      </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function toggle(idx) {
  document.getElementById('sec-' + idx).classList.toggle('open');
}

load();
</script>
</body>
</html>
