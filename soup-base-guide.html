<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soup Base Guide · Mini Hot Pot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F0E8;color:#1a1a1a;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:1.25rem 1rem 4rem}
.topbar{display:flex;align-items:center;margin-bottom:1.25rem}
.back{display:flex;align-items:center;gap:4px;font-size:13px;color:#666;text-decoration:none}
.back svg{width:16px;height:16px}
.header{border-bottom:1.5px solid #2C2C2A;padding-bottom:12px;margin-bottom:20px}
.header h1{font-size:20px;font-weight:700;color:#2C2C2A;letter-spacing:-0.3px;line-height:1.3}
.header .sub{font-size:12px;color:#888780;margin-top:4px;line-height:1.5}
.card{margin:0 auto 14px;background:#fff;border-radius:14px;border:0.5px solid #D3D1C7;overflow:hidden}
.card-header{padding:14px 20px}
.card-header h2{font-size:17px;font-weight:500;color:#fff;letter-spacing:-0.2px}
.card-body{padding:0}
.block{padding:14px 20px;background:#fff;border-top:0.5px solid #E8E6E0}
.block:first-child{border-top:none}
.block-label{display:inline-block;font-size:11px;font-weight:500;letter-spacing:0.3px;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:#fff;margin-bottom:12px}
.ingredient-list{list-style:none}
.ingredient-list li{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:0.5px solid #F0EDE8;font-size:13px;color:#2C2C2A;line-height:1.4}
.ingredient-list li:last-child{border-bottom:none}
.ingredient-list li span:first-child{flex:1}
.ingredient-list li span:last-child{font-weight:500;white-space:nowrap;text-align:right}
.step-list{list-style:none}
.step-list li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid #F0EDE8;font-size:13px;color:#2C2C2A;line-height:1.4}
.step-list li:last-child{border-bottom:none}
.step-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;color:#fff}
.container-badge{display:inline-block;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;border:0.5px solid}
.state-box{text-align:center;padding:60px 20px;color:#aaa;font-size:13px}
.bilingual-name{font-size:12px;font-weight:400;margin-top:3px;opacity:0.8}
.step-zh{font-size:12px;color:#888;margin-top:2px;line-height:1.4}
.warning-box{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid #F0EDE8}
.warning-box:last-child{border-bottom:none}
.note-list{list-style:none;margin-top:0}
.note-list li{padding:6px 0;font-size:13px;color:#2C2C2A;line-height:1.5;display:flex;gap:8px;border-bottom:0.5px solid #F0EDE8}
.note-list li:last-child{border-bottom:none}
.note-list li .note-num{font-weight:500;flex-shrink:0}
.note-zh{font-size:12px;color:#888;margin-top:2px}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="/sop" class="back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
      Back
    </a>
  </div>
  <div class="header">
    <h1>Soup Base Guide — Mini Hot Pot</h1>
    <div class="sub" id="sub-names">Loading…</div>
  </div>
  <div id="cards"><div class="state-box">Loading…</div></div>
</div>

<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (!json.table?.rows?.length) return [];
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((col, i) => { obj[col] = r.c[i]?.v ?? r.c[i]?.f ?? ''; });
    return obj;
  });
}

function hexToRgb(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderCards(rows) {
  // Group by SoupName, sorted by SortOrder
  const groups = {};
  const order = [];
  rows.forEach(r => {
    const name = r['SoupName'];
    if (!groups[name]) { groups[name] = []; order.push({ name, sort: parseInt(r['SortOrder']) || 999 }); }
    groups[name].push(r);
  });
  order.sort((a,b) => a.sort - b.sort);

  document.getElementById('sub-names').textContent = order.map(o => o.name).join(' · ');

  let html = '';
  order.forEach(({ name }) => {
    const rows = groups[name];
    const color = rows[0]['Color'] || '#555';
    const bgLight = hexToRgb(color, 0.1);

    const ingredients = rows.filter(r => r['BlockType'] === 'Ingredients');
    const container   = rows.filter(r => r['BlockType'] === 'Container');
    const steps       = rows.filter(r => r['BlockType'] === 'Steps').sort((a,b) => parseInt(a['StepOrder'])-parseInt(b['StepOrder']));
    const seasoning   = rows.filter(r => r['BlockType'] === 'Seasoning');
    const notes       = rows.filter(r => r['BlockType'] === 'Note');

    const bilingualRow = rows.filter(r => r['BlockType'] === 'BilingualName');
    const zhName = bilingualRow.length ? bilingualRow[0]['ItemText'] : '';

    html += `<div class="card">
      <div class="card-header" style="background:${color}">
        <h2>${name}</h2>
        ${zhName ? `<div class="bilingual-name" style="color:rgba(255,255,255,0.85)">${zhName}</div>` : ''}
      </div>
      <div class="card-body">`;

    if (ingredients.length) {
      html += `<div class="block">
        <div class="block-label" style="background:${color}">Ingredients</div>
        <ul class="ingredient-list">
          ${ingredients.map(r => `<li><span>${r['ItemText']}</span><span style="color:${color}">${r['ItemValue']}</span></li>`).join('')}
        </ul></div>`;
    }

    if (container.length) {
      html += `<div class="block">
        <div class="block-label" style="background:${color}">Container</div>
        <span class="container-badge" style="color:${color};border-color:${color}">${container[0]['ItemText']}</span>
      </div>`;
    }

    if (steps.length) {
      html += `<div class="block">
        <div class="block-label" style="background:${color}">Steps</div>
        <ul class="step-list">
          ${steps.map(r => `<li>
            <span class="step-num" style="background:${color}">${r['StepOrder']}</span>
            <div>
              <div>${r['ItemText']}</div>
              ${r['ItemValue'] ? `<div class="step-zh">${r['ItemValue']}</div>` : ''}
            </div>
          </li>`).join('')}
        </ul></div>`;
    }

    if (seasoning.length) {
      html += `<div class="block">
        <div class="block-label" style="background:${color}">Seasoning</div>
        <ul class="ingredient-list">
          ${seasoning.map(r => `<li><span>${r['ItemText']}</span><span style="color:${color}">${r['ItemValue']}</span></li>`).join('')}
        </ul></div>`;
    }

    const warning = rows.filter(r => r['BlockType'] === 'Warning');

    if (warning.length || notes.length) {
      html += `<div class="block">
        <div class="block-label" style="background:${color}">Notes</div>`;
      if (warning.length) {
        html += `<div class="warning-box">
          <span style="flex-shrink:0;">⚠️</span>
          <div>
            <div style="font-size:13px;color:#2C2C2A;">${warning[0]['ItemText']}</div>
            ${warning[0]['ItemValue'] ? `<div class="note-zh">${warning[0]['ItemValue']}</div>` : ''}
          </div>
        </div>`;
      }
      if (notes.length) {
        html += `<ol class="note-list">
          ${notes.sort((a,b)=>parseInt(a['StepOrder'])-parseInt(b['StepOrder'])).map(r => `
            <li>
              <span class="note-num">${r['StepOrder']}.</span>
              <div>
                <div>${r['ItemText']}</div>
                ${r['ItemValue'] ? `<div class="note-zh">${r['ItemValue']}</div>` : ''}
              </div>
            </li>`).join('')}
        </ol>`;
      }
      html += `</div>`;
    }

    html += `</div></div>`;
  });

  document.getElementById('cards').innerHTML = html;
}

async function init() {
  try {
    const rows = await fetchSheet('SoupBaseGuide');
    if (!rows.length) {
      document.getElementById('cards').innerHTML = '<div class="state-box">No data found in SoupBaseGuide sheet.</div>';
      return;
    }
    renderCards(rows);
  } catch(e) {
    document.getElementById('cards').innerHTML = '<div class="state-box">⚠️ Failed to load. Check Sheet sharing settings.</div>';
  }
}

init();
</script>
</body>
</html>
