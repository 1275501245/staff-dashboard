<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Orders — Haidilao</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }

.topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.back { font-size: 14px; color: #aaa; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.back:before { content: '‹'; font-size: 20px; line-height: 1; }
.topbar h1 { font-size: 18px; font-weight: 600; }

.date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.date-label { font-size: 12px; color: #aaa; }
.date-val { font-size: 13px; font-weight: 500; }

.section-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding: 0 2px; }

.supplier-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.supplier-card { background: white; border-radius: 14px; border: 1px solid #efefef; overflow: hidden; }

.supplier-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
.supplier-info { display: flex; flex-direction: column; gap: 3px; }
.supplier-name { font-size: 15px; font-weight: 600; }
.supplier-meta { font-size: 12px; color: #aaa; }
.supplier-status { display: flex; align-items: center; gap: 8px; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.badge-ready { background: #e8f5e9; color: #2e7d32; }
.badge-empty { background: #f5f5f5; color: #aaa; }

.supplier-actions { display: flex; gap: 0; border-top: 1px solid #f5f5f5; }
.action-btn { flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 500; text-align: center; border: none; background: none; cursor: pointer; color: #1a1a1a; display: flex; align-items: center; justify-content: center; gap: 6px; }
.action-btn:first-child { border-right: 1px solid #f5f5f5; }
.action-btn.copy { color: #0f2035; }
.action-btn.copy:active { background: #f0f4f8; }
.action-btn.view { color: #555; }
.action-btn.view:active { background: #f5f5f5; }
.action-btn .icon { font-size: 15px; }

.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #0f2035; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; }
.toast.show { opacity: 1; }

.empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }

.loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a class="back" href="/admin-home">Admin</a>
    <h1>Orders 开货单</h1>
  </div>

  <div id="app"><div class="loading">加载中…</div></div>
</div>

<div class="toast" id="toast">链接已复制</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbweEtCG92d6a2cfO7FzSTFgnP8e5FE1NPrgqNIlDRul1TnN2wzx3Ovbu85E5k-oUsdh/exec';
const BASE_URL = window.location.origin;

async function load() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getOrdersSummary');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="empty-state">加载失败：${e.message}</div>`;
  }
}

function render(data) {
  const { suppliers, latestOrderDate } = data;
  if (!suppliers || suppliers.length === 0) {
    document.getElementById('app').innerHTML = '<div class="empty-state">暂无供应商数据</div>';
    return;
  }

  const dateStr = latestOrderDate || '—';

  let html = `
    <div class="date-row">
      <span class="date-label">最新开货日期</span>
      <span class="date-val">${dateStr}</span>
    </div>
    <div class="section-label">供应商 — ${suppliers.length} 家</div>
    <div class="supplier-list">
  `;

  suppliers.forEach(s => {
    const link = `${BASE_URL}/order.html?supplier=${encodeURIComponent(s.key)}`;
    const hasOrders = s.itemCount > 0;
    html += `
      <div class="supplier-card">
        <div class="supplier-header">
          <div class="supplier-info">
            <div class="supplier-name">${s.name}</div>
            <div class="supplier-meta">${hasOrders ? `${s.itemCount} 品项 · 截单 ${s.cutoff || 'TBC'}` : '暂无开货单'}</div>
          </div>
          <span class="badge ${hasOrders ? 'badge-ready' : 'badge-empty'}">${hasOrders ? '已填' : '未填'}</span>
        </div>
        <div class="supplier-actions">
          <button class="action-btn copy" onclick="copyLink('${link}', this)">
            <span class="icon">⎘</span> 复制链接
          </button>
          <a class="action-btn view" href="${link}" target="_blank">
            <span class="icon">↗</span> 预览
          </a>
        </div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

load();
</script>
</body>
</html>
