<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Quality 出品质量检查项</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.container { max-width: 680px; margin: 0 auto; padding: 16px 16px 40px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 700; margin: 20px 2px 10px; padding-left: 10px; border-left: 4px solid #1a1a1a; white-space: pre-line; }
.item-card { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; }
.item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
.item-cat { font-size: 14px; font-weight: 600; white-space: pre-line; }
.item-no { font-size: 11px; color: #bbb; font-weight: 600; white-space: nowrap; }
.item-text { font-size: 13px; color: #444; white-space: pre-line; line-height: 1.55; }
.loading { text-align: center; padding: 60px; color: #888; }
@media print {
  body { background: white; }
  .item-card { border: 1px solid #ddd; border-radius: 0; break-inside: avoid; margin-bottom: 6px; }
  .section-title { break-after: avoid; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Product Quality 出品质量检查项</h1>
  <div class="subtitle" id="subtitle">Loading...</div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>
<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const QC_GID = '1137698611'; // Product Quality tab

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch !== '\r') field += ch;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}

const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

async function init() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${QC_GID}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = parseCSV(await res.text());
    if (rows.length < 2) throw new Error('Empty sheet');

    const headerJoined = rows[0].join('');
    if (!/检查项|Check\s*Item/i.test(headerJoined)) {
      throw new Error(`Wrong tab (gid ${QC_GID}) — header mismatch`);
    }

    let html = '', lastSection = null, count = 0;
    for (let i = 1; i < rows.length; i++) {
      const [no, section, category, item] = rows[i].map(v => String(v || '').trim());
      if (!no && !category && !item) continue;
      const sec = section || lastSection || '';
      if (sec !== lastSection) {
        html += `<div class="section-title">${esc(sec)}</div>`;
        lastSection = sec;
      }
      html += `<div class="item-card">
        <div class="item-head">
          <span class="item-cat">${esc(category)}</span>
          <span class="item-no">#${esc(no)}</span>
        </div>
        <div class="item-text">${esc(item)}</div>
      </div>`;
      count++;
    }
    document.getElementById('content').innerHTML = html || '<div class="loading">No items</div>';
    document.getElementById('subtitle').textContent = `共 ${count} 项 · Last updated: ${new Date().toLocaleString('en-GB')}`;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:#c62828;">Failed: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
