<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 16px 16px 60px; }
.top-bar { display: flex; align-items: center; margin-bottom: 20px; }
.back-btn { font-size: 13px; color: #888; cursor: pointer; text-decoration: none; }
.page-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: #aaa; margin-bottom: 20px; }
.nav-list { background: white; border-radius: 16px; border: 1px solid #efefef; overflow: hidden; margin-bottom: 12px; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
.nav-item:last-child { border-bottom: none; }
.nav-left { display: flex; flex-direction: column; gap: 3px; }
.nav-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.nav-desc { font-size: 12px; color: #aaa; }
.nav-arrow { font-size: 20px; color: #ccc; }
.view { display: none; }
.view.active { display: block; }
.rules-card { background: white; border-radius: 16px; border: 1px solid #efefef; overflow: hidden; margin-bottom: 12px; }
.rule-row { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; }
.rule-row:last-child { border-bottom: none; }
.rule-num { font-size: 10px; color: #ccc; margin-bottom: 4px; }
.rule-en { font-size: 13px; color: #1a1a1a; line-height: 1.6; }
.rule-cn { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.6; }
.section-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px 2px; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a class="back-btn" id="back-btn" href="/">‹ Home</a>
  </div>
  <div id="app"><div class="loading">Loading...</div></div>
</div>
<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
let allData = [];

async function fetchPolicy() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Policy&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => ({
    category: r.c[0]?.v || '',
    section: r.c[1]?.v || '',
    title: r.c[2]?.v || '',
    title_cn: r.c[3]?.v || '',
    content: r.c[4]?.v || '',
    content_cn: r.c[5]?.v || '',
    order: parseFloat(r.c[6]?.v || 0),
  }));
}

function renderHome() {
  const categories = [...new Set(allData.map(d => d.category))];
  document.getElementById('back-btn').textContent = '‹ Home';
  document.getElementById('back-btn').href = '/';
  document.getElementById('back-btn').onclick = null;
  document.getElementById('app').innerHTML = `
    <div class="view active">
      <div class="page-title">Policy</div>
      <div class="page-sub">Rules & guidelines</div>
      <div class="nav-list">
        ${categories.map(cat => {
          const sections = [...new Set(allData.filter(d => d.category === cat).map(d => d.section))];
          return `
          <div class="nav-item" onclick="renderCat('${cat}')">
            <div class="nav-left">
              <div class="nav-name">${cat}</div>
              <div class="nav-desc">${sections.join(' · ')}</div>
            </div>
            <div class="nav-arrow">›</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderCat(cat) {
  const items = allData.filter(d => d.category === cat);
  const sections = [...new Set(items.map(d => d.section))];
  document.getElementById('back-btn').textContent = '‹ Policy';
  document.getElementById('back-btn').href = '#';
  document.getElementById('back-btn').onclick = (e) => { e.preventDefault(); renderHome(); };
  document.getElementById('app').innerHTML = `
    <div class="view active">
      <div class="page-title">${cat}</div>
      <div class="page-sub">Rules & guidelines</div>
      ${sections.map(sec => {
        const secItems = items.filter(d => d.section === sec).sort((a,b) => a.order - b.order);
        return `
        <div class="section-label">${sec}</div>
        <div class="rules-card">
          ${secItems.map((item, i) => `
            <div class="rule-row">
              <div class="rule-num">${i+1}</div>
              <div class="rule-en">${item.content}</div>
              ${item.content_cn ? `<div class="rule-cn">${item.content_cn}</div>` : ''}
            </div>
          `).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
}

async function init() {
  try {
    allData = await fetchPolicy();
    renderHome();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading">Failed: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
