<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haidilao Mini Hot Pot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 32px 16px 60px; }
.header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid #efefef; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; color: #aaa; margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
.section { margin-bottom: 28px; }
.section-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding: 0 2px; }
.nav-list { background: white; border-radius: 16px; border: 1px solid #efefef; overflow: hidden; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; text-decoration: none; color: #1a1a1a; }
.nav-item:last-child { border-bottom: none; }
.nav-left { display: flex; align-items: center; gap: 14px; }
.nav-icon { width: 36px; height: 36px; border-radius: 9px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.nav-text { display: flex; flex-direction: column; gap: 2px; }
.nav-name { font-size: 14px; font-weight: 500; }
.nav-desc { font-size: 12px; color: #aaa; }
.nav-arrow { font-size: 20px; color: #ccc; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Haidilao Mini Hot Pot</h1>
    <p>Staff Dashboard</p>
  </div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>
<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';

const ICONS = {
  'Performance': '📊',
  'Sites': '📍',
  'Policy': '📄',
  'Schedule': '🗓',
};

async function fetchNav() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Nav`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => ({
    category: r.c[0]?.v || '',
    name: r.c[1]?.v || '',
    description: r.c[2]?.v || '',
    url: r.c[3]?.v || '',
  }));
}

function render(items) {
  const byCategory = {};
  items.forEach(item => {
    if (!byCategory[item.category]) byCategory[item.category] = [];
    byCategory[item.category].push(item);
  });

  document.getElementById('content').innerHTML = Object.entries(byCategory).map(([cat, items]) => `
    <div class="section">
      <div class="section-label">${cat}</div>
      <div class="nav-list">
        ${items.map(item => `
          <a class="nav-item" href="${item.url}">
            <div class="nav-left">
              <div class="nav-icon">${ICONS[item.name] || '📌'}</div>
              <div class="nav-text">
                <div class="nav-name">${item.name}</div>
                <div class="nav-desc">${item.description}</div>
              </div>
            </div>
            <div class="nav-arrow">›</div>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function init() {
  try { render(await fetchNav()); }
  catch(e) { document.getElementById('content').innerHTML = `<div class="loading">Failed: ${e.message}</div>`; }
}
init();
</script>
</body>
</html>
