<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refund Details</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filters select { font-size: 13px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; height: 34px; }
  .filters input[type=date] { font-size: 13px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; height: 34px; }
  .filter-btn { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; background: white; height: 34px; }
  .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .sum-card { background: white; border-radius: 12px; padding: 10px 14px; border: 1px solid #efefef; }
  .sum-val { font-size: 18px; font-weight: 600; }
  .sum-lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .site-block { margin-bottom: 20px; }
  .site-header { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px; padding: 0 2px; display: flex; justify-content: space-between; }
  .site-total { font-size: 12px; color: #c62828; font-weight: 500; }
  .table-wrap { background: white; border-radius: 12px; border: 1px solid #efefef; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  th { font-size: 11px; color: #888; font-weight: 500; padding: 8px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; background: #fafafa; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #f9f9f9; font-size: 13px; vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .platform-d { color: #00CCBC; font-size: 11px; font-weight: 600; }
  .platform-h { color: #FF6B35; font-size: 11px; font-weight: 600; }
  .refund-amt { font-weight: 500; color: #c62828; }
  .staff-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0f0f0; color: #555; }
  .note-high { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #ffebee; color: #b71c1c; font-weight: 500; }
  .note-full { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #fff3e0; color: #e65100; font-weight: 500; }
  .note-other { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #f5f5f5; color: #555; }
  .red { color: #c62828; }
  .loading { text-align: center; padding: 60px; color: #888; }
</style>
</head>
<body>
<div class="container">
  <h1>Refund Details</h1>
  <div class="subtitle" id="subtitle">Loading...</div>

  <div class="filters">
    <select id="filter-site" onchange="applyFilters()">
      <option value="">All sites</option>
      <option value="Shoreditch">Shoreditch</option>
      <option value="Battersea">Battersea</option>
      <option value="Tower Bridge">Tower Bridge</option>
    </select>
    <select id="filter-staff" onchange="applyFilters()">
      <option value="">All staff</option>
      <option value="Prabin">Prabin</option>
      <option value="Harshitha">Harshitha</option>
      <option value="Kin">Kin</option>
      <option value="Ashh">Ashh</option>
      <option value="Surbhi">Surbhi</option>
    </select>
    <select id="filter-platform" onchange="applyFilters()">
      <option value="">All platforms</option>
      <option value="Deliveroo">Deliveroo</option>
      <option value="HungryPanda">HungryPanda</option>
    </select>
    <input type="date" id="filter-from" onchange="applyFilters()">
    <input type="date" id="filter-to" onchange="applyFilters()">
    <button class="filter-btn" onclick="clearFilters()">Clear</button>
  </div>

  <div class="summary-bar" id="summary-bar"></div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
let allData = [];

function normalizeDate(raw) {
  if (!raw) return null;
  if (typeof raw === 'string' && raw.startsWith('Date(')) {
    const p = raw.replace('Date(','').replace(')','').split(',');
    return `${p[0]}-${String(parseInt(p[1])+1).padStart(2,'0')}-${String(parseInt(p[2])).padStart(2,'0')}`;
  }
  if (typeof raw === 'string') return raw.slice(0,10);
  return null;
}

function normalizeTime(raw) {
  if (!raw) return '';
  // Google Sheets stores time as decimal fraction of a day
  if (typeof raw === 'number') {
    const totalMins = Math.round(raw * 24 * 60);
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  // Already string like "13:23"
  if (typeof raw === 'string' && raw.startsWith('Date(')) {
    const p = raw.replace('Date(','').replace(')','').split(',');
    const h = parseInt(p[3] || 0);
    const m = parseInt(p[4] || 0);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  return String(raw).slice(0,5);
}

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Details`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => ({
    date: normalizeDate(r.c[0]?.v),
    site: r.c[1]?.v || '',
    time: normalizeTime(r.c[2]?.v),
    platform: r.c[3]?.v || '',
    orderTotal: parseFloat(r.c[4]?.v || 0),
    refund: parseFloat(r.c[5]?.v || 0),
    staff: r.c[6]?.v || '',
    note: r.c[7]?.v || '',
  }));
}

function applyFilters() {
  const site = document.getElementById('filter-site').value;
  const staff = document.getElementById('filter-staff').value;
  const platform = document.getElementById('filter-platform').value;
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const filtered = allData.filter(r =>
    (!site || r.site === site) &&
    (!staff || r.staff === staff) &&
    (!platform || r.platform === platform) &&
    (!from || r.date >= from) &&
    (!to || r.date <= to)
  );
  render(filtered);
}

function clearFilters() {
  ['filter-site','filter-staff','filter-platform','filter-from','filter-to'].forEach(id => {
    document.getElementById(id).value = '';
  });
  render(allData);
}

function noteTag(note) {
  if (!note) return '';
  if (note === 'High') return `<span class="note-high">High</span>`;
  if (note === 'Full refund') return `<span class="note-full">Full refund</span>`;
  return `<span class="note-other">${note}</span>`;
}

function render(data) {
  const totalRefund = data.reduce((s,r) => s+r.refund, 0);
  const dates = [...new Set(data.map(r=>r.date))];

  document.getElementById('summary-bar').innerHTML = `
    <div class="sum-card"><div class="sum-val red">£${totalRefund.toFixed(2)}</div><div class="sum-lbl">Total refund</div></div>
    <div class="sum-card"><div class="sum-val">${data.length}</div><div class="sum-lbl">Refund orders</div></div>
    <div class="sum-card"><div class="sum-val">${dates.length}</div><div class="sum-lbl">Days</div></div>
    <div class="sum-card"><div class="sum-val">${[...new Set(data.map(r=>r.staff).filter(Boolean))].length}</div><div class="sum-lbl">Staff involved</div></div>
  `;

  const byDate = {};
  data.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = {};
    if (!byDate[r.date][r.site]) byDate[r.date][r.site] = [];
    byDate[r.date][r.site].push(r);
  });

  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    const fmtDate = new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
    Object.keys(byDate[date]).sort().forEach(site => {
      const rows = byDate[date][site];
      const siteTotal = rows.reduce((s,r)=>s+r.refund,0);
      html += `
        <div class="site-block">
          <div class="site-header">
            <span>${site} · ${fmtDate}</span>
            <span class="site-total">£${siteTotal.toFixed(2)} · ${rows.length} orders</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Time</th>
                <th>Platform</th>
                <th>Order total</th>
                <th>Refund</th>
                <th>Staff</th>
                <th>Note</th>
              </tr></thead>
              <tbody>
                ${rows.map(r=>`
                  <tr>
                    <td>${r.time}</td>
                    <td><span class="${r.platform==='Deliveroo'?'platform-d':'platform-h'}">${r.platform}</span></td>
                    <td>${r.orderTotal>0?'£'+r.orderTotal.toFixed(2):'—'}</td>
                    <td class="refund-amt">£${r.refund.toFixed(2)}</td>
                    <td><span class="staff-badge">${r.staff}</span></td>
                    <td>${noteTag(r.note)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    });
  });

  document.getElementById('content').innerHTML = html || '<div class="loading">No data found</div>';
  document.getElementById('subtitle').textContent = `Last updated: ${new Date().toLocaleString('en-GB')}`;
}

async function init() {
  try {
    allData = await fetchData();
    render(allData);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:#c62828;">Failed to load: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
