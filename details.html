<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refund Details</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.nav { display: flex; gap: 6px; padding: 14px 16px 0; max-width: 900px; margin: 0 auto; }
.nav a { flex: 1; text-align: center; padding: 8px; border-radius: 10px; font-size: 13px; font-weight: 500; text-decoration: none; border: 1px solid #e0e0e0; background: white; color: #888; }
.nav a.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.container { max-width: 900px; margin: 0 auto; padding: 16px 16px 40px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
.filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filters select, .filters input[type=date] { font-size: 13px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; height: 34px; }
.filter-btn { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; background: white; height: 34px; }
.summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.sum-card { background: white; border-radius: 12px; padding: 10px 14px; border: 1px solid #efefef; }
.sum-val { font-size: 18px; font-weight: 600; }
.sum-lbl { font-size: 11px; color: #888; margin-top: 2px; }
.analysis-card { background: white; border-radius: 12px; border: 1px solid #efefef; overflow: hidden; margin-bottom: 16px; }
.analysis-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid #f9f9f9; }
.analysis-row:last-child { border-bottom: none; }
.analysis-left { display: flex; align-items: center; gap: 10px; }
.analysis-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.icon-danger { background: #ffebee; }
.icon-warning { background: #fff3e0; }
.icon-info { background: #e3f2fd; }
.icon-neutral { background: #f5f5f5; }
.analysis-name { font-size: 13px; font-weight: 500; }
.analysis-desc { font-size: 11px; color: #aaa; margin-top: 1px; }
.analysis-right { text-align: right; }
.analysis-count { font-size: 14px; font-weight: 600; }
.analysis-amt { font-size: 11px; color: #888; margin-top: 1px; }
.count-danger { color: #c62828; }
.count-warning { color: #e65100; }
.count-info { color: #1565c0; }
.count-neutral { color: #888; }
.site-block { margin-bottom: 20px; }
.site-header { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px; padding: 0 2px; display: flex; justify-content: space-between; align-items: center; }
.site-total { font-size: 12px; color: #c62828; font-weight: 500; }
.table-wrap { background: white; border-radius: 12px; border: 1px solid #efefef; overflow: hidden; }
.rate-bar { padding: 8px 14px; border-bottom: 1px solid #f0f0f0; display: flex; flex-direction: column; gap: 6px; background: #fafafa; }
.rate-row { display: flex; justify-content: space-between; align-items: center; }
.rate-name { font-size: 12px; font-weight: 500; color: #555; }
.rate-detail { font-size: 11px; color: #aaa; }
.rate-pct { font-size: 13px; font-weight: 600; }
.rate-ok { color: #2e7d32; }
.rate-bad { color: #c62828; }
.desktop-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.desktop-table col.c1 { width: 95px; } .desktop-table col.c2 { width: 62px; } .desktop-table col.c3 { width: 105px; }
.desktop-table col.c4 { width: 88px; } .desktop-table col.c5 { width: 82px; } .desktop-table col.c6 { width: 100px; }
.desktop-table col.c7 { width: 80px; } .desktop-table col.c8 { width: 60px; } .desktop-table col.c9 { width: 32px; }
.mobile-table { width: 100%; border-collapse: collapse; table-layout: fixed; display: none; }
.mobile-table col.m1 { width: 90px; } .mobile-table col.m2 { width: 58px; } .mobile-table col.m3 { width: 75px; } .mobile-table col.m4 { width: 28px; }
th { font-size: 11px; color: #888; font-weight: 500; padding: 8px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; background: #fafafa; }
td { padding: 10px 12px; border-bottom: 1px solid #f9f9f9; font-size: 13px; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr.data-row { cursor: pointer; } tr.data-row:hover td { background: #fafafa; }
tr.detail-row td { padding: 0; border-bottom: 1px solid #f0f0f0; }
tr.detail-row.hidden { display: none; } tr:last-child td { border-bottom: none; }
.detail-box { padding: 12px 16px; background: #f7f9ff; border-left: 3px solid #378ADD; }
.detail-box.fraudulent { background: #fff5f5; border-left-color: #c62828; }
.detail-box.food-safety { background: #fff5f5; border-left-color: #c62828; }
.detail-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
.detail-meta-item { font-size: 12px; color: #333; }
.detail-meta-item .lbl { color: #999; margin-right: 4px; font-size: 11px; }
.detail-reason { font-size: 12px; color: #1a1a1a; line-height: 1.6; white-space: pre-wrap; padding-top: 8px; border-top: 1px solid #e8eef8; margin-top: 4px; }
.detail-empty { padding: 10px 16px; background: #fafafa; border-left: 3px solid #e0e0e0; font-size: 12px; color: #aaa; }
.expand-btn { font-size: 13px; color: #ccc; text-align: center; }
tr.data-row.expanded .expand-btn { color: #555; }
.platform-d { color: #00CCBC; font-size: 12px; font-weight: 600; }
.platform-h { color: #FF6B35; font-size: 12px; font-weight: 600; }
.refund-amt { font-weight: 500; color: #c62828; }
.order-id { font-size: 11px; color: #666; font-family: monospace; }
.staff-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0f0f0; color: #555; display: inline-block; }
.tag-fraud { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #ffebee; color: #b71c1c; font-weight: 700; }
.tag-safety { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #ffebee; color: #b71c1c; font-weight: 700; }
.tag-missing { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #fff3e0; color: #e65100; font-weight: 500; }
.tag-wrong { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #e3f2fd; color: #1565c0; font-weight: 500; }
.tag-reason { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #e3f2fd; color: #1565c0; }
.tags { display: flex; gap: 4px; flex-wrap: wrap; }
.red { color: #c62828; }
.loading { text-align: center; padding: 60px; color: #888; }
@media (max-width: 600px) {
  .desktop-table { display: none; } .mobile-table { display: table; }
  .summary-bar { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/index">Progress</a>
  <a href="/details" class="active">Refunds</a>
  <a href="/policy">Policy</a>
  <a href="/sites">Sites</a>
</nav>
<div class="container">
  <h1>Refund Details</h1>
  <div class="subtitle" id="subtitle">Loading...</div>
  <div class="filters">
    <select id="filter-site" onchange="applyFilters()">
      <option value="">All sites</option>
      <option value="Shoreditch">Shoreditch</option>
      <option value="Battersea">Battersea</option>
      <option value="Tower Bridge">Tower Bridge</option>
    </select>
    <select id="filter-staff" onchange="applyFilters()">
      <option value="">All staff</option>
      <option value="Prabin">Prabin</option>
      <option value="Harshitha">Harshitha</option>
      <option value="Kin">Kin</option>
      <option value="Ashh">Ashh</option>
      <option value="Surbhi">Surbhi</option>
      <option value="Barsudin">Barsudin</option>
    </select>
    <select id="filter-platform" onchange="applyFilters()">
      <option value="">All platforms</option>
      <option value="Deliveroo">Deliveroo</option>
      <option value="HungryPanda">HungryPanda</option>
    </select>
    <select id="filter-category" onchange="applyFilters()">
      <option value="">All types</option>
      <option value="Food Safety">Food Safety</option>
      <option value="Missing Items">Missing Items</option>
      <option value="Wrong Items">Wrong Items</option>
      <option value="Fraudulent">Fraudulent</option>
    </select>
    <select id="filter-fraud" onchange="applyFilters()">
      <option value="">All</option>
      <option value="genuine">Genuine only</option>
      <option value="fraud">Fraudulent only</option>
    </select>
    <input type="date" id="filter-from" onchange="applyFilters()">
    <input type="date" id="filter-to" onchange="applyFilters()">
    <button class="filter-btn" onclick="clearFilters()">Clear</button>
  </div>
  <div class="summary-bar" id="summary-bar"></div>
  <div class="analysis-card" id="analysis-card"></div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>
<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
let allData = [], salesData = [];

function isFraud(note) { return (note||'').toLowerCase().includes('fraudulent'); }

function normalizeDate(raw) {
  if (!raw) return null;
  if (typeof raw === 'string' && raw.startsWith('Date(')) {
    const p = raw.replace('Date(','').replace(')','').split(',');
    return `${p[0]}-${String(parseInt(p[1])+1).padStart(2,'0')}-${String(parseInt(p[2])).padStart(2,'0')}`;
  }
  return typeof raw === 'string' ? raw.slice(0,10) : null;
}

function normalizeTime(raw) {
  if (!raw) return '';
  if (typeof raw === 'number') {
    const t = Math.round(raw * 24 * 60);
    return `${String(Math.floor(t/60)%24).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
  }
  if (typeof raw === 'string' && raw.startsWith('Date(')) {
    const p = raw.replace('Date(','').replace(')','').split(',');
    return `${String(parseInt(p[3]||0)).padStart(2,'0')}:${String(parseInt(p[4]||0)).padStart(2,'0')}`;
  }
  return String(raw).slice(0,5);
}

async function fetchDetails() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Details&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => ({
    orderId: r.c[0]?.v || '',
    date: normalizeDate(r.c[1]?.v),
    site: r.c[2]?.v || '',
    time: normalizeTime(r.c[3]?.v),
    platform: r.c[4]?.v || '',
    orderTotal: parseFloat(r.c[5]?.v || 0),
    refund: parseFloat(r.c[6]?.v || 0),
    staff: r.c[7]?.v || '',
    note: r.c[8]?.v || '',
    reason: r.c[9]?.v || '',
    category: r.c[10]?.v || '',
  }));
}

async function fetchSales() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Data&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => ({
    date: normalizeDate(r.c[0]?.v),
    staff: r.c[1]?.v || '',
    site: r.c[2]?.v || '',
    revenue: parseFloat(r.c[3]?.v || 0),
    refund: parseFloat(r.c[4]?.v || 0),
  }));
}

function toggleDetail(id) {
  const detail = document.getElementById('detail-d-'+id);
  const detailM = document.getElementById('detail-m-'+id);
  const rowD = document.getElementById('row-d-'+id);
  const rowM = document.getElementById('row-m-'+id);
  const hidden = detail ? detail.classList.contains('hidden') : detailM.classList.contains('hidden');
  [detail, detailM].forEach(el => el && el.classList.toggle('hidden', !hidden));
  [rowD, rowM].forEach(el => {
    if (!el) return;
    el.classList.toggle('expanded', hidden);
    const btn = el.querySelector('.expand-btn');
    if (btn) btn.textContent = hidden ? '▾' : '▸';
  });
}

function applyFilters() {
  const site = document.getElementById('filter-site').value;
  const staff = document.getElementById('filter-staff').value;
  const platform = document.getElementById('filter-platform').value;
  const category = document.getElementById('filter-category').value;
  const fraud = document.getElementById('filter-fraud').value;
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  render(allData.filter(r =>
    (!site || r.site === site) && (!staff || r.staff === staff) &&
    (!platform || r.platform === platform) && (!category || r.category === category) &&
    (!from || r.date >= from) && (!to || r.date <= to) &&
    (!fraud || (fraud === 'fraud' ? isFraud(r.note) : !isFraud(r.note)))
  ));
}

function clearFilters() {
  ['filter-site','filter-staff','filter-platform','filter-category','filter-fraud','filter-from','filter-to'].forEach(id => document.getElementById(id).value='');
  render(allData);
}

function getCategoryTag(category) {
  if (!category) return '';
  if (category === 'Food Safety') return '<span class="tag-safety">⚠ Food Safety</span>';
  if (category === 'Missing Items') return '<span class="tag-missing">Missing</span>';
  if (category === 'Wrong Items') return '<span class="tag-wrong">Wrong items</span>';
  if (category === 'Fraudulent') return '<span class="tag-fraud">⚠ Fraudulent</span>';
  return `<span class="tag-reason">${category}</span>`;
}

function makeDetailContent(r) {
  const fraud = isFraud(r.note);
  const safety = r.category === 'Food Safety';
  if (!r.reason && !r.note) return `<div class="detail-empty">No additional details</div>`;
  const cls = fraud ? 'fraudulent' : safety ? 'food-safety' : '';
  return `<div class="detail-box ${cls}">
    <div class="detail-meta">
      <div class="detail-meta-item"><span class="lbl">Staff</span>${r.staff||'—'}</div>
      <div class="detail-meta-item"><span class="lbl">Platform</span><span class="${r.platform==='Deliveroo'?'platform-d':'platform-h'}">${r.platform}</span></div>
      <div class="detail-meta-item"><span class="lbl">Order total</span>${r.orderTotal>0?'£'+r.orderTotal.toFixed(2):'—'}</div>
      <div class="detail-meta-item"><span class="lbl">Refund</span><span class="refund-amt">£${r.refund.toFixed(2)}</span></div>
    </div>
    ${r.reason?`<div class="detail-reason">${r.reason}</div>`:''}
  </div>`;
}

function renderAnalysis(data) {
  const cats = { 'Food Safety': {icon:'🚨', cls:'icon-danger', countCls:'count-danger', items:[], amt:0},
    'Missing Items': {icon:'📦', cls:'icon-warning', countCls:'count-warning', items:[], amt:0},
    'Wrong Items': {icon:'↔', cls:'icon-info', countCls:'count-info', items:[], amt:0},
    'Fraudulent': {icon:'⚠', cls:'icon-neutral', countCls:'count-neutral', items:[], amt:0} };
  data.forEach(r => { if (cats[r.category]) { cats[r.category].items.push(r); cats[r.category].amt += r.refund; } });
  const descs = {
    'Food Safety': 'Foreign objects, contamination',
    'Missing Items': 'Rice, drinks, vegetables, sides',
    'Wrong Items': 'Incorrect dish or preparation',
    'Fraudulent': 'Excluded from penalty calculation'
  };
  document.getElementById('analysis-card').innerHTML = Object.entries(cats).map(([name, d]) =>
    `<div class="analysis-row">
      <div class="analysis-left">
        <div class="analysis-icon ${d.cls}">${d.icon}</div>
        <div>
          <div class="analysis-name">${name}</div>
          <div class="analysis-desc">${descs[name]}</div>
        </div>
      </div>
      <div class="analysis-right">
        <div class="analysis-count ${d.countCls}">${d.items.length} orders</div>
        <div class="analysis-amt">£${d.amt.toFixed(2)}</div>
      </div>
    </div>`
  ).join('');
}

function buildRateBar(date, site, rows) {
  const staffInSite = [...new Set(rows.map(r => r.staff).filter(Boolean))];
  const rateRows = staffInSite.map(staff => {
    const sale = salesData.find(s => s.date === date && s.site === site && s.staff === staff);
    if (!sale || sale.revenue === 0) return null;
    const counted = rows.filter(r => r.staff === staff && !isFraud(r.note)).reduce((s,r)=>s+r.refund,0);
    const rate = counted / sale.revenue * 100;
    const ok = rate < 2;
    return `<div class="rate-row">
      <div><span class="rate-name">${staff}</span><span class="rate-detail"> · £${counted.toFixed(2)} / £${sale.revenue.toFixed(2)}</span></div>
      <span class="rate-pct ${ok?'rate-ok':'rate-bad'}">${rate.toFixed(2)}% ${ok?'✓':'▲'}</span>
    </div>`;
  }).filter(Boolean);
  if (rateRows.length === 0) return '';
  return `<div class="rate-bar">${rateRows.join('')}</div>`;
}

function render(data) {
  const fraudCount = data.filter(r => isFraud(r.note)).length;
  const genuineRefund = data.filter(r => !isFraud(r.note)).reduce((s,r)=>s+r.refund,0);
  const totalRefund = data.reduce((s,r)=>s+r.refund,0);
  document.getElementById('summary-bar').innerHTML = `
    <div class="sum-card"><div class="sum-val red">£${totalRefund.toFixed(2)}</div><div class="sum-lbl">Total refund</div></div>
    <div class="sum-card"><div class="sum-val">${data.length}</div><div class="sum-lbl">Refund orders</div></div>
    <div class="sum-card"><div class="sum-val red">${fraudCount}</div><div class="sum-lbl">Fraudulent</div></div>
    <div class="sum-card"><div class="sum-val red">£${genuineRefund.toFixed(2)}</div><div class="sum-lbl">Genuine refund</div></div>
  `;
  renderAnalysis(data);
  const byDate = {};
  data.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = {};
    if (!byDate[r.date][r.site]) byDate[r.date][r.site] = [];
    byDate[r.date][r.site].push(r);
  });
  let html = '', id = 0;
  Object.keys(byDate).sort().reverse().forEach(date => {
    const fmtDate = new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
    Object.keys(byDate[date]).sort().forEach(site => {
      const rows = byDate[date][site];
      const siteTotal = rows.reduce((s,r)=>s+r.refund,0);
      const rateBarHTML = buildRateBar(date, site, rows);
      const desktopRows = rows.map(r => {
        const rid = id++;
        const tags = [];
        if (r.category) tags.push(getCategoryTag(r.category));
        if (!isFraud(r.note) && r.reason) tags.push('<span class="tag-reason">+ detail</span>');
        return {rid, r, tags};
      });
      html += `
      <div class="site-block">
        <div class="site-header"><span>${site} · ${fmtDate}</span><span class="site-total">£${siteTotal.toFixed(2)} · ${rows.length} orders</span></div>
        <div class="table-wrap">
          ${rateBarHTML}
          <table class="desktop-table">
            <colgroup><col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6"><col class="c7"><col class="c8"><col class="c9"></colgroup>
            <thead><tr><th>Order</th><th>Time</th><th>Platform</th><th>Order total</th><th>Refund</th><th>Staff</th><th>Category</th><th>Tag</th><th></th></tr></thead>
            <tbody>${desktopRows.map(({rid,r,tags})=>`
              <tr class="data-row" id="row-d-${rid}" onclick="toggleDetail(${rid})">
                <td class="order-id">#${r.orderId}</td><td>${r.time}</td>
                <td><span class="${r.platform==='Deliveroo'?'platform-d':'platform-h'}">${r.platform}</span></td>
                <td>${r.orderTotal>0?'£'+r.orderTotal.toFixed(2):'—'}</td>
                <td class="refund-amt">£${r.refund.toFixed(2)}</td>
                <td><span class="staff-badge">${r.staff||'—'}</span></td>
                <td style="font-size:11px;color:#888;">${r.category||'—'}</td>
                <td><div class="tags">${tags.join('')}</div></td>
                <td class="expand-btn">▸</td>
              </tr>
              <tr class="detail-row hidden" id="detail-d-${rid}"><td colspan="9">${makeDetailContent(r)}</td></tr>`).join('')}
            </tbody>
          </table>
          <table class="mobile-table">
            <colgroup><col class="m1"><col class="m2"><col class="m3"><col class="m4"></colgroup>
            <thead><tr><th>Order</th><th>Time</th><th>Refund</th><th></th></tr></thead>
            <tbody>${desktopRows.map(({rid,r})=>`
              <tr class="data-row" id="row-m-${rid}" onclick="toggleDetail(${rid})">
                <td class="order-id">#${r.orderId}</td><td>${r.time}</td>
                <td class="refund-amt">£${r.refund.toFixed(2)}</td>
                <td class="expand-btn">▸</td>
              </tr>
              <tr class="detail-row hidden" id="detail-m-${rid}"><td colspan="4">${makeDetailContent(r)}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    });
  });
  document.getElementById('content').innerHTML = html || '<div class="loading">No data found</div>';
  document.getElementById('subtitle').textContent = `Last updated: ${new Date().toLocaleString('en-GB')}`;
}

async function init() {
  try {
    [allData, salesData] = await Promise.all([fetchDetails(), fetchSales()]);
    render(allData);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:#c62828;">Failed: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
