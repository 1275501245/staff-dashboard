<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Hours Rules · HDL Delivery Kitchen</title>
<style>
  :root{
    --brand:#C8102E;
    --ink:#191C20; --muted:#636B76; --faint:#8A929D;
    --canvas:#F4F5F7; --surface:#FFFFFF; --line:#E5E8EC; --hair:#EEF0F3;
    --minus-txt:#B23B3B; --minus-bg:#FBECEC; --minus-line:#EFCBCB;
    --plus-txt:#1F7A48;  --plus-bg:#E6F2EA;  --plus-line:#C3E1CF;
    --zero-txt:#636B76;  --zero-bg:#F0F2F4;  --zero-line:#E1E5EA;
    --std-txt:#2B5C9B; --std-bg:#EAF1FA; --std-line:#CFE0F2;
    --rec-txt:#7A6100; --rec-bg:#FBF4DC; --rec-line:#EDE0B4;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--canvas); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:0 16px 64px;
  }
  .wrap{max-width:860px;margin:0 auto}

  header{padding:30px 0 4px}
  h1{margin:0;font-size:26px;font-weight:800;letter-spacing:-.02em}

  .list{margin-top:22px;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px}
  .card .item{font-size:16px;font-weight:800;color:var(--ink);line-height:1.35;margin-bottom:4px}

  .details{display:flex;flex-direction:column}
  .detail{display:flex;align-items:flex-start;gap:14px;padding:11px 0}
  .detail + .detail{border-top:1px solid var(--hair)}
  .detail .bar{flex:none;width:3px;align-self:stretch;min-height:20px;border-radius:2px;margin-top:2px}
  .detail.minus .bar{background:var(--minus-txt)}
  .detail.plus  .bar{background:var(--plus-txt)}
  .detail.zero  .bar{background:var(--zero-line)}
  .detail .rtext{flex:1;font-size:14px;color:var(--muted);line-height:1.5}
  .detail .hours{flex:none;font-weight:800;font-size:14px;font-variant-numeric:tabular-nums;
    padding:7px 13px;border-radius:10px;white-space:nowrap;text-align:center}
  .detail.minus .hours{color:var(--minus-txt);background:var(--minus-bg);border:1px solid var(--minus-line)}
  .detail.plus  .hours{color:var(--plus-txt); background:var(--plus-bg); border:1px solid var(--plus-line)}
  .detail.zero  .hours{color:var(--zero-txt); background:var(--zero-bg); border:1px solid var(--zero-line)}

  .refs{margin-top:13px;padding-top:12px;border-top:1px dashed var(--line);
    display:flex;flex-wrap:wrap;gap:8px 16px}
  .ref{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .ref .rtag{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 7px;border-radius:5px}
  .ref .rtag.std{color:var(--std-txt);background:var(--std-bg);border:1px solid var(--std-line)}
  .ref .rtag.rec{color:var(--rec-txt);background:var(--rec-bg);border:1px solid var(--rec-line)}
  .ref a{color:var(--ink);text-decoration:none;font-weight:600;border-bottom:1px solid var(--line)}
  .ref a:hover{border-bottom-color:var(--brand);color:var(--brand)}
  .ref .plain{color:var(--ink);font-weight:600}

  .empty{background:var(--surface);border:1px dashed var(--line);border-radius:14px;
    padding:44px 20px;text-align:center;color:var(--muted)}

  @media (max-width:560px){
    .detail{flex-wrap:wrap}
    .detail .rtext{min-width:0}
    .detail .hours{margin-left:17px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Working Hours Rules</h1>
  </header>
  <main id="list" class="list" aria-live="polite"></main>
</div>

<script>
const SHEET_ID = "189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc";
const SHEET_NAME = "HoursRules";
// Row layout: A Item | B Rule | C Hours | then repeating (Ref, RefType, RefURL) triplets: D/E/F, G/H/I, J/K/L, ...
// Rows sharing the same Item merge into ONE card. Each row = one rule line (Rule + Hours). Refs are pooled & de-duped.

/* Fallback — used only if the live sheet is unreachable. Live data drives the page. */
const FALLBACK = [
  { item:"Kitchen Standard Checking", rule:"Any checklist item that is not up to standard = −0.25 working hours per item. Items not on the checklist will not be checked. Checklist updates will be shared in the group.", hours:"−0.25 / item", refs:[
    { ref:"Kitchen Standards", reftype:"Standard", refurl:"https://docs.google.com/spreadsheets/d/1XU-jCtTVIWB-wtu1SDsaFJ0C5Zrpg3R8s-lubtu1KDk/edit?gid=2142851671" },
    { ref:"Kitchen Checking Record", reftype:"Record", refurl:"https://docs.google.com/spreadsheets/d/1XU-jCtTVIWB-wtu1SDsaFJ0C5Zrpg3R8s-lubtu1KDk/edit?gid=2142851671" },
  ]},
  { item:"Product Quality", rule:"Any checklist item that is not up to standard = −0.25 working hours per item. Items not on the checklist will not be checked. Checklist updates will be shared in the group.", hours:"−0.25 / item", refs:[
    { ref:"Product Quality Standards", reftype:"Standard", refurl:"/product-quality" },
    { ref:"Product Quality Checking Record", reftype:"Record", refurl:"https://docs.google.com/spreadsheets/d/1i6r0w8gt6D2R0lv8eHUh7vtKCYszOpO9Q3Q5EQ7nu4Q/edit?gid=2104766772" },
  ]},
  { item:"Customer Refunds", rule:"No deduction for malicious refund requests or refunds without a valid reason.", hours:"−0.25 / item", refs:[
    { ref:"Product Quality Standards", reftype:"Standard", refurl:"/product-quality" },
    { ref:"Customer Refunds Records", reftype:"Record", refurl:"https://drive.google.com/drive/folders/1DzzNJI7cKz8ZuIbehr7de3YCu4A4QW9v" },
  ]},
  { item:"Customer Refunds", rule:"Zero Refunds (Weekly)", hours:"+0.5 / item", refs:[] },
];

const $ = s=>document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const sign = h => { const t=String(h).trim(); return /^[−-]/.test(t)?"minus":(/^\+/.test(t)?"plus":"zero"); };
const refCls = t => { const s=String(t||"").toLowerCase(); return (s.includes("record")||s.includes("记")||s.includes("扣"))?"rec":"std"; };

async function loadLive(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
  const res=await fetch(url,{cache:"no-store"});
  const text=await res.text();
  const json=JSON.parse(text.slice(text.indexOf("{"),text.lastIndexOf("}")+1));
  const cols=(json.table.cols||[]).length;
  const rows=json.table.rows||[]; const out=[];
  for(const r of rows){
    const c=r.c||[]; const v=i=>c[i]?(c[i].v!=null?String(c[i].v):(c[i].f!=null?String(c[i].f):"")):"";
    const item=v(0).trim();
    if(!item || item.toLowerCase()==="item") continue;
    const refs=[];
    for(let i=3;i<cols;i+=3){
      const ref=v(i).trim(), reftype=v(i+1).trim(), refurl=v(i+2).trim();
      if(ref) refs.push({ref,reftype,refurl});
    }
    out.push({item, rule:v(1).trim(), hours:v(2).trim(), refs});
  }
  if(!out.length) throw new Error("no rows");
  return out;
}

/* Merge rows by Item: one card, many rule lines, pooled + de-duped refs. */
function groupByItem(rows){
  const map=new Map(); const order=[];
  rows.forEach(r=>{
    if(!map.has(r.item)){ map.set(r.item,{item:r.item,details:[],refs:[],seen:new Set()}); order.push(r.item); }
    const g=map.get(r.item);
    g.details.push({rule:r.rule,hours:r.hours});
    (r.refs||[]).forEach(x=>{
      const key=(x.ref+"|"+x.refurl).toLowerCase();
      if(!g.seen.has(key)){ g.seen.add(key); g.refs.push(x); }
    });
  });
  return order.map(k=>map.get(k));
}

function detailHTML(d){
  const s=sign(d.hours);
  return `<div class="detail ${s}">
    <span class="bar" aria-hidden="true"></span>
    <div class="rtext">${esc(d.rule)}</div>
    <div class="hours">${esc(d.hours)}</div>
  </div>`;
}
function refHTML(x){
  const tag = x.reftype ? `<span class="rtag ${refCls(x.reftype)}">${esc(x.reftype)}</span>` : "";
  const name = x.refurl
    ? `<a href="${esc(x.refurl)}" target="_blank" rel="noopener">${esc(x.ref)} ↗</a>`
    : `<span class="plain">${esc(x.ref)}</span>`;
  return `<span class="ref">${tag}${name}</span>`;
}

function render(rows){
  const el=$("#list"); el.innerHTML="";
  const groups=groupByItem(rows);
  if(!groups.length){ el.innerHTML=`<div class="empty">No rules yet.</div>`; return; }
  groups.forEach(g=>{
    const details=g.details.map(detailHTML).join("");
    const refs=g.refs.length?`<div class="refs">${g.refs.map(refHTML).join("")}</div>`:"";
    el.insertAdjacentHTML("beforeend",
      `<div class="card">
        <div class="item">${esc(g.item)}</div>
        <div class="details">${details}</div>
        ${refs}
      </div>`);
  });
}

async function init(){
  let data;
  try{ data=await loadLive(); }catch(e){ data=FALLBACK.slice(); }
  render(data);
}
init();
</script>
</body>
</html>
