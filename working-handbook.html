<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Handbook</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f3f0;
  color: #1a1917;
  padding: 16px;
  padding-bottom: 40px;
}

.header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid #e0ddd8; background: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #555; flex-shrink: 0; text-decoration: none;
}
.header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

.tabs {
  display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px;
  padding-bottom: 2px; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 99px;
  font-size: 12px; cursor: pointer; white-space: nowrap;
  border: 0.5px solid transparent; color: #999; background: transparent;
  transition: all 0.2s;
}
.tab.active {
  background: #fff; border-color: #d0cdc8;
  color: #1a1917; font-weight: 600;
}

.section { display: none; flex-direction: column; gap: 8px; }
.section.active { display: flex; }

.card {
  background: #eceae4;
  border-radius: 14px; padding: 14px 16px;
  border-left: 3px solid #c8c5be;
}
.card.warning {
  background: #fff0ed;
  border-left: 3px solid #E24B4A;
}
.clause {
  font-size: 11px; font-weight: 600; color: #999;
  margin-bottom: 6px; letter-spacing: 0.04em;
}
.card.warning .clause { color: #A32D2D; }
.warning-badge {
  display: inline-block;
  font-size: 10px; background: #FCEBEB; color: #A32D2D;
  border-radius: 4px; padding: 2px 7px; font-weight: 600;
  margin-left: 6px; vertical-align: middle;
}
.content {
  font-size: 13px; color: #333; line-height: 1.65;
  white-space: pre-line;
}
.card.warning .content { color: #2a1a1a; }

.state-msg {
  text-align: center; padding: 60px 20px;
  color: #aaa; font-size: 14px; line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="/home">&#8592;</a>
  <div class="header-text">
    <h1>Working Handbook</h1>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div id="content"><div class="state-msg">Loading...</div></div>

<script>
const SHEET_ID   = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'Working Handbook';

let sections = {};
let sectionOrder = [];

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch');
  return res.text();
}

// 正确处理跨行 cell 的 CSV 解析器（逐字符，不预先按换行分割）
function parseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') {
        if (text[i+1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = false;
      } else {
        cur += ch;
      }
    } else {
      if (ch === '"') {
        inQ = true;
      } else if (ch === ',') {
        row.push(cur); cur = '';
      } else if (ch === '\n') {
        row.push(cur); cur = '';
        rows.push(row); row = [];
      } else if (ch === '\r') {
        // skip
      } else {
        cur += ch;
      }
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

async function load() {
  try {
    const csv  = await fetchSheet(SHEET_NAME);
    const rows = parseCSV(csv).slice(1); // skip header

    rows.forEach(r => {
      const section = (r[0] || '').trim();
      const clause  = (r[1] || '').trim();
      const content = (r[2] || '').trim();
      const type    = (r[3] || '').trim().toLowerCase();
      if (!clause || !content) return;
      if (!sections[section]) { sections[section] = []; sectionOrder.push(section); }
      sections[section].push({ clause, content, type });
    });

    renderTabs();
    renderSection(0);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="state-msg">Failed to load. Check your connection and try again.</div>';
  }
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = sectionOrder.map((s, i) =>
    `<div class="tab ${i===0?'active':''}" onclick="renderSection(${i})">${s}</div>`
  ).join('');
}

function renderSection(idx) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', i === idx)
  );
  const rows = sections[sectionOrder[idx]] || [];
  document.getElementById('content').innerHTML = `
    <div class="section active">
      ${rows.map(row => `
        <div class="card ${row.type === 'warning' ? 'warning' : ''}">
          <div class="clause">${row.clause}${row.type === 'warning' ? '<span class="warning-badge">Serious breach</span>' : ''}</div>
          <div class="content">${row.content}</div>
        </div>
      `).join('')}
    </div>`;
}

load();
</script>
</body>
</html>
