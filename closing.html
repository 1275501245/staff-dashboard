<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closing Checklist</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f3f0;
  color: #1a1917;
  padding: 16px;
  padding-bottom: 40px;
}

.header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid #e0ddd8; background: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #555; flex-shrink: 0; text-decoration: none;
}
.header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-text p  { font-size: 12px; color: #888; margin-top: 1px; }

.progress-wrap {
  background: #fff; border-radius: 14px; border: 1px solid #e8e6e1;
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.progress-track { flex: 1; height: 7px; background: #ede9e3; border-radius: 99px; overflow: hidden; }
.progress-fill  { height: 100%; background: #2a7a4b; border-radius: 99px; transition: width 0.35s ease; width: 0%; }
.progress-label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }

.section-header {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: #555;
  padding: 6px 10px; margin: 20px 0 8px;
  background: #e4e1da; border-radius: 8px;
}
.urgent .section-header { color: #bf3b10; }

.category-card {
  background: #fff; border: 1.5px solid #e8e6e1;
  border-radius: 14px; margin-bottom: 10px; overflow: hidden;
  transition: border-color 0.25s, background 0.25s;
}
.urgent .category-card          { border-color: #f5c0aa; background: #fff8f5; }
.urgent .category-card.done     { background: #f0faf4; border-color: #a8d5bc; }
.category-card.done             { background: #f0faf4; border-color: #a8d5bc; }

.cat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; gap: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.cat-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; line-height: 1.2; }
.urgent .cat-title              { color: #bf3b10; }
.urgent .category-card.done .cat-title { color: #2a7a4b; }
.category-card.done .cat-title  { color: #2a7a4b; }
.cat-count { font-size: 12px; color: #aaa; margin-top: 2px; }

.check-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid #d0cdc8; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.check-btn svg { display: none; }
.category-card.done .check-btn  { background: #2a7a4b; border-color: #2a7a4b; }
.category-card.done .check-btn svg { display: block; }

.item-list { border-top: 1px solid #f0ece6; padding: 4px 16px 14px; }
.item-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid #f5f3f0;
  font-size: 13px; line-height: 1.5; color: #555;
}
.item-row:last-child { border-bottom: none; padding-bottom: 0; }
.item-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; flex-shrink: 0; margin-top: 7px; }
.category-card.done .item-row { color: #7ab898; }
.category-card.done .item-dot { background: #a8d5bc; }

.done-banner {
  display: none; background: linear-gradient(135deg, #2a7a4b, #3a9a5c);
  color: #fff; border-radius: 14px; padding: 18px 20px;
  text-align: center; margin-bottom: 16px;
}
.done-banner.visible { display: block; }
.done-banner h2 { font-size: 17px; font-weight: 700; }
.done-banner p  { font-size: 13px; opacity: 0.85; margin-top: 4px; }

.state-msg { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; line-height: 1.6; }
.state-msg .emoji { font-size: 32px; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="/home">&#8592;</a>
  <div class="header-text">
    <h1>Closing Checklist</h1>
    <p>Complete all tasks before leaving</p>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="pfill"></div></div>
  <div class="progress-label" id="plabel">0 / 0</div>
</div>

<div class="done-banner" id="done-banner">
  <h2>✓ All Done!</h2>
  <p>All closing tasks completed. Safe travels!</p>
</div>

<div id="content">
  <div class="state-msg"><span class="emoji">⏳</span>Loading checklist…</div>
</div>

<script>
const SHEET_ID   = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'Closing';

const state = {};
let totalCats = 0;

async function load() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    const rows = json.table.rows
      .map(r => ({
        section:  (r.c[0]?.v || '').trim(),
        category: (r.c[1]?.v || '').trim(),
        item:     (r.c[2]?.v || '').trim(),
      }))
      .filter(r => r.category && r.item);
    render(rows);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="state-msg"><span class="emoji">⚠️</span>Failed to load checklist.<br>Check your connection and try again.</div>';
  }
}

function render(rows) {
  const sectionMap = {};
  const sectionOrder = [];
  rows.forEach(({ section, category, item }) => {
    if (!sectionMap[section]) { sectionMap[section] = {}; sectionOrder.push(section); }
    if (!sectionMap[section][category]) sectionMap[section][category] = [];
    sectionMap[section][category].push(item);
  });

  let cardIdx = 0;
  totalCats = 0;
  sectionOrder.forEach(s => totalCats += Object.keys(sectionMap[s]).length);

  let html = '';
  sectionOrder.forEach(sec => {
    const isUrgent = /urgent/i.test(sec);
    const label    = isUrgent ? '⚠️ ' + sec : sec;
    html += `<div class="${isUrgent ? 'urgent' : ''}"><div class="section-header">${label}</div>`;
    Object.entries(sectionMap[sec]).forEach(([cat, items]) => {
      const idx = cardIdx++;
      state[idx] = false;
      html += `
        <div class="category-card" id="card-${idx}">
          <div class="cat-header" onclick="toggle(${idx})">
            <div>
              <div class="cat-title">${cat}</div>
              <div class="cat-count">${items.length} item${items.length !== 1 ? 's' : ''}</div>
            </div>
            <button class="check-btn" onclick="toggle(${idx});event.stopPropagation()">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7L5.5 10.5L12 3.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="item-list">
            ${items.map(i => `<div class="item-row"><span class="item-dot"></span><span>${i}</span></div>`).join('')}
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('content').innerHTML = html;
  updateProgress();
}

function toggle(idx) {
  state[idx] = !state[idx];
  document.getElementById('card-' + idx).classList.toggle('done', state[idx]);
  updateProgress();
}

function updateProgress() {
  const done = Object.values(state).filter(Boolean).length;
  const pct  = totalCats ? (done / totalCats) * 100 : 0;
  document.getElementById('pfill').style.width  = pct + '%';
  document.getElementById('plabel').textContent = `${done} / ${totalCats}`;
  document.getElementById('done-banner').classList.toggle('visible', done === totalCats && totalCats > 0);
}

load();
</script>
</body>
</html>
