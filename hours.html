<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Staff Hours</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
  --border:#e2e0d8;--border2:#d0cec6;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --green:#1d7a4a;--green-bg:#edf7f1;
  --amber:#b8860b;--amber-bg:#fef9ec;
  --red:#c0392b;--red-bg:#fdf0ee;
  --pink:#a03060;--pink-bg:#fff0f6;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --tow:#854f0b;--tow-bg:#faeeda;
  --radius:10px;--radius-sm:6px;
  --font:'system-ui',-apple-system,sans-serif;
  --mono:'ui-monospace','Menlo',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--font);cursor:pointer}
input,select{font-family:var(--font)}

/* ── NAV TABS ── */
.page-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;gap:0;position:sticky;top:0;z-index:50}
.page-nav button{background:none;border:none;padding:.75rem 1.1rem;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.page-nav button.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.err-banner{background:var(--red-bg);color:var(--red);padding:.75rem 1rem;font-size:13px;border-radius:var(--radius);margin:1rem}

/* ── PAGE WRAPPER ── */
.page{display:none;padding:1.25rem;max-width:900px;margin:0 auto}
.page.active{display:block}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.top-bar h2{font-size:17px;font-weight:500;flex:1;min-width:100px}
.date-nav{display:flex;align-items:center;gap:5px}
.nav-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 9px;color:var(--text)}
.nav-btn:hover{background:var(--surface2)}
.date-lbl{font-size:13px;font-weight:500;min-width:155px;text-align:center}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text)}
.icon-btn:hover{background:var(--surface2)}
.save-btn{background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:500}
.save-btn:hover{opacity:.85}
.save-btn:disabled{opacity:.4;cursor:default}

/* ── BIZ ROW ── */
.biz-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:var(--surface2);border-radius:var(--radius);padding:.65rem .9rem;font-size:12px;flex-wrap:wrap}
.biz-row label{color:var(--text2);white-space:nowrap}
.biz-row input[type=time]{background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:3px 6px;font-size:12px}
.biz-info{font-size:11px;color:var(--text3);margin-left:auto}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem}
.sc{background:var(--surface2);border-radius:var(--radius);padding:.75rem .9rem}
.sc-label{font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.sc-val{font-size:20px;font-weight:500}
.sc-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ── WEEK BAR ── */
.week-bar{font-size:12px;color:var(--text2);margin-bottom:1rem;padding:.6rem .9rem;background:var(--surface2);border-radius:var(--radius)}
.week-bar strong{color:var(--text)}

/* ── EMPLOYEE CARD ── */
.card-list{display:flex;flex-direction:column;gap:6px}
.emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.emp-card.s-ok{border-left:3px solid var(--green)}
.emp-card.s-warn{border-left:3px solid var(--amber)}
.emp-card.s-peak{border-left:3px solid var(--pink)}
.emp-card.s-empty{border-left:3px solid var(--border)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;padding:.7rem .9rem .55rem;gap:8px;flex-wrap:wrap}
.card-name{font-size:13px;font-weight:600}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.card-sched{font-size:11px;color:var(--text3);font-family:var(--mono)}
.card-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.peak-btn{background:none;border:1px solid var(--border2);border-radius:10px;padding:2px 9px;font-size:10px;color:var(--text2)}
.peak-btn:hover{background:var(--surface2)}
.peak-btn.on{background:var(--pink-bg);color:var(--pink);border-color:#f0b8d4}
.del-btn{background:none;border:none;color:var(--text3);padding:3px;border-radius:4px;font-size:16px;line-height:1}
.del-btn:hover{color:var(--text)}

.site-sel{background:transparent;border:1px solid var(--border2);border-radius:10px;padding:1px 6px;font-size:11px;color:var(--text2);outline:none}

.card-fields{display:grid;grid-template-columns:repeat(6,1fr);border-top:1px solid var(--border)}
.field{padding:.55rem .7rem;border-right:1px solid var(--border)}
.field:last-child{border-right:none}
.field-label{font-size:10px;color:var(--text2);margin-bottom:4px;white-space:nowrap}
.time-inp{width:100%;background:transparent;border:none;font-size:13px;outline:none;cursor:pointer;padding:0;color:var(--text)}
.val{font-size:13px;font-weight:500;font-family:var(--mono)}
.val-ok{color:var(--green)}.val-warn{color:var(--amber)}.val-muted{color:var(--text3)}.val-final{font-size:14px}
.adj-inp{width:65px;background:transparent;border:none;font-size:13px;font-family:var(--mono);outline:none;color:var(--text)}

.break-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.break-box{width:18px;height:18px;border:1px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.break-box.checked{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.break-box.unchecked{background:var(--red-bg);border-color:#e0a090;color:var(--red)}
.break-box.unset{background:var(--surface2);color:var(--text3)}
.break-lbl{font-size:11px;color:var(--text2)}
.break-lbl.checked{color:var(--green)}.break-lbl.unchecked{color:var(--red)}

.card-note{display:flex;align-items:center;gap:8px;padding:.45rem .9rem;border-top:1px solid var(--border);background:var(--surface2)}
.note-inp{flex:1;background:transparent;border:none;font-size:11px;color:var(--text2);outline:none}
.note-inp::placeholder{color:var(--text3)}
.note-label{font-size:10px;color:var(--text3);white-space:nowrap}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-peak{background:var(--pink-bg);color:var(--pink)}
.b-adj-pos{background:var(--green-bg);color:var(--green)}
.b-adj-neg{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-tow{background:var(--tow-bg);color:var(--tow)}
.b-sho{background:var(--green-bg);color:var(--green)}

/* ── SAVE STATUS ── */
.save-status{font-size:11px;color:var(--text3);margin-left:4px}
.save-status.ok{color:var(--green)}
.save-status.err{color:var(--red)}

/* ── ROSTER TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:650px}
thead tr{background:var(--surface2)}
th{font-size:11px;font-weight:500;color:var(--text2);padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap}
th:last-child{border-right:none}
th.name-col{text-align:left}
td{padding:6px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle}
td:last-child{border-right:none}
tr:last-child td{border-bottom:none}
.name-cell{display:flex;align-items:center;gap:6px}
.emp-name-r{font-size:12px;font-weight:600}
.emp-site-r{font-size:10px;color:var(--text3)}
.shift-cell{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:85px}
.time-row{display:flex;align-items:center;gap:2px}
.t-inp{width:66px;background:transparent;border:none;font-size:11px;font-family:var(--mono);outline:none;cursor:pointer;text-align:center;color:var(--text)}
.t-inp:focus{background:var(--surface2);border-radius:3px}
.t-sep{font-size:10px;color:var(--text3)}
.cell-tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;cursor:pointer;border:none;font-family:var(--font)}
.tag-off{background:var(--red-bg);color:var(--red)}
.tag-on{background:var(--green-bg);color:var(--green)}
.off-cell{background:#fdf7f5}
.today-col{background:#f0f8f3}
.today-hdr .day-name{color:var(--green)}
.today-hdr .day-date{color:var(--green)}
.day-col-header{display:flex;flex-direction:column;align-items:center;gap:1px}
.day-name{font-size:11px;font-weight:500}
.day-date{font-size:10px;color:var(--text3);font-weight:400}
.site-sel-r{background:transparent;border:none;font-size:10px;color:var(--text3);cursor:pointer;outline:none;max-width:68px}
.hrs-cell{font-size:12px;font-weight:500;font-family:var(--mono);text-align:center;color:var(--text)}
.hrs-muted{color:var(--text3)}
.legend{display:flex;gap:12px;font-size:11px;color:var(--text2);margin-bottom:.75rem;flex-wrap:wrap;align-items:center}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem;width:300px;max-width:92vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:.9rem}
.frow{margin-bottom:.75rem}
.frow label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.frow input,.frow select{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 9px;font-size:13px;background:var(--surface)}
.mbtns{display:flex;gap:8px;margin-top:.9rem;justify-content:flex-end}
.btn-c{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 13px;font-size:12px}
.btn-ok{background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 13px;font-size:12px}

/* ── SETUP BANNER ── */
.setup-box{background:var(--amber-bg);border:1px solid #e6c84a;border-radius:var(--radius);padding:1rem;margin-bottom:1rem;font-size:13px}
.setup-box h3{font-size:14px;font-weight:600;color:var(--amber);margin-bottom:.5rem}
.setup-box input{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 9px;font-size:12px;margin-top:.5rem;font-family:var(--mono)}
.setup-box button{margin-top:.5rem;background:var(--amber);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 14px;font-size:12px}
</style>
</head>
<body>

<!-- NAV -->
<nav class="page-nav">
  <button class="active" onclick="showPage('hours')">Daily hours</button>
  <button onclick="showPage('roster')">Roster</button>
</nav>

<!-- ══════════════ HOURS PAGE ══════════════ -->
<div class="page active" id="page-hours">

  <div id="setup-banner" style="display:none">
    <div class="setup-box">
      <h3>⚙️ First-time setup</h3>
      Paste your Apps Script Web App URL below, then click Save.
      <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/...">
      <button onclick="saveScriptUrl()">Save URL</button>
    </div>
  </div>

  <div style="padding:1.25rem">
    <div class="top-bar">
      <h2>Daily hours</h2>
      <div class="date-nav">
        <button class="nav-btn" onclick="changeDay(-1)">&#8249;</button>
        <span class="date-lbl" id="date-lbl"></span>
        <button class="nav-btn" onclick="changeDay(1)">&#8250;</button>
      </div>
      <button class="icon-btn" onclick="showAddModal()">+ Add staff</button>
      <button class="save-btn" id="save-btn" onclick="saveToSheet()">Save to Sheet</button>
      <span class="save-status" id="save-status"></span>
    </div>

    <div class="biz-row">
      <label>Open</label>
      <input type="time" id="biz-o" value="09:00" onchange="render()">
      <label style="margin-left:6px">Close</label>
      <input type="time" id="biz-c" value="22:00" onchange="render()">
      <span class="biz-info" id="biz-info"></span>
    </div>

    <div class="stats" id="stats"></div>
    <div class="week-bar" id="week-bar"></div>
    <div class="card-list" id="card-list"></div>
  </div>
</div>

<!-- ══════════════ ROSTER PAGE ══════════════ -->
<div class="page" id="page-roster">
  <div style="padding:1.25rem">
    <div class="top-bar">
      <h2>Weekly roster</h2>
      <div class="date-nav">
        <button class="nav-btn" onclick="changeWeek(-1)">&#8249;</button>
        <span class="week-lbl" id="week-lbl"></span>
        <button class="nav-btn" onclick="changeWeek(1)">&#8250;</button>
      </div>
      <button class="icon-btn" onclick="goToday()">&#128197; This week</button>
      <button class="icon-btn" onclick="showAddModal()">+ Add staff</button>
      <button class="save-btn" id="roster-save-btn" onclick="saveRosterToSheet()">Save to Sheet</button>
      <span class="save-status" id="roster-save-status"></span>
    </div>

    <div class="stats" id="roster-stats"></div>

    <div class="legend">
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--green-bg);display:inline-block"></span>Working
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--red-bg);display:inline-block"></span>Off
      </span>
      <span style="color:var(--text3)">Click hours to edit · click On/Off to toggle</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead id="roster-thead"></thead>
        <tbody id="roster-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ADD STAFF MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add staff member</h3>
    <div class="frow"><label>Full name</label><input type="text" id="n-name" placeholder="e.g. Sarah Chen"></div>
    <div class="frow"><label>Default site</label>
      <select id="n-site">
        <option value="">— no default —</option>
        <option value="Battersea">Battersea</option>
        <option value="Shoreditch">Shoreditch</option>
        <option value="Tower Bridge">Tower Bridge</option>
      </select>
    </div>
    <div class="frow"><label>Default start</label><input type="time" id="n-in" value="09:00"></div>
    <div class="frow"><label>Default end</label><input type="time" id="n-out" value="17:00"></div>
    <div class="mbtns">
      <button class="btn-c" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG — paste your Apps Script URL here OR enter in the setup banner
// ═══════════════════════════════════════
let SCRIPT_URL = localStorage.getItem('hoursScriptUrl') || 'https://script.google.com/macros/s/AKfycbyh_F4jPG5xRFkaYskJOrvBBui7bx-hCVlK1RPeCSn7PFq_W7F3FvVWtrQtnnX-fWKrbA/exec';

const DAYS_SHORT=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SITES=['','Battersea','Shoreditch','Tower Bridge'];

// ── STATE ──
let curDate = new Date();
let weekStart = getMonday(new Date());
let dailyData = {}; // { 'YYYY-MM-DD': { staffId: entry } }
let rosterData = {}; // { 'YYYY-MM-DD': { staffId: shift } }
let staff = [
  {id:'s1',name:'Alex M.',defSite:'Battersea',defIn:'09:00',defOut:'17:00'},
  {id:'s2',name:'Jamie K.',defSite:'Shoreditch',defIn:'11:00',defOut:'19:00'},
  {id:'s3',name:'Sam T.',defSite:'Tower Bridge',defIn:'09:00',defOut:'15:00'},
];
let nextId = 4;
let currentPage = 'hours';

// ── UTILS ──
function dk(d){return d.toISOString().slice(0,10);}
function toM(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function fmtH(m){return(m/60).toFixed(1)+'h';}
function getMonday(d){const c=new Date(d);const day=c.getDay();c.setDate(c.getDate()-(day===0?6:day-1));c.setHours(0,0,0,0);return c;}
function isToday(d){const t=new Date();return dk(d)===dk(t);}

function bizM(){
  const o=toM(document.getElementById('biz-o').value);
  const c=toM(document.getElementById('biz-c').value);
  return(o!==null&&c!==null)?Math.max(0,c-o):0;
}

function getEntry(d,id){
  const k=dk(d);
  if(!dailyData[k])dailyData[k]={};
  if(!dailyData[k][id]){
    const s=staff.find(x=>x.id===id);
    // Pull scheduled times from roster if available
    const shift=getRosterShift(d,id);
    dailyData[k][id]={
      in:'',out:'',
      site:shift?shift.site:(s?s.defSite:''),
      brk:null,adj:'',note:'',peak:false,
      schedIn:shift&&!shift.off?(shift.in||s.defIn):(s?s.defIn:'09:00'),
      schedOut:shift&&!shift.off?(shift.out||s.defOut):(s?s.defOut:'17:00'),
    };
  }
  return dailyData[k][id];
}

function getRosterShift(d,id){
  const k=dk(d);
  if(!rosterData[k])return null;
  return rosterData[k][id]||null;
}

function getShift(d,id){
  const k=dk(d);
  if(!rosterData[k])rosterData[k]={};
  if(!rosterData[k][id]){
    const s=staff.find(x=>x.id===id);
    rosterData[k][id]={off:false,in:s?s.defIn:'09:00',out:s?s.defOut:'17:00',site:s?s.defSite:''};
  }
  return rosterData[k][id];
}

function presentCount(d){
  let n=0;
  staff.forEach(s=>{const e=getEntry(d,s.id);const i=toM(e.in),o=toM(e.out);if(i!==null&&o!==null&&o>i)n++;});
  return n;
}

function brkMins(e,workedM){
  if(e.peak)return 0;
  if(e.brk===false)return 0;
  if(e.brk===true){const pc=presentCount(curDate);return pc>=2?30:60;}
  const half=bizM()/2;
  if(workedM<half)return 0;
  const pc=presentCount(curDate);
  return pc>=2?30:60;
}

function parseAdj(v){if(!v||String(v).trim()==='')return 0;const n=parseFloat(v);return isNaN(n)?0:n;}

function cycleBrk(id){
  const e=getEntry(curDate,id);
  if(e.brk===null)e.brk=true;
  else if(e.brk===true)e.brk=false;
  else e.brk=null;
  render();
}

// ── PAGE SWITCH ──
function showPage(p){
  currentPage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.page-nav button').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&p==='hours')||(i===1&&p==='roster'));
  });
  if(p==='hours')render();
  if(p==='roster')renderRoster();
}

// ── HOURS RENDER ──
function render(){
  if(!document.getElementById('biz-o'))return;
  const bm=bizM();
  document.getElementById('biz-info').textContent=(bm/60).toFixed(1)+'h trading · break threshold: '+(bm/2/60).toFixed(1)+'h';

  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS_=MONTHS;
  document.getElementById('date-lbl').textContent=
    DAYS[curDate.getDay()]+', '+curDate.getDate()+' '+MONTHS_[curDate.getMonth()];

  const pc=presentCount(curDate);
  let totSched=0,totWorked=0,totPaid=0,totFinal=0,totPresent=0;
  staff.forEach(s=>{
    const e=getEntry(curDate,s.id);
    const si=toM(e.schedIn),so=toM(e.schedOut);
    if(si!==null&&so!==null)totSched+=so-si;
    const i=toM(e.in),o=toM(e.out);
    if(i!==null&&o!==null&&o>i){
      const wm=o-i;const brk=brkMins(e,wm);const paid=wm-brk;
      totWorked+=wm;totPaid+=paid;totFinal+=paid+parseAdj(e.adj)*60;totPresent++;
    }
  });

  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sc-label">Staff</div><div class="sc-val">${staff.length}</div><div class="sc-sub">${totPresent} clocked in</div></div>
    <div class="sc"><div class="sc-label">Scheduled</div><div class="sc-val">${fmtH(totSched)}</div><div class="sc-sub">from roster</div></div>
    <div class="sc"><div class="sc-label">Paid hrs</div><div class="sc-val">${totPresent?fmtH(totPaid):'—'}</div><div class="sc-sub">after breaks</div></div>
    <div class="sc"><div class="sc-label">Final hrs</div><div class="sc-val" style="color:${totFinal<totPaid?'var(--amber)':totFinal>totPaid?'var(--green)':'var(--text)'}">${totPresent?fmtH(totFinal):'—'}</div><div class="sc-sub">after adjustments</div></div>
  `;

  renderWeekBar();

  const list=document.getElementById('card-list');
  if(!staff.length){list.innerHTML='<div class="loading">No staff — click Add staff</div>';return;}

  list.innerHTML=staff.map(s=>{
    const e=getEntry(curDate,s.id);
    const i=toM(e.in),o=toM(e.out);
    const hasT=i!==null&&o!==null&&o>i;
    const wm=hasT?o-i:0;
    const brk=hasT?brkMins(e,wm):0;
    const paid=hasT?wm-brk:0;
    const adjH=parseAdj(e.adj);
    const finalM=paid+adjH*60;
    const schedM=(toM(e.schedIn)!==null&&toM(e.schedOut)!==null)?toM(e.schedOut)-toM(e.schedIn):0;
    const diff=finalM-schedM;

    let cardClass='s-empty';
    if(hasT){cardClass=e.peak?'s-peak':diff<-15?'s-warn':'s-ok';}

    const site=e.site||'';
    const siteBadgeClass={'Battersea':'b-blue','Shoreditch':'b-sho','Tower Bridge':'b-tow'}[site]||'';
    const siteTag=site?`<span class="badge ${siteBadgeClass}">${site}</span>`:'';
    const siteOpts=SITES.map(sv=>`<option value="${sv}" ${e.site===sv?'selected':''}>${sv||'— site —'}</option>`).join('');
    const siteSelect=`<select class="site-sel" onchange="updEntry('${s.id}','site',this.value)">${siteOpts}</select>`;

    let brkState,brkIcon,brkLbl;
    const half=bizM()/2;
    const qualifies=wm>=half;
    if(e.peak){brkState='unchecked';brkIcon='✕';brkLbl='No break (peak)';}
    else if(e.brk===true){brkState='checked';brkIcon='✓';brkLbl=brk+'min break';}
    else if(e.brk===false){brkState='unchecked';brkIcon='✕';brkLbl='No break';}
    else{brkState='unset';brkIcon='–';brkLbl='Auto';}

    const adjH_disp=adjH!==0?`<span class="badge ${adjH>0?'b-adj-pos':'b-adj-neg'}">${adjH>0?'+':''}${adjH}h</span>`:'';
    const statusBadge=hasT&&!e.peak?(Math.abs(diff)<=15?'<span class="badge b-ok">On time</span>':diff<0?`<span class="badge b-warn">−${fmtH(Math.abs(diff))}</span>`:`<span class="badge b-ok">+${fmtH(diff)}</span>`):'';
    const peakBadge=e.peak?'<span class="badge b-peak">⚡ Peak</span>':'';
    const finalClass=!hasT?'val-muted':diff<-15?'val-warn':'val-ok';

    return `<div class="emp-card ${cardClass}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="card-name">${s.name}</div>
          <div class="card-meta">
            <span class="card-sched">${e.schedIn||'?'}–${e.schedOut||'?'}</span>
            ${siteSelect}${siteTag}
          </div>
        </div>
        <div class="card-actions">
          ${peakBadge}${adjH_disp}${statusBadge}
          <button class="peak-btn ${e.peak?'on':''}" onclick="togglePeak('${s.id}')">${e.peak?'⚡ Peak on':'Peak'}</button>
          <button class="del-btn" onclick="removeStaff('${s.id}')">&#x1F5D1;</button>
        </div>
      </div>
      <div class="card-fields">
        <div class="field"><div class="field-label">Clock in</div>
          <input type="time" class="time-inp" value="${e.in}" onchange="updEntry('${s.id}','in',this.value)"></div>
        <div class="field"><div class="field-label">Clock out</div>
          <input type="time" class="time-inp" value="${e.out}" onchange="updEntry('${s.id}','out',this.value)"></div>
        <div class="field"><div class="field-label">Break</div>
          ${hasT?`<label class="break-toggle" onclick="cycleBrk('${s.id}')">
            <span class="break-box ${brkState}">${brkIcon}</span>
            <span class="break-lbl ${brkState}">${brkLbl}</span>
          </label>`:'<span class="val val-muted">—</span>'}</div>
        <div class="field"><div class="field-label">Worked</div>
          <span class="val val-muted">${hasT?fmtH(wm):'—'}</span></div>
        <div class="field"><div class="field-label">Paid hrs</div>
          <span class="val ${hasT?'val-ok':'val-muted'}">${hasT?fmtH(paid):'—'}</span></div>
        <div class="field" style="border-right:none"><div class="field-label">Adjust (h)</div>
          <input type="number" class="adj-inp" step="0.5" placeholder="±0" value="${e.adj}" onchange="updEntry('${s.id}','adj',this.value)"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto;border-top:1px solid var(--border)">
        <div class="field" style="border-right:1px solid var(--border)">
          <div class="field-label">Note / reason for adjustment</div>
          <input class="note-inp" type="text" placeholder="e.g. late penalty, peak bonus..." value="${e.note}" onchange="updEntry('${s.id}','note',this.value)">
        </div>
        <div class="field" style="border-right:none;min-width:90px">
          <div class="field-label">Final hrs</div>
          <span class="val val-final ${finalClass}">${hasT?fmtH(finalM):'—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderWeekBar(){
  const d=new Date(curDate),dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
  let wFinal=0,dLogged=0;const siteTotals={};
  for(let i=0;i<7;i++){
    const wd=new Date(mon);wd.setDate(mon.getDate()+i);
    let hasAny=false,dayF=0;
    const pc=presentCount(wd);
    staff.forEach(s=>{
      const e=getEntry(wd,s.id);
      const i2=toM(e.in),o=toM(e.out);
      if(i2!==null&&o!==null&&o>i2){
        hasAny=true;
        const wm=o-i2;const brk=brkMins(e,wm);
        const f=wm-brk+parseAdj(e.adj)*60;
        dayF+=f;
        const site=e.site||'No site';
        siteTotals[site]=(siteTotals[site]||0)+f;
      }
    });
    if(hasAny){wFinal+=dayF;dLogged++;}
  }
  const ms=mon.getDate()+' '+MONTHS[mon.getMonth()];
  const me=new Date(mon);me.setDate(mon.getDate()+6);
  const meS=me.getDate()+' '+MONTHS[me.getMonth()];
  const siteStr=Object.entries(siteTotals).map(([k,v])=>`${k} ${fmtH(v)}`).join(' · ');
  document.getElementById('week-bar').innerHTML=
    `Week ${ms}–${meS} &nbsp;·&nbsp; <strong>${fmtH(wFinal)}</strong> final hrs &nbsp;·&nbsp; ${dLogged} days${siteStr?' &nbsp;| &nbsp;'+siteStr:''}`;
}

// ── ROSTER RENDER ──
function renderRoster(){
  const days=weekDays();
  const ms=days[0].getDate()+' '+MONTHS[days[0].getMonth()];
  const me=days[6].getDate()+' '+MONTHS[days[6].getMonth()]+' '+days[6].getFullYear();
  document.getElementById('week-lbl').textContent=ms+' – '+me;

  let totalShifts=0,totalHrs=0,offCount=0;
  staff.forEach(s=>{
    days.forEach(d=>{
      const sh=getShift(d,s.id);
      if(sh.off)offCount++;
      else{totalShifts++;const si=toM(sh.in),so=toM(sh.out);if(si&&so&&so>si)totalHrs+=so-si;}
    });
  });
  document.getElementById('roster-stats').innerHTML=`
    <div class="sc"><div class="sc-label">Staff</div><div class="sc-val">${staff.length}</div><div class="sc-sub">on roster</div></div>
    <div class="sc"><div class="sc-label">Shifts</div><div class="sc-val">${totalShifts}</div><div class="sc-sub">${offCount} off days</div></div>
    <div class="sc"><div class="sc-label">Total hrs</div><div class="sc-val">${fmtH(totalHrs)}</div><div class="sc-sub">scheduled this week</div></div>
    <div class="sc"><div class="sc-label">Avg / person</div><div class="sc-val">${staff.length?fmtH(totalHrs/staff.length):'—'}</div><div class="sc-sub">this week</div></div>
  `;

  const thead=document.getElementById('roster-thead');
  thead.innerHTML=`<tr>
    <th class="name-col" style="min-width:120px">Staff</th>
    ${days.map((d,i)=>`<th class="${isToday(d)?'today-hdr':''}">
      <div class="day-col-header">
        <span class="day-name">${DAYS_SHORT[i]}</span>
        <span class="day-date">${d.getDate()} ${MONTHS[d.getMonth()]}</span>
      </div>
    </th>`).join('')}
    <th>Week hrs</th>
  </tr>`;

  const tbody=document.getElementById('roster-tbody');
  if(!staff.length){tbody.innerHTML=`<tr><td colspan="9" class="loading">No staff</td></tr>`;return;}

  tbody.innerHTML=staff.map(s=>{
    const weekM=days.reduce((acc,d)=>{
      const sh=getShift(d,s.id);
      if(sh.off)return acc;
      const si=toM(sh.in),so=toM(sh.out);
      return acc+(si&&so&&so>si?so-si:0);
    },0);
    const cells=days.map((d)=>{
      const sh=getShift(d,s.id);
      const todayCls=isToday(d)?'today-col':'';
      if(sh.off){
        return `<td class="off-cell ${todayCls}">
          <div class="shift-cell">
            <button class="cell-tag tag-off" onclick="toggleOff('${s.id}','${dk(d)}')">Off</button>
          </div>
        </td>`;
      }
      const siteOpts=SITES.map(sv=>`<option value="${sv}" ${sh.site===sv?'selected':''}>${sv||'—'}</option>`).join('');
      return `<td class="${todayCls}">
        <div class="shift-cell">
          <div class="time-row">
            <input type="time" class="t-inp" value="${sh.in}" onchange="updShift('${s.id}','${dk(d)}','in',this.value)">
            <span class="t-sep">–</span>
            <input type="time" class="t-inp" value="${sh.out}" onchange="updShift('${s.id}','${dk(d)}','out',this.value)">
          </div>
          <div style="display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap">
            <button class="cell-tag tag-on" onclick="toggleOff('${s.id}','${dk(d)}')">On</button>
            <select class="site-sel-r" onchange="updShift('${s.id}','${dk(d)}','site',this.value)">${siteOpts}</select>
          </div>
        </div>
      </td>`;
    }).join('');

    return `<tr>
      <td><div class="name-cell">
        <div>
          <div class="emp-name-r">${s.name}</div>
          <div class="emp-site-r">${s.defSite||'—'}</div>
        </div>
        <button class="del-btn" onclick="removeStaff('${s.id}')">&#x1F5D1;</button>
      </div></td>
      ${cells}
      <td><div class="hrs-cell ${weekM===0?'hrs-muted':''}">${weekM?fmtH(weekM):'—'}</div></td>
    </tr>`;
  }).join('');
}

function weekDays(){
  return Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});
}

// ── ACTIONS ──
function updEntry(id,field,val){getEntry(curDate,id)[field]=val;render();}
function togglePeak(id){const e=getEntry(curDate,id);e.peak=!e.peak;if(e.peak)e.brk=false;else e.brk=null;render();}
function changeDay(n){curDate=new Date(curDate);curDate.setDate(curDate.getDate()+n);render();}
function changeWeek(n){weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()+n*7);renderRoster();}
function goToday(){weekStart=getMonday(new Date());renderRoster();}
function toggleOff(sid,dateKey){
  if(!rosterData[dateKey])rosterData[dateKey]={};
  const s=staff.find(x=>x.id===sid);
  if(!rosterData[dateKey][sid])rosterData[dateKey][sid]={off:false,in:s?s.defIn:'09:00',out:s?s.defOut:'17:00',site:s?s.defSite:''};
  rosterData[dateKey][sid].off=!rosterData[dateKey][sid].off;
  renderRoster();
}
function updShift(sid,dateKey,field,val){
  if(!rosterData[dateKey])rosterData[dateKey]={};
  const s=staff.find(x=>x.id===sid);
  if(!rosterData[dateKey][sid])rosterData[dateKey][sid]={off:false,in:s?s.defIn:'09:00',out:s?s.defOut:'17:00',site:s?s.defSite:''};
  rosterData[dateKey][sid][field]=val;
  renderRoster();
}

function showAddModal(){document.getElementById('add-modal').classList.add('open');document.getElementById('n-name').focus();}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}
function confirmAdd(){
  const nm=document.getElementById('n-name').value.trim();
  if(!nm)return;
  const id='s'+Date.now();
  staff.push({id,name:nm,defSite:document.getElementById('n-site').value,defIn:document.getElementById('n-in').value,defOut:document.getElementById('n-out').value});
  closeModal();document.getElementById('n-name').value='';
  if(currentPage==='hours')render();else renderRoster();
}
function removeStaff(id){
  if(confirm('Remove this staff member?')){
    staff=staff.filter(s=>s.id!==id);
    if(currentPage==='hours')render();else renderRoster();
  }
}

// ── GOOGLE SHEETS SYNC ──
function saveScriptUrl(){
  const url=document.getElementById('script-url-input').value.trim();
  if(!url)return;
  SCRIPT_URL=url;
  localStorage.setItem('hoursScriptUrl',url);
  document.getElementById('setup-banner').style.display='none';
  setStatus('save-status','✓ URL saved','ok');
}

function checkSetup(){
  if(!SCRIPT_URL){
    document.getElementById('setup-banner').style.display='block';
  }
}

function setStatus(id,msg,cls){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;
  el.className='save-status '+cls;
  setTimeout(()=>{el.textContent='';el.className='save-status';},4000);
}

async function saveToSheet(){
  if(!SCRIPT_URL){document.getElementById('setup-banner').style.display='block';return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const k=dk(curDate);
    const dayEntries=dailyData[k]||{};
    const promises=staff.map(s=>{
      const e=dayEntries[s.id]||getEntry(curDate,s.id);
      const i=toM(e.in),o=toM(e.out);
      const hasT=i!==null&&o!==null&&o>i;
      const wm=hasT?o-i:0;
      const brk=hasT?brkMins(e,wm):0;
      const paid=hasT?wm-brk:0;
      const adjH=parseAdj(e.adj);
      const finalM=paid+adjH*60;
      const payload={
        action:'saveEntry',
        date:k,staffId:s.id,staffName:s.name,
        site:e.site||'',schedIn:e.schedIn||s.defIn,schedOut:e.schedOut||s.defOut,
        clockIn:e.in||'',clockOut:e.out||'',
        workedMins:wm,hasBreak:e.brk===true?'yes':e.brk===false?'no':'auto',
        breakMins:brk,paidMins:paid,
        adjHours:adjH,adjNote:e.note||'',finalMins:finalM,peak:e.peak?'yes':'no'
      };
      return fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    });
    await Promise.all(promises);
    setStatus('save-status','✓ Saved to Sheet','ok');
  }catch(err){
    setStatus('save-status','✗ '+err.message,'err');
  }finally{btn.disabled=false;btn.textContent='Save to Sheet';}
}

async function saveRosterToSheet(){
  if(!SCRIPT_URL){document.getElementById('setup-banner').style.display='block';return;}
  const btn=document.getElementById('roster-save-btn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const shifts=[];
    Object.entries(rosterData).forEach(([date,dayShifts])=>{
      Object.entries(dayShifts).forEach(([sid,sh])=>{
        shifts.push({date,staffId:sid,off:sh.off,in:sh.in,out:sh.out,site:sh.site||''});
      });
    });
    const payload={action:'saveRoster',staff:staff.map(s=>({id:s.id,name:s.name,defSite:s.defSite||'',defIn:s.defIn,defOut:s.defOut})),shifts};
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    setStatus('roster-save-status','✓ Roster saved','ok');
  }catch(err){
    setStatus('roster-save-status','✗ '+err.message,'err');
  }finally{btn.disabled=false;btn.textContent='Save to Sheet';}
}

document.getElementById('add-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

checkSetup();
render();
</script>
