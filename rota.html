<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar h1 { font-size: 15px; font-weight: 600; color: #111; flex: 1; }
.week-toggle { display: flex; gap: 6px; }
.week-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  color: #555;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.week-btn.active {
  background: #111;
  color: #fff;
  border-color: #111;
}

.table-wrap {
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  border-collapse: separate;
  border-spacing: 0;
  width: max-content;
  min-width: 100%;
}

/* Sticky columns */
td.col-site, th.col-site {
  position: sticky;
  left: 0;
  z-index: 20;
  min-width: 90px;
  max-width: 90px;
}
td.col-name, th.col-name {
  position: sticky;
  left: 90px;
  z-index: 20;
  min-width: 80px;
  max-width: 80px;
}

/* Sticky rows */
thead tr th {
  position: sticky;
  z-index: 30;
}
thead tr:first-child th { top: 0; }
thead tr:last-child th  { top: 36px; }

thead th.col-site { z-index: 40; }
thead th.col-name { z-index: 40; }

/* Header row 1 */
thead tr:first-child th {
  background: #1a1a1a;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  padding: 8px 10px;
  border-right: 1px solid #333;
  height: 36px;
  white-space: nowrap;
}
thead tr:first-child th.col-site,
thead tr:first-child th.col-name {
  background: #1a1a1a;
}
thead tr:first-child th.th-today {
  background: #1a3a5c;
  color: #7ec8f7;
}
thead tr:first-child th.col-site-total {
  background: #1e1030;
  color: #c4b5fd;
  border-left: 2px solid #6d28d9;
}

/* Header row 2 (dates) */
thead tr:last-child th {
  background: #f0f0f0;
  color: #666;
  font-size: 10px;
  font-weight: 500;
  text-align: center;
  padding: 5px 10px;
  border-right: 1px solid #e0e0e0;
  border-bottom: 2px solid #ccc;
  height: 30px;
}
thead tr:last-child th.col-site,
thead tr:last-child th.col-name {
  background: #f0f0f0;
}
thead tr:last-child th.th-today {
  background: #e3f2fd;
  color: #0d47a1;
}
thead tr:last-child th.col-site-total {
  background: #ede9fe;
  color: #6d28d9;
  border-left: 2px solid #c4b5fd;
}

/* Body cells */
tbody td {
  font-size: 11px;
  padding: 7px 10px;
  border-right: 1px solid #e8e8e8;
  border-bottom: 1px solid #f0f0f0;
  text-align: center;
  white-space: nowrap;
  background: #fff;
  min-width: 110px;
}

/* site label cell */
td.col-site {
  font-size: 10px;
  font-weight: 700;
  text-align: center;
  border-right: 2px solid #ccc;
  letter-spacing: 0.3px;
  background: #fff;
}
td.col-site.site-shoreditch  { background: #e8f4ff; color: #1565C0; border-left: 3px solid #1E88E5; }
td.col-site.site-battersea   { background: #fff8e1; color: #E65100; border-left: 3px solid #FB8C00; }
td.col-site.site-towerbridge { background: #e8f5e9; color: #2E7D32; border-left: 3px solid #43A047; }
td.col-site.site-piccadilly  { background: #e0f2f1; color: #00695C; border-left: 3px solid #00897B; }
td.col-site.site-brentcross  { background: #ffe8e8; color: #B91C1C; border-left: 3px solid #EF4444; }

/* name cell */
td.col-name {
  font-size: 12px;
  font-weight: 600;
  color: #222;
  text-align: left;
  border-right: 2px solid #ddd;
  background: #fafafa;
  padding-left: 10px;
}

/* day cells */
td.day-cell { color: #333; }
td.day-off  { color: #bbb; font-style: italic; background: #fafafa; }
td.day-dash { color: #ddd; background: #fafafa; }
td.day-today { background: #e8f4ff !important; }

/* cross-site badge */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.badge-shoreditch   { background: #dbeafe; color: #1d4ed8; }
.badge-battersea    { background: #fef3c7; color: #b45309; }
.badge-towerbridge  { background: #d1fae5; color: #065f46; }
.badge-piccadilly   { background: #b2dfdb; color: #004D40; }
.badge-brentcross   { background: #fee2e2; color: #b91c1c; }

/* individual total cell */
td.col-ind-total {
  font-size: 11px;
  font-weight: 600;
  color: #555;
  min-width: 55px;
  background: #fafafa;
}
td.col-ind-total-empty {
  min-width: 55px;
  background: #fafafa;
  color: #ddd;
}

/* site total cell */
td.col-site-total {
  min-width: 80px;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  vertical-align: middle;
  background: #f5f3ff;
  color: #5b21b6;
  border-left: 2px solid #ddd6fe;
}
td.col-site-total-empty {
  min-width: 80px;
  background: #faf9ff;
  border-left: 2px solid #ede9fe;
}

/* row alternate */
tbody tr:nth-child(even) td { background: #fcfcfc; }
tbody tr:nth-child(even) td.col-name { background: #f5f5f5; }
tbody tr:nth-child(even) td.col-ind-total,
tbody tr:nth-child(even) td.col-ind-total-empty { background: #f5f5f5; }
tbody tr:nth-child(even) td.col-site-total { background: #f0ecff; }
tbody tr:nth-child(even) td.col-site-total-empty { background: #f7f5ff; }
tbody tr:nth-child(even) td.day-off,
tbody tr:nth-child(even) td.day-dash { background: #f7f7f7; }

/* site group row separator */
tr.site-separator td { border-top: 3px solid #ddd; }

.loading { padding: 40px; text-align: center; color: #999; font-size: 14px; }
.error   { padding: 40px; text-align: center; color: #c00; font-size: 14px; }

/* refund deduction column */
td.col-refund {
  min-width: 60px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  color: #b45309;
  background: #fffbeb;
  border-left: 1px solid #fde68a;
}
td.col-refund-empty { color: #ddd; background: #fafafa; }
thead tr:first-child th.col-refund {
  background: #78350f;
  color: #fde68a;
  border-left: 1px solid #92400e;
}
thead tr:last-child th.col-refund {
  background: #fef3c7;
  color: #92400e;
  border-left: 1px solid #fde68a;
}
tbody tr:nth-child(even) td.col-refund { background: #fef9e7; }

/* ── Staff Hours Cards ── */
.cards-section {
  padding: 24px 16px 32px;
  border-top: 2px solid #e0e0e0;
  margin-top: 2px;
}
.cards-section-title {
  font-size: 12px;
  font-weight: 600;
  color: #888;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}
.staff-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  overflow: hidden;
}
.staff-card-head {
  padding: 10px 12px 8px;
  border-bottom: 1px solid #f0f0f0;
}
.staff-card-name {
  font-size: 13px;
  font-weight: 600;
  color: #111;
}
.staff-card-sub {
  font-size: 11px;
  color: #999;
  margin-top: 1px;
}
.card-day-rows { padding: 4px 0; }
.card-day-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 12px;
  font-size: 11px;
}
.card-day-row.is-today {
  background: #e8f4ff;
}
.card-day-label { color: #999; min-width: 26px; }
.card-day-val { color: #222; font-weight: 500; text-align: right; }
.card-day-val.is-off { color: #ccc; font-weight: 400; font-style: italic; }
.card-day-val.is-today-val { color: #1565C0; }
.staff-card-foot {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 7px 12px;
  background: #fafafa;
  border-top: 1px solid #f0f0f0;
}
.card-foot-label { font-size: 11px; color: #999; }
.card-foot-right { text-align: right; }
.card-foot-total { font-size: 14px; font-weight: 600; color: #111; }
.card-foot-deduct { font-size: 10px; color: #c62828; margin-top: 1px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Rota</h1>
  <div class="week-toggle">
    <button class="week-btn active" id="btn-this" onclick="switchWeek('Rota', this)">This Week</button>
    <button class="week-btn" id="btn-next" onclick="switchWeek('Rota_Next', this)">Next Week</button>
  </div>
</div>

<div class="table-wrap">
  <div id="content" class="loading">Loading rota…</div>
</div>

<div id="cards-section" style="display:none;" class="cards-section">
  <div class="cards-section-title">Hours this week</div>
  <div id="cards-grid" class="cards-grid"></div>
</div>

<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
let currentSheet = 'Rota';
let agencySet = new Set();

const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

function getTodayColIdx(dayHeaders) {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const dayMap = { 1:'mon', 2:'tue', 3:'wed', 4:'thu', 5:'fri', 6:'sat', 0:'sun' };
  const todayKey = dayMap[dow];
  return dayHeaders.findIndex(h => {
    const hl = h.toLowerCase();
    return hl.startsWith(todayKey) || hl.includes(todayKey);
  });
}

function switchWeek(sheetName, btn) {
  currentSheet = sheetName;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('content').innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('cards-section').style.display = 'none';
  loadRota(sheetName);
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch sheet');
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const cells = [];
    let cur = '';
    while (i < text.length) {
      if (text[i] === '"') {
        i++;
        while (i < text.length) {
          if (text[i] === '"') {
            if (text[i+1] === '"') { cur += '"'; i += 2; }
            else { i++; break; }
          } else {
            if (text[i] === '\n' || text[i] === '\r') cur += ' ';
            else cur += text[i];
            i++;
          }
        }
      } else if (text[i] === ',') {
        cells.push(cur.trim());
        cur = '';
        i++;
      } else if (text[i] === '\r') {
        i++;
      } else if (text[i] === '\n') {
        i++;
        break;
      } else {
        cur += text[i];
        i++;
      }
    }
    cells.push(cur.trim());
    if (cells.some(c => c)) rows.push(cells);
  }
  return rows;
}

async function fetchAgencyStaff() {
  try {
    const rows = await fetchSheet('Staff');
    const set = new Set();
    for (let i = 1; i < rows.length; i++) {
      const name = (rows[i][0] || '').trim();
      const type = (rows[i][1] || '').trim();
      if (type === 'Agency' && name) set.add(name);
    }
    return set;
  } catch(e) {
    return new Set();
  }
}

function siteClass(site) {
  const s = (site || '').toLowerCase().replace(/\s/g, '');
  if (s.includes('shoreditch'))   return 'site-shoreditch';
  if (s.includes('battersea') || s.includes('nineelms') || s.includes('nineelm')) return 'site-battersea';
  if (s.includes('tower'))        return 'site-towerbridge';
  if (s.includes('piccadilly'))   return 'site-piccadilly';
  if (s.includes('brentcross') || s.includes('brent')) return 'site-brentcross';
  return '';
}

function badgeClass(val) {
  const v = (val || '').toLowerCase().replace(/\s/g, '');
  if (v.includes('shoreditch'))   return 'badge-shoreditch';
  if (v.includes('battersea'))    return 'badge-battersea';
  if (v.includes('tower'))        return 'badge-towerbridge';
  if (v.includes('piccadilly'))   return 'badge-piccadilly';
  if (v.includes('brentcross') || v.includes('brent')) return 'badge-brentcross';
  return '';
}

function renderCell(val, isToday) {
  const v = (val || '').trim();
  const vl = v.toLowerCase();
  const todayCls = isToday ? ' day-today' : '';

  if (!v || v === '-') {
    return `<td class="day-cell day-dash${todayCls}">–</td>`;
  }
  if (vl === 'off') {
    return `<td class="day-cell day-off${todayCls}">OFF</td>`;
  }
  if (vl.includes('shoreditch') || vl.includes('battersea') || vl.includes('tower') || vl.includes('piccadilly') || vl.includes('brent')) {
    const bc = badgeClass(v);
    return `<td class="day-cell${todayCls}"><span class="badge ${bc}">${v}</span></td>`;
  }
  return `<td class="day-cell${todayCls}">${v}</td>`;
}

function parseHours(val) {
  if (!val) return 0;
  const n = parseFloat(val.trim());
  return isNaN(n) ? 0 : n;
}

function buildTable(rows, agency, todayIdx) {
  const allHeaders = rows[0];
  const totalHoursIdx = allHeaders.findIndex(h => h.toLowerCase().includes('total hours'));
  const refundIdx = allHeaders.findIndex(h => h.toLowerCase().includes('refund'));

  // Day cols: from col 2 up to (not including) refund or total
  let dayEndIdx = totalHoursIdx > 0 ? totalHoursIdx : allHeaders.length;
  if (refundIdx > 0 && refundIdx < dayEndIdx) dayEndIdx = refundIdx;

  const dayHeaders = allHeaders.slice(2, dayEndIdx);
  const dateRow    = rows[1].slice(2, dayEndIdx);

  // Build thead
  let thead = '<thead><tr>';
  thead += '<th class="col-site">Site</th>';
  thead += '<th class="col-name">Name</th>';
  dayHeaders.forEach((h, i) => {
    const cls = (i === todayIdx) ? ' th-today' : '';
    thead += `<th class="col-day${cls}">${h}</th>`;
  });
  thead += '<th class="col-ind-total">Hrs</th>';
  if (refundIdx > 0) thead += '<th class="col-refund">Refund Deduction</th>';
  thead += '<th class="col-site-total">Site Hours</th>';
  thead += '</tr><tr>';
  thead += '<th class="col-site"></th>';
  thead += '<th class="col-name"></th>';
  dateRow.forEach((d, i) => {
    const cls = (i === todayIdx) ? ' th-today' : '';
    thead += `<th class="col-day${cls}">${d}</th>`;
  });
  thead += '<th class="col-ind-total">hrs</th>';
  if (refundIdx > 0) thead += '<th class="col-refund"></th>';
  thead += '<th class="col-site-total">hrs</th>';
  thead += '</tr></thead>';

  // Group rows by site
  const dataRows = rows.slice(2).filter(r => r.some(c => c.trim()));
  const siteGroups = [];
  let curGroup = null;
  for (const row of dataRows) {
    const siteVal = (row[0] || '').trim();
    if (siteVal) {
      if (curGroup) siteGroups.push(curGroup);
      curGroup = { site: siteVal, rows: [row] };
    } else if (curGroup) {
      curGroup.rows.push(row);
    }
  }
  if (curGroup) siteGroups.push(curGroup);

  let tbody = '<tbody>';

  siteGroups.forEach((group, gi) => {
    const sc = siteClass(group.site);
    const siteDisplay = group.site.split(/[\s,\(（]/)[0].trim() || group.site;

    let siteTotal = 0;
    group.rows.forEach(row => {
      const name = (row[1] || '').trim();
      if (agency.has(name) && totalHoursIdx > 0) {
        siteTotal += parseHours(row[totalHoursIdx]);
      }
    });
    const siteTotalDisplay = siteTotal > 0
      ? `<span style="font-size:18px;font-weight:700">${siteTotal}</span><br><span style="font-size:9px;font-weight:400;color:#7c3aed;letter-spacing:0.3px">hrs / week</span>`
      : '–';

    group.rows.forEach((row, ri) => {
      const isFirst = (ri === 0);
      const isSeparator = (gi > 0 && isFirst);
      const name = (row[1] || '').trim();
      const days = row.slice(2, dayEndIdx);
      const indHours = totalHoursIdx > 0 ? (row[totalHoursIdx] || '').trim() : '';

      tbody += `<tr${isSeparator ? ' class="site-separator"' : ''}>`;
      if (isFirst) {
        tbody += `<td class="col-site ${sc}" rowspan="${group.rows.length}">${siteDisplay}</td>`;
      }
      tbody += `<td class="col-name">${name}</td>`;

      days.forEach((val, di) => {
        tbody += renderCell(val, di === todayIdx);
      });

      if (indHours) {
        tbody += `<td class="col-ind-total">${indHours}</td>`;
      } else {
        tbody += `<td class="col-ind-total-empty">–</td>`;
      }

      if (refundIdx > 0) {
        const refundVal = (row[refundIdx] || '').trim();
        tbody += refundVal
          ? `<td class="col-refund">${refundVal}</td>`
          : `<td class="col-refund col-refund-empty">–</td>`;
      }

      if (isFirst) {
        tbody += `<td class="col-site-total" rowspan="${group.rows.length}">${siteTotalDisplay}</td>`;
      }

      tbody += '</tr>';
    });
  });

  tbody += '</tbody>';
  return `<table>${thead}${tbody}</table>`;
}

function buildCards(rows, agency, dayHeaders, dayEndIdx, todayIdx) {
  // Collect all agency staff, summing hours across all sites
  const staffMap = new Map(); // name -> { days: [], totalHours, refund }

  const allHeaders = rows[0];
  const totalHoursIdx = allHeaders.findIndex(h => h.toLowerCase().includes('total hours'));
  const refundIdx = allHeaders.findIndex(h => h.toLowerCase().includes('refund'));

  const dataRows = rows.slice(2).filter(r => r.some(c => c.trim()));

  for (const row of dataRows) {
    const name = (row[1] || '').trim();
    if (!name || !agency.has(name)) continue;

    const rowHours = totalHoursIdx > 0 ? parseHours(row[totalHoursIdx]) : 0;
    const rowRefund = refundIdx > 0 ? parseHours(row[refundIdx]) : 0;

    if (staffMap.has(name)) {
      // accumulate hours and refund; keep days from first (primary site) row
      const existing = staffMap.get(name);
      existing.totalHours = Math.round((existing.totalHours + rowHours) * 100) / 100;
      existing.refund = Math.round((existing.refund + rowRefund) * 100) / 100;
    } else {
      const days = row.slice(2, dayEndIdx);
      staffMap.set(name, { days, totalHours: rowHours, refund: rowRefund });
    }
  }

  if (staffMap.size === 0) return;

  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  staffMap.forEach((data, name) => {
    const card = document.createElement('div');
    card.className = 'staff-card';

    const totalStr = data.totalHours > 0 ? `${data.totalHours} hrs` : '–';
    const subText = data.totalHours > 0 ? `${data.totalHours} hrs this week (all sites)` : 'no hours recorded';

    let dayRowsHTML = '';
    dayHeaders.forEach((h, i) => {
      const val = (data.days[i] || '').trim();
      const vl = val.toLowerCase();
      const isToday = (i === todayIdx);
      const todayRowCls = isToday ? ' is-today' : '';
      let valHTML = '';
      if (!val || val === '-') {
        valHTML = `<span class="card-day-val is-off">–</span>`;
      } else if (vl === 'off') {
        valHTML = `<span class="card-day-val is-off">OFF</span>`;
      } else {
        valHTML = `<span class="card-day-val${isToday ? ' is-today-val' : ''}">${val}</span>`;
      }
      const label = DAY_NAMES[i] || h.slice(0,3);
      dayRowsHTML += `<div class="card-day-row${todayRowCls}"><span class="card-day-label">${label}</span>${valHTML}</div>`;
    });

    const deductHTML = data.refund > 0
      ? `<div class="card-foot-deduct">−${data.refund} refund deduction</div>`
      : '';

    card.innerHTML = `
      <div class="staff-card-head">
        <div class="staff-card-name">${name}</div>
        <div class="staff-card-sub">${subText}</div>
      </div>
      <div class="card-day-rows">${dayRowsHTML}</div>
      <div class="staff-card-foot">
        <span class="card-foot-label">Total</span>
        <div class="card-foot-right">
          <div class="card-foot-total">${totalStr}</div>
          ${deductHTML}
        </div>
      </div>`;

    grid.appendChild(card);
  });

  document.getElementById('cards-section').style.display = 'block';
}

async function loadRota(sheetName) {
  const el = document.getElementById('content');
  try {
    const [rows, agency] = await Promise.all([
      fetchSheet(sheetName),
      agencySet.size > 0 ? Promise.resolve(agencySet) : fetchAgencyStaff()
    ]);
    if (agency.size > 0) agencySet = agency;
    if (!rows || rows.length < 3) {
      el.innerHTML = '<div class="error">No data found in sheet: ' + sheetName + '</div>';
      return;
    }

    const allHeaders = rows[0];
    const totalHoursIdx = allHeaders.findIndex(h => h.toLowerCase().includes('total hours'));
    const refundIdx = allHeaders.findIndex(h => h.toLowerCase().includes('refund'));
    let dayEndIdx = totalHoursIdx > 0 ? totalHoursIdx : allHeaders.length;
    if (refundIdx > 0 && refundIdx < dayEndIdx) dayEndIdx = refundIdx;
    const dayHeaders = allHeaders.slice(2, dayEndIdx);
    const todayIdx = getTodayColIdx(dayHeaders);

    el.innerHTML = buildTable(rows, agencySet, todayIdx);
    buildCards(rows, agencySet, dayHeaders, dayEndIdx, todayIdx);
  } catch(e) {
    el.innerHTML = '<div class="error">Error loading rota: ' + e.message + '</div>';
  }
}

loadRota('Rota');
</script>
