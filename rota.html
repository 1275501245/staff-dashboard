<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rota</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header { background: #fff; border-bottom: 1px solid #efefef; padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.back { width: 30px; height: 30px; border-radius: 50%; background: #f5f5f5; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #999; text-decoration: none; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

.table-container {
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  border-collapse: collapse;
  font-size: 10px;
  background: #fff;
  min-width: 100%;
}

/* Sticky header row */
thead tr th {
  position: sticky;
  top: 0;
  background: #f9f9f9;
  z-index: 3;
  padding: 5px 6px;
  font-size: 10px;
  font-weight: 600;
  color: #555;
  border-bottom: 2px solid #e8e8e8;
  border-right: 1px solid #efefef;
  white-space: nowrap;
  text-align: center;
}
thead tr th.today {
  background: #1a1a1a;
  color: #fff;
}

/* Sticky kitchen col */
.col-kitchen {
  position: sticky;
  left: 0;
  z-index: 2;
  background: #f5f5f5;
  min-width: 28px;
  max-width: 28px;
  border-right: 2px solid #e0e0e0;
}
thead tr th.col-kitchen {
  z-index: 4;
  background: #f9f9f9;
}

/* Sticky name col */
.col-name {
  position: sticky;
  left: 28px;
  z-index: 2;
  background: #fff;
  min-width: 70px;
  border-right: 1px solid #e8e8e8;
  text-align: left;
  padding: 4px 6px 4px 8px;
  font-weight: 500;
  white-space: nowrap;
  font-size: 11px;
}
thead tr th.col-name {
  z-index: 4;
  background: #f9f9f9;
  text-align: left;
}

tbody tr td {
  padding: 4px 6px;
  border-bottom: 1px solid #f5f5f5;
  border-right: 1px solid #f5f5f5;
  white-space: nowrap;
  text-align: center;
  vertical-align: middle;
  line-height: 1.2;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr td:last-child { border-right: none; }

.kitchen-label {
  font-size: 10px;
  font-weight: 600;
  color: #888;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  white-space: nowrap;
  display: block;
  text-align: center;
  width: 100%;
}

.chip {
  display: inline-block;
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  white-space: nowrap;
}
.chip-shoreditch  { background: #e8effe; color: #3a5fc8; }
.chip-battersea   { background: #fde8ea; color: #c8303a; }
.chip-tower       { background: #e6f4ee; color: #2a7a52; }
.chip-off         { color: #bbb; font-size: 10px; }
.chip-dash        { color: #ddd; }
.chip-time        { color: #444; }

.loading { padding: 40px; text-align: center; color: #aaa; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <a class="back" href="/home">←</a>
  <div>
    <div class="header-title">Rota</div>
    <div class="header-sub" id="week-range">Loading…</div>
  </div>
</div>

<div class="table-container">
  <div id="content"><div class="loading">Loading rota…</div></div>
</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function todayColOffset() {
  const d = new Date().getDay(); // 0=Sun
  return d === 0 ? 6 : d - 1; // Mon=0...Sun=6
}

function classify(val) {
  const v = String(val || '').trim();
  if (!v || v === '-') return { cls: 'chip-dash', text: '—' };
  if (v === 'OFF') return { cls: 'chip-off', text: 'OFF' };
  const l = v.toLowerCase();
  if (l.includes('shoreditch')) return { cls: 'chip chip-shoreditch', text: v };
  if (l.includes('battersea') || l.includes('nine elms')) return { cls: 'chip chip-battersea', text: v };
  if (l.includes('tower bridge')) return { cls: 'chip chip-tower', text: v };
  if (/^\d{3,4}[-–]\d{3,4}/.test(v)) return { cls: 'chip-time', text: v };
  return { cls: '', text: v };
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=0`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (!json.table?.rows?.length) return [];
  return json.table.rows.map(r => (r.c || []).map(c => c?.v ?? c?.f ?? ''));
}

async function init() {
  try {
    const rows = await fetchSheet('Rota');
    if (!rows.length) { document.getElementById('content').innerHTML = '<div class="loading">No data</div>'; return; }

    const dayRow = rows[0] || [];
    const dateRow = rows[1] || [];
    const todayOff = todayColOffset();

    // Week range subtitle
    const dates = [2,3,4,5,6,7,8].map(i => String(dateRow[i] || ''));
    document.getElementById('week-range').textContent = (dates[0] + ' — ' + dates[6]).replace(/\s+/g,' ');

    // Build header
    let thead = '<thead><tr>';
    thead += '<th class="col-kitchen"></th>';
    thead += '<th class="col-name">Name</th>';
    for (let i = 0; i < 7; i++) {
      const day = String(dayRow[i+2] || '');
      const date = String(dateRow[i+2] || '').slice(5);
      const isToday = i === todayOff;
      thead += `<th class="${isToday ? 'today' : ''}">${day}<br><span style="font-weight:400;font-size:10px;opacity:0.75">${date}</span></th>`;
    }
    thead += '</tr></thead>';

    // Group rows by kitchen
    const dataRows = rows.slice(2);
    const groups = [];
    let cur = null;
    dataRows.forEach(row => {
      const kitchen = String(row[0] || '').trim();
      const name = String(row[1] || '').trim();
      if (!name) return;
      if (kitchen) { if (cur) groups.push(cur); cur = { kitchen, members: [] }; }
      if (!cur) cur = { kitchen: '', members: [] };
      cur.members.push(row);
    });
    if (cur) groups.push(cur);

    let tbody = '<tbody>';
    groups.forEach(group => {
      group.members.forEach((row, mi) => {
        const name = String(row[1] || '').trim();
        if (!name) return;
        tbody += '<tr>';
        if (mi === 0) {
          tbody += `<td class="col-kitchen" rowspan="${group.members.length}"><span class="kitchen-label">${group.kitchen}</span></td>`;
        }
        tbody += `<td class="col-name">${name}</td>`;
        for (let c = 2; c <= 8; c++) {
          const { cls, text } = classify(row[c]);
          tbody += `<td><span class="${cls}">${text}</span></td>`;
        }
        tbody += '</tr>';
      });
    });
    tbody += '</tbody>';

    document.getElementById('content').innerHTML = `<table>${thead}${tbody}</table>`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading">Failed: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
