<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; }

/* Top bar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar h1 { font-size: 15px; font-weight: 600; color: #111; flex: 1; }
.week-toggle { display: flex; gap: 6px; }
.week-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  color: #555;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.week-btn.active {
  background: #111;
  color: #fff;
  border-color: #111;
}

/* Table wrapper — scrollable */
.table-wrap {
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  border-collapse: separate;
  border-spacing: 0;
  width: max-content;
  min-width: 100%;
}

/* ── Sticky columns ── */
/* col 0: site label */
td.col-site, th.col-site {
  position: sticky;
  left: 0;
  z-index: 20;
  min-width: 90px;
  max-width: 90px;
}
/* col 1: name */
td.col-name, th.col-name {
  position: sticky;
  left: 90px;
  z-index: 20;
  min-width: 80px;
  max-width: 80px;
}

/* ── Sticky rows ── */
thead tr th {
  position: sticky;
  z-index: 30;
}
thead tr:first-child th { top: 0; }
thead tr:last-child th  { top: 36px; } /* height of first header row */

/* col stickiness in thead needs higher z-index */
thead th.col-site { z-index: 40; }
thead th.col-name { z-index: 40; }

/* ── Header styles ── */
thead tr:first-child th {
  background: #1a1a1a;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  padding: 8px 10px;
  border-right: 1px solid #333;
  height: 36px;
  white-space: nowrap;
}
thead tr:first-child th.col-site,
thead tr:first-child th.col-name {
  background: #1a1a1a;
}
thead tr:first-child th.th-thu {
  background: #2a1a00;
  color: #ffd580;
  font-style: italic;
}

thead tr:last-child th {
  background: #f0f0f0;
  color: #666;
  font-size: 10px;
  font-weight: 500;
  text-align: center;
  padding: 5px 10px;
  border-right: 1px solid #e0e0e0;
  border-bottom: 2px solid #ccc;
  height: 30px;
}
thead tr:last-child th.col-site,
thead tr:last-child th.col-name {
  background: #f0f0f0;
}
thead tr:last-child th.th-thu {
  background: #fff8e6;
  color: #a06000;
}

/* ── Body cells ── */
tbody td {
  font-size: 11px;
  padding: 7px 10px;
  border-right: 1px solid #e8e8e8;
  border-bottom: 1px solid #f0f0f0;
  text-align: center;
  white-space: nowrap;
  background: #fff;
  min-width: 110px;
}

/* site label cell */
td.col-site {
  font-size: 10px;
  font-weight: 700;
  text-align: center;
  border-right: 2px solid #ccc;
  letter-spacing: 0.3px;
  background: #fff;
}
td.col-site.site-shoreditch { background: #e8f4ff; color: #1565C0; border-left: 3px solid #1E88E5; }
td.col-site.site-battersea  { background: #fff8e1; color: #E65100; border-left: 3px solid #FB8C00; }
td.col-site.site-towerbridge{ background: #e8f5e9; color: #2E7D32; border-left: 3px solid #43A047; }

/* name cell */
td.col-name {
  font-size: 12px;
  font-weight: 600;
  color: #222;
  text-align: left;
  border-right: 2px solid #ddd;
  background: #fafafa;
  padding-left: 10px;
}

/* day cells */
td.day-cell { color: #333; }
td.day-off  { color: #bbb; font-style: italic; background: #fafafa; }
td.day-dash { color: #ddd; background: #fafafa; }
td.day-thu  { background: #fffbf0; }

/* cross-site badge */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.badge-shoreditch   { background: #dbeafe; color: #1d4ed8; }
.badge-battersea    { background: #fef3c7; color: #b45309; }
.badge-towerbridge  { background: #d1fae5; color: #065f46; }

/* row alternate */
tbody tr:nth-child(even) td { background: #fcfcfc; }
tbody tr:nth-child(even) td.col-name { background: #f5f5f5; }
tbody tr:nth-child(even) td.day-off,
tbody tr:nth-child(even) td.day-dash { background: #f7f7f7; }

/* site group row separator */
tr.site-separator td { border-top: 3px solid #ddd; }

.loading { padding: 40px; text-align: center; color: #999; font-size: 14px; }
.error   { padding: 40px; text-align: center; color: #c00; font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Rota</h1>
  <div class="week-toggle">
    <button class="week-btn active" id="btn-this" onclick="switchWeek('Rota', this)">This Week</button>
    <button class="week-btn" id="btn-next" onclick="switchWeek('Rota_Next', this)">Next Week</button>
  </div>
</div>

<div class="table-wrap">
  <div id="content" class="loading">Loading rota…</div>
</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
let currentSheet = 'Rota';

function switchWeek(sheetName, btn) {
  currentSheet = sheetName;
  document.querySelectorAll('.week-btn').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  document.getElementById('content').innerHTML = '<div class="loading">Loading…</div>';
  loadRota(sheetName);
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch sheet');
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cells = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function siteClass(site) {
  const s = (site || '').toLowerCase().replace(/\s/g, '');
  if (s.includes('shoreditch'))   return 'site-shoreditch';
  if (s.includes('battersea') || s.includes('nineelms')) return 'site-battersea';
  if (s.includes('tower'))        return 'site-towerbridge';
  return '';
}

function badgeClass(val) {
  const v = (val || '').toLowerCase().replace(/\s/g, '');
  if (v.includes('shoreditch'))   return 'badge-shoreditch';
  if (v.includes('battersea'))    return 'badge-battersea';
  if (v.includes('tower'))        return 'badge-towerbridge';
  return '';
}

function renderCell(val, colIdx) {
  // col 0 = site, col 1 = name — handled separately
  const v = (val || '').trim();
  const vl = v.toLowerCase();

  // Thursday = col 5 (0-indexed: site, name, mon, tue, wed, thu, fri, sat, sun)
  const isThu = (colIdx === 5);
  const thuClass = isThu ? ' day-thu' : '';

  if (!v || v === '-') {
    return `<td class="day-cell day-dash${thuClass}">–</td>`;
  }
  if (vl === 'off') {
    return `<td class="day-cell day-off${thuClass}">OFF</td>`;
  }
  // cross-site badge?
  if (vl.includes('shoreditch') || vl.includes('battersea') || vl.includes('tower')) {
    const bc = badgeClass(v);
    return `<td class="day-cell${thuClass}"><span class="badge ${bc}">${v}</span></td>`;
  }
  // normal shift time
  return `<td class="day-cell${thuClass}">${v}</td>`;
}

function buildTable(rows) {
  // rows[0] = header (,Name,Monday,Tuesday,...)
  // rows[1] = dates (,,2026/05/25,...)
  // rows[2+] = data

  const dayHeaders = rows[0].slice(2); // Mon..Sun
  const dateRow    = rows[1].slice(2); // dates

  // detect thursday index (0-based among day cols)
  const thuIdx = dayHeaders.findIndex(h => h.toLowerCase().includes('thursday') || h.toLowerCase().includes('thu'));

  // Build thead
  let thead = '<thead>';
  // Row 1: Site | Name | Mon | Tue | Wed | Thu Promotion | Fri | Sat | Sun
  thead += '<tr>';
  thead += '<th class="col-site">Site</th>';
  thead += '<th class="col-name">Name</th>';
  dayHeaders.forEach((h, i) => {
    const isThu = (i === thuIdx);
    const cls = isThu ? ' th-thu' : '';
    thead += `<th class="col-day${cls}">${h}</th>`;
  });
  thead += '</tr>';
  // Row 2: dates
  thead += '<tr>';
  thead += '<th class="col-site"></th>';
  thead += '<th class="col-name"></th>';
  dateRow.forEach((d, i) => {
    const isThu = (i === thuIdx);
    const cls = isThu ? ' th-thu' : '';
    thead += `<th class="col-day${cls}">${d}</th>`;
  });
  thead += '</tr>';
  thead += '</thead>';

  // Build tbody — track current site
  let tbody = '<tbody>';
  let currentSite = '';
  let siteRowspan = {};
  let firstSite = true;

  const dataRows = rows.slice(2).filter(r => r.some(c => c.trim()));

  // Pre-pass: count rows per site for rowspan
  let siteGroups = [];
  let curGroup = null;
  for (const row of dataRows) {
    const siteVal = (row[0] || '').trim();
    if (siteVal) {
      if (curGroup) siteGroups.push(curGroup);
      curGroup = { site: siteVal, rows: [row] };
    } else if (curGroup) {
      curGroup.rows.push(row);
    }
  }
  if (curGroup) siteGroups.push(curGroup);

  siteGroups.forEach((group, gi) => {
    const sc = siteClass(group.site);
    group.rows.forEach((row, ri) => {
      const isFirst = (ri === 0);
      const isSeparator = (gi > 0 && isFirst);
      const name = (row[1] || '').trim();
      const days = row.slice(2);

      tbody += `<tr${isSeparator ? ' class="site-separator"' : ''}>`;

      // Site cell with rowspan
      if (isFirst) {
        tbody += `<td class="col-site ${sc}" rowspan="${group.rows.length}">${group.site}</td>`;
      }

      // Name
      tbody += `<td class="col-name">${name}</td>`;

      // Day cells
      days.forEach((val, di) => {
        // colIdx: 0=site,1=name,2=mon... so di+2
        tbody += renderCell(val, di + 2);
      });

      tbody += '</tr>';
    });
  });

  tbody += '</tbody>';

  return `<table>${thead}${tbody}</table>`;
}

async function loadRota(sheetName) {
  const el = document.getElementById('content');
  try {
    const rows = await fetchSheet(sheetName);
    if (!rows || rows.length < 3) {
      el.innerHTML = '<div class="error">No data found in sheet: ' + sheetName + '</div>';
      return;
    }
    el.innerHTML = buildTable(rows);
  } catch(e) {
    el.innerHTML = '<div class="error">Error loading rota: ' + e.message + '</div>';
  }
}

loadRota('Rota');
</script>
</body>
</html>
