<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Purchase Orders</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding-bottom: 40px; }

.header { background: #fff; border-bottom: 1px solid #efefef; padding: 16px; }
.header-top { display: flex; align-items: center; gap: 12px; }
.back { width: 30px; height: 30px; border-radius: 50%; background: #f5f5f5; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #999; text-decoration: none; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

.body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

.section-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; padding: 0 2px; }

.task-card { background: #fff; border: 1px solid #efefef; border-radius: 14px; overflow: hidden; }
.task-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; user-select: none; }
.task-row:last-child { border-bottom: none; }
.task-row:active { background: #f9f9f9; }
.task-left { display: flex; align-items: center; gap: 12px; }
.task-check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; color: #fff; }
.task-row.done .task-check { background: #1a1a1a; border-color: #1a1a1a; }
.task-row.done .task-name { text-decoration: line-through; color: #bbb; }
.task-row.done .task-meta { color: #ccc; }
.task-name { font-size: 15px; font-weight: 500; }
.task-meta { font-size: 11px; color: #aaa; margin-top: 2px; }

.clear-wrap { padding: 0 16px; }
.clear-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ffcdd2; background: #fff5f5; color: #c8102e; font-size: 14px; cursor: pointer; font-family: inherit; }

.state-box { text-align: center; padding: 50px 20px; color: #aaa; font-size: 13px; }
.state-icon { font-size: 32px; margin-bottom: 10px; }
.state-title { font-size: 14px; font-weight: 500; color: #999; margin-bottom: 6px; }

.progress-row { background: #fff; border: 1px solid #efefef; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.progress-bar { flex: 1; height: 4px; background: #efefef; border-radius: 2px; }
.progress-fill { height: 100%; background: #1a1a1a; border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: #aaa; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a class="back" href="/admin">←</a>
    <div>
      <div class="header-title">Purchase Orders</div>
      <div class="header-sub" id="hdr-sub"></div>
    </div>
  </div>
</div>

<div class="body" id="body">
  <div class="state-box"><div class="state-icon">📋</div><div class="state-title">Loading…</div></div>
</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbys-Lf1PTUaFBBOecSwUZk6YvGlYZkfEVVX7-3aU-d4n2B_SuzVSKHnr-gAUKMObFb51g/exec';
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function todayStr() { return new Date().toISOString().split('T')[0]; }
function todayDay() { return DAYS[new Date().getDay()]; }

function formatDate() {
  const d = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function normalizeDate(raw) {
  if (!raw) return '';
  if (typeof raw === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  if (typeof raw === 'string') {
    const m = raw.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (m) return `${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${String(+m[3]).padStart(2,'0')}`;
  }
  if (typeof raw === 'number') return new Date((raw-25569)*86400000).toISOString().split('T')[0];
  return String(raw).slice(0,10);
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (!json.table?.rows?.length) return [];
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((col, i) => { obj[col] = r.c[i]?.v ?? r.c[i]?.f ?? ''; });
    return obj;
  });
}

async function saveTask(supplier, done) {
  await fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'orderTask', date: todayStr(), supplier, done })
  });
}

async function toggleTask(row, supplier) {
  const isDone = !row.classList.contains('done');
  row.classList.toggle('done', isDone);
  row.querySelector('.task-check').textContent = isDone ? '✓' : '';
  updateProgress();
  await saveTask(supplier, isDone);
}

function updateProgress() {
  const total = document.querySelectorAll('.task-row').length;
  const done = document.querySelectorAll('.task-row.done').length;
  document.getElementById('progress-fill').style.width = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('progress-label').textContent = done + ' / ' + total;
}

async function clearTasks() {
  if (!confirm('Clear all purchase order tasks for today?')) return;
  await fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'clearOrderTasks', date: todayStr() })
  });
  location.reload();
}

async function init() {
  const today = todayStr();
  const day = todayDay();
  document.getElementById('hdr-sub').textContent = '采购事项 · ' + formatDate();

  let suppliers, orderTasks;
  try {
    [suppliers, orderTasks] = await Promise.all([fetchSheet('Suppliers'), fetchSheet('OrderTasks')]);
  } catch(e) {
    document.getElementById('body').innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">Failed to load</div></div>`;
    return;
  }

  const todaySupps = suppliers.filter(s => {
    const days = (s['StocktakeDays'] || '').split(',').map(d => d.trim());
    return days.includes(day);
  });

  if (!todaySupps.length) {
    document.getElementById('body').innerHTML = `<div class="state-box"><div class="state-icon">✅</div><div class="state-title">No purchase orders today</div></div>`;
    return;
  }

  const doneMap = {};
  orderTasks.forEach(r => {
    if (normalizeDate(r['Date']) === today) {
      doneMap[r['Supplier']] = r['Done'] === true || r['Done'] === 'TRUE';
    }
  });

  const total = todaySupps.length;
  const doneCount = todaySupps.filter(s => doneMap[s['SupplierName']]).length;

  let html = `
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:${Math.round(doneCount/total*100)}%"></div></div>
      <div class="progress-label" id="progress-label">${doneCount} / ${total}</div>
    </div>
    <div class="section-label">采购事项</div>
    <div class="task-card">`;

  todaySupps.forEach(s => {
    const name = s['SupplierName'];
    const cutoff = s['OrderCutoffTime'] || '';
    const done = doneMap[name] || false;
    const safeName = name.replace(/'/g, "\\'");
    html += `<div class="task-row${done ? ' done' : ''}" onclick="toggleTask(this, '${safeName}')">
      <div class="task-left">
        <div class="task-check">${done ? '✓' : ''}</div>
        <div>
          <div class="task-name">${name}</div>
          ${cutoff ? `<div class="task-meta">截单 ${cutoff}</div>` : ''}
        </div>
      </div>
    </div>`;
  });

  html += `</div>
    <div class="clear-wrap">
      <button class="clear-btn" onclick="clearTasks()">清除今日记录</button>
    </div>`;

  document.getElementById('body').innerHTML = html;
}

init();
</script>
</body>
</html>
