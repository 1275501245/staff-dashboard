<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Operations Rota</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 16px 16px 60px; }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.back { font-size: 12px; color: #888; text-decoration: none; }
.back:active { opacity: 0.6; }
.page-title { font-size: 16px; font-weight: 600; }

.week-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.week-btn { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; color: #1a1a1a; }
.week-btn:active { background: #f0f0f0; }
.week-label { flex: 1; text-align: center; font-size: 11px; color: #666; }

.person-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.person-tab { padding: 3px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #e0e0e0; color: #666; background: white; }
.person-tab.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; font-weight: 500; }

.stat-row { display: flex; gap: 6px; margin-bottom: 12px; }
.stat { background: white; border-radius: 8px; padding: 7px 10px; flex: 1; border: 1px solid #efefef; }
.stat-val { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.stat-val small { font-size: 10px; font-weight: 400; color: #aaa; }
.stat-lab { font-size: 10px; color: #aaa; margin-top: 1px; display: flex; align-items: center; gap: 3px; }
.sdot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

.week-grid { background: white; border-radius: 10px; border: 1px solid #efefef; overflow: hidden; }

.day-row { display: flex; align-items: stretch; border-bottom: 1px solid #f5f5f5; }
.day-row:last-child { border-bottom: none; }

.day-label-col { width: 38px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 0; border-right: 1px solid #f5f5f5; gap: 1px; }
.day-name { font-size: 11px; font-weight: 600; color: #1a1a1a; }
.day-date { font-size: 9px; color: #bbb; }

.shifts-col { flex: 1; display: flex; flex-direction: column; }
.shift-item { display: flex; align-items: stretch; padding: 5px 8px; border-bottom: 1px solid #f8f8f8; gap: 7px; }
.shift-item:last-child { border-bottom: none; }

.shift-bar { width: 2px; border-radius: 1px; flex-shrink: 0; align-self: stretch; min-height: 26px; }
.bar-站岗 { background: #7F77DD; }
.bar-检查培训 { background: #1D9E75; }
.bar-线上 { background: #378ADD; }
.bar-OFF { background: #d0d0d0; }

.shift-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
.shift-top { display: flex; align-items: center; gap: 5px; }
.shift-site { font-size: 11px; font-weight: 500; color: #1a1a1a; }
.shift-time { font-size: 10px; color: #aaa; }
.shift-bottom { display: flex; align-items: center; gap: 4px; }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 10px; }
.tag-站岗 { background: #EEEDFE; color: #3C3489; }
.tag-检查培训 { background: #E1F5EE; color: #085041; }
.tag-线上 { background: #E6F1FB; color: #0C447C; }
.tag-OFF { background: #f0f0f0; color: #aaa; }
.shift-h { font-size: 10px; color: #aaa; }
.shift-note { font-size: 9px; color: #bbb; font-style: italic; }

.row-off { background: #fafafa; }
.row-off .shift-site { color: #bbb; font-weight: 400; }
.row-off .shift-time { color: #d0d0d0; }

.day-total-col { width: 28px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-left: 1px solid #f5f5f5; font-size: 9px; color: #bbb; writing-mode: vertical-rl; letter-spacing: 1px; }

.loading { text-align: center; padding: 40px 0; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <a class="back" href="/admin">‹ Admin</a>
    <span class="page-title">Operations Rota</span>
  </div>

  <div class="week-nav">
    <button class="week-btn" id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel">Loading...</span>
    <button class="week-btn" id="nextWeek">›</button>
  </div>

  <div class="person-tabs" id="personTabs"></div>

  <div class="stat-row" id="statRow">
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab"><span class="sdot" style="background:#7F77DD"></span>站岗</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab"><span class="sdot" style="background:#1D9E75"></span>检查/培训</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab"><span class="sdot" style="background:#378ADD"></span>线上</div></div>
  </div>

  <div class="week-grid" id="weekGrid"><div class="loading">Loading...</div></div>

</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const SHEET_NAME = 'Operations Rota';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];

let allData = [], people = [], activePerson = '', weekOffset = 0;

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDisp(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function fmtTime(t) {
  if (!t || t === '' || t === '—') return null;
  const s = String(t).replace(/\D/g,'');
  if (s.length < 3) return null;
  const h = s.slice(0, s.length <= 3 ? 1 : 2);
  const m = s.slice(-2);
  return `${h.padStart(2,'0')}:${m}`;
}

function typeKey(type) {
  if (!type) return '检查培训';
  const t = type.trim();
  if (t === '站岗') return '站岗';
  if (t === '线上') return '线上';
  if (t.toUpperCase() === 'OFF') return 'OFF';
  return '检查培训';
}

function tagLabel(type) {
  const k = typeKey(type);
  if (k === '站岗') return '站岗';
  if (k === '线上') return '线上';
  if (k === 'OFF') return 'OFF';
  return '检查/培训';
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    if (cols[0]) rows.push(cols);
  }
  return rows;
}

function render() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('weekLabel').textContent = `${fmtDisp(ws)} – ${fmtDisp(we)}`;

  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDates.push(fmtDate(d));
  }

  const filtered = allData.filter(r => r[0] === activePerson && weekDates.includes(r[3]));

  let soloH = 0, otherH = 0, onlineH = 0;
  filtered.forEach(r => {
    const h = parseFloat(r[7]);
    if (isNaN(h)) return;
    const k = typeKey(r[1]);
    if (k === '站岗') soloH += h;
    else if (k === '检查培训') otherH += h;
    else if (k === '线上') onlineH += h;
  });

  document.getElementById('statRow').innerHTML = `
    <div class="stat"><div class="stat-val">${soloH > 0 ? soloH+'<small>h</small>' : '—'}</div><div class="stat-lab"><span class="sdot" style="background:#7F77DD"></span>站岗</div></div>
    <div class="stat"><div class="stat-val">${otherH > 0 ? otherH+'<small>h</small>' : '—'}</div><div class="stat-lab"><span class="sdot" style="background:#1D9E75"></span>检查/培训</div></div>
    <div class="stat"><div class="stat-val">${onlineH > 0 ? onlineH+'<small>h</small>' : '—'}</div><div class="stat-lab"><span class="sdot" style="background:#378ADD"></span>线上</div></div>`;

  const byDate = {};
  filtered.forEach(r => { if (!byDate[r[3]]) byDate[r[3]] = []; byDate[r[3]].push(r); });

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  weekDates.forEach((date, i) => {
    const rows = byDate[date];
    if (!rows || rows.length === 0) return;

    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const dayName = DAYS[d.getDay()];
    const dayDate = fmtDisp(d).replace(/^0/,'').replace('/0','/');

    const workRows = rows.filter(r => typeKey(r[1]) !== 'OFF');
    const totalH = workRows.reduce((s, r) => s + (parseFloat(r[7]) || 0), 0);
    const totalStr = totalH > 0 ? `${totalH}h` : '—';

    let shiftsHtml = '';
    rows.forEach(r => {
      const k = typeKey(r[1]);
      const isOff = k === 'OFF';
      const site = r[4] || (isOff ? 'OFF' : '—');
      const ts = fmtTime(r[5]);
      const te = fmtTime(r[6]);
      const hours = r[7] || '';
      const note = r[8] || '';
      const timeStr = ts && te ? `${ts}–${te}` : ts ? `${ts}–` : (isOff ? '' : '全天');
      const hoursStr = hours && hours !== '—' ? `${hours}h` : '';

      shiftsHtml += `
        <div class="shift-item${isOff ? ' row-off' : ''}">
          <div class="shift-bar bar-${k}"></div>
          <div class="shift-info">
            <div class="shift-top">
              <span class="shift-site">${site}</span>
              ${timeStr ? `<span class="shift-time">${timeStr}</span>` : ''}
            </div>
            <div class="shift-bottom">
              <span class="tag tag-${k}">${tagLabel(r[1])}</span>
              ${hoursStr && !isOff ? `<span class="shift-h">${hoursStr}</span>` : ''}
              ${note ? `<span class="shift-note">${note}</span>` : ''}
            </div>
          </div>
        </div>`;
    });

    grid.insertAdjacentHTML('beforeend', `
      <div class="day-row">
        <div class="day-label-col">
          <div class="day-name">${dayName}</div>
          <div class="day-date">${fmtDisp(d)}</div>
        </div>
        <div class="shifts-col">${shiftsHtml}</div>
        <div class="day-total-col">${totalStr}</div>
      </div>`);
  });

  if (!grid.innerHTML) {
    grid.innerHTML = '<div class="loading">本周暂无排班记录</div>';
  }
}

function renderTabs() {
  const tabs = document.getElementById('personTabs');
  tabs.innerHTML = '';
  people.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'person-tab' + (p === activePerson ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => { activePerson = p; renderTabs(); render(); };
    tabs.appendChild(btn);
  });
}

async function load() {
  try {
    const res = await fetch(DATA_URL);
    const text = await res.text();
    allData = parseCSV(text);
    people = [...new Set(allData.map(r => r[0]).filter(Boolean))];
    if (people.length > 0) activePerson = people[0];
    renderTabs();
    render();
  } catch(e) {
    document.getElementById('weekGrid').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

document.getElementById('prevWeek').onclick = () => { weekOffset--; render(); };
document.getElementById('nextWeek').onclick = () => { weekOffset++; render(); };

load();
</script>
</body>
</html>
