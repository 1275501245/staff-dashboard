<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Operations Rota</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.back { font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.back:active { opacity: 0.6; }
.page-title { font-size: 18px; font-weight: 600; }

.week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.week-btn { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: #1a1a1a; }
.week-btn:active { background: #f0f0f0; }
.week-label { flex: 1; text-align: center; font-size: 13px; color: #666; }

.person-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.person-tab { padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; color: #666; background: white; }
.person-tab.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; font-weight: 500; }

.stat-row { display: flex; gap: 8px; margin-bottom: 20px; }
.stat { background: white; border-radius: 10px; padding: 10px 12px; flex: 1; border: 1px solid #efefef; }
.stat-val { font-size: 18px; font-weight: 600; color: #1a1a1a; }
.stat-val small { font-size: 12px; font-weight: 400; color: #aaa; }
.stat-lab { font-size: 11px; color: #aaa; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.sdot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

.day-block { margin-bottom: 12px; }
.day-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; padding: 0 2px; }
.day-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.day-date { font-size: 11px; color: #aaa; }
.day-total { margin-left: auto; font-size: 11px; color: #aaa; }

.timeline { background: white; border-radius: 12px; border: 1px solid #efefef; overflow: hidden; }

.tl-row { display: flex; align-items: stretch; border-bottom: 1px solid #f5f5f5; }
.tl-row:last-child { border-bottom: none; }

.tl-time { width: 76px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 10px 10px 10px 14px; border-right: 1px solid #f5f5f5; }
.tl-time-start { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.tl-time-end { font-size: 11px; color: #aaa; margin-top: 1px; }

.tl-bar { width: 3px; flex-shrink: 0; }
.bar-站岗 { background: #7F77DD; }
.bar-检查培训 { background: #1D9E75; }
.bar-线上 { background: #378ADD; }
.bar-OFF { background: #d0d0d0; }

.tl-content { flex: 1; padding: 10px 10px; display: flex; flex-direction: column; justify-content: center; }
.tl-site { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
.tl-note { font-size: 11px; color: #aaa; margin-top: 2px; }
.tl-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin-top: 4px; align-self: flex-start; }
.tag-站岗 { background: #EEEDFE; color: #3C3489; }
.tag-检查培训 { background: #E1F5EE; color: #085041; }
.tag-线上 { background: #E6F1FB; color: #0C447C; }
.tag-OFF { background: #f0f0f0; color: #999; }

.tl-hours { width: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #aaa; border-left: 1px solid #f5f5f5; }

.row-off .tl-time-start,
.row-off .tl-time-end,
.row-off .tl-site,
.row-off .tl-note { color: #bbb; }
.row-off .tl-time { border-right-color: #f0f0f0; }
.row-off .tl-hours { color: #ccc; border-left-color: #f0f0f0; }
.row-off { background: #fafafa; }

.loading { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <a class="back" href="/admin">‹ Admin</a>
    <span class="page-title">Operations Rota</span>
  </div>

  <div class="week-nav">
    <button class="week-btn" id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel">Loading...</span>
    <button class="week-btn" id="nextWeek">›</button>
  </div>

  <div class="person-tabs" id="personTabs"></div>

  <div class="stat-row" id="statRow">
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab">站岗</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab">检查/培训</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab">线上</div></div>
  </div>

  <div id="dayList"><div class="loading">Loading...</div></div>

</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const SHEET_NAME = 'Operations Rota';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];

let allData = [], people = [], activePerson = '', weekOffset = 0;

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDisp(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function fmtTime(t) {
  if (!t || t === '' || t === '—') return null;
  const s = String(t).replace(':','').replace(/\D/g,'');
  if (s.length < 3) return null;
  const h = s.slice(0, s.length <= 3 ? 1 : 2);
  const m = s.slice(-2);
  return `${h.padStart(2,'0')}:${m}`;
}

function typeKey(type) {
  if (type === '站岗') return '站岗';
  if (type === '线上') return '线上';
  if (type === 'OFF' || type === 'Off' || type === 'off') return 'OFF';
  return '检查培训';
}

function tagLabel(type) {
  const k = typeKey(type);
  if (k === '站岗') return '站岗';
  if (k === '线上') return '线上';
  if (k === 'OFF') return 'OFF';
  return '检查/培训';
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    if (cols[0]) rows.push(cols);
  }
  return rows;
}

function render() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('weekLabel').textContent = `${fmtDisp(ws)} – ${fmtDisp(we)}`;

  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDates.push(fmtDate(d));
  }

  const filtered = allData.filter(r => r[0] === activePerson && weekDates.includes(r[3]));

  let soloH = 0, otherH = 0, onlineH = 0;
  filtered.forEach(r => {
    const h = parseFloat(r[7]);
    if (isNaN(h)) return;
    const k = typeKey(r[1]);
    if (k === '站岗') soloH += h;
    else if (k === '检查培训') otherH += h;
    else if (k === '线上') onlineH += h;
  });

  const fmt = h => h > 0 ? `<small>h</small>` : '';
  document.getElementById('statRow').innerHTML = `
    <div class="stat">
      <div class="stat-val">${soloH > 0 ? soloH : '—'}${soloH > 0 ? '<small>h</small>' : ''}</div>
      <div class="stat-lab"><span class="sdot" style="background:#7F77DD"></span>站岗</div>
    </div>
    <div class="stat">
      <div class="stat-val">${otherH > 0 ? otherH : '—'}${otherH > 0 ? '<small>h</small>' : ''}</div>
      <div class="stat-lab"><span class="sdot" style="background:#1D9E75"></span>检查/培训</div>
    </div>
    <div class="stat">
      <div class="stat-val">${onlineH > 0 ? onlineH : '—'}${onlineH > 0 ? '<small>h</small>' : ''}</div>
      <div class="stat-lab"><span class="sdot" style="background:#378ADD"></span>线上</div>
    </div>`;

  const byDate = {};
  filtered.forEach(r => { if (!byDate[r[3]]) byDate[r[3]] = []; byDate[r[3]].push(r); });

  const dayList = document.getElementById('dayList');
  dayList.innerHTML = '';

  weekDates.forEach((date, i) => {
    const rows = byDate[date];
    if (!rows || rows.length === 0) return;

    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const dayName = DAYS[d.getDay()];

    const workRows = rows.filter(r => typeKey(r[1]) !== 'OFF');
    const totalH = workRows.reduce((s, r) => s + (parseFloat(r[7]) || 0), 0);
    const totalStr = totalH > 0 ? `共 ${totalH}h` : '—';

    let html = `
      <div class="day-block">
        <div class="day-header">
          <span class="day-name">${dayName}</span>
          <span class="day-date">${fmtDisp(d)}</span>
          <span class="day-total">${totalStr}</span>
        </div>
        <div class="timeline">`;

    rows.forEach(r => {
      const type = r[1] || '';
      const k = typeKey(type);
      const isOff = k === 'OFF';
      const site = r[4] || (isOff ? 'OFF' : '—');
      const ts = fmtTime(r[5]);
      const te = fmtTime(r[6]);
      const hours = r[7] || '';
      const note = r[8] || '';
      const timeStart = ts || (isOff ? '' : '全天');
      const timeEnd = te || '';
      const hoursStr = hours && hours !== '—' ? `${hours}h` : '—';

      html += `
        <div class="tl-row${isOff ? ' row-off' : ''}">
          <div class="tl-time">
            <div class="tl-time-start">${timeStart}</div>
            ${timeEnd ? `<div class="tl-time-end">${timeEnd}</div>` : ''}
          </div>
          <div class="tl-bar bar-${k}"></div>
          <div class="tl-content">
            <div class="tl-site">${site}</div>
            ${note ? `<div class="tl-note">${note}</div>` : ''}
            <span class="tl-tag tag-${k}">${tagLabel(type)}</span>
          </div>
          <div class="tl-hours">${isOff ? '' : hoursStr}</div>
        </div>`;
    });

    html += `</div></div>`;
    dayList.insertAdjacentHTML('beforeend', html);
  });

  if (!dayList.innerHTML) {
    dayList.innerHTML = '<div class="loading">本周暂无排班记录</div>';
  }
}

function renderTabs() {
  const tabs = document.getElementById('personTabs');
  tabs.innerHTML = '';
  people.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'person-tab' + (p === activePerson ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => { activePerson = p; renderTabs(); render(); };
    tabs.appendChild(btn);
  });
}

async function load() {
  try {
    const res = await fetch(DATA_URL);
    const text = await res.text();
    allData = parseCSV(text);
    people = [...new Set(allData.map(r => r[0]).filter(Boolean))];
    if (people.length > 0) activePerson = people[0];
    renderTabs();
    render();
  } catch(e) {
    document.getElementById('dayList').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

document.getElementById('prevWeek').onclick = () => { weekOffset--; render(); };
document.getElementById('nextWeek').onclick = () => { weekOffset++; render(); };

load();
</script>
</body>
</html>
