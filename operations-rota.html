<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Operations Rota</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 16px 12px 60px; }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.back { font-size: 12px; color: #888; text-decoration: none; }
.back:active { opacity: 0.6; }
.page-title { font-size: 16px; font-weight: 600; }

.week-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.week-btn { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; color: #1a1a1a; }
.week-btn:active { background: #f0f0f0; }
.week-label { flex: 1; text-align: center; font-size: 11px; color: #666; }

.person-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.person-tab { padding: 3px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #e0e0e0; color: #666; background: white; }
.person-tab.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; font-weight: 500; }

.stat-row { display: flex; gap: 6px; margin-bottom: 10px; }
.stat { background: white; border-radius: 8px; padding: 7px 8px; flex: 1; border: 1px solid #efefef; }
.stat-val { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.stat-val small { font-size: 10px; font-weight: 400; color: #aaa; }
.stat-lab { font-size: 9px; color: #aaa; margin-top: 1px; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
.sdot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

.legend { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-bottom: 10px; padding: 0 2px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888; }
.ldot { width: 8px; height: 8px; border-radius: 3px; display: inline-block; }

/* ===== calendar ===== */
.cal { background: white; border-radius: 10px; border: 1px solid #efefef; overflow: hidden; }

.cal-head, .cal-foot { display: grid; grid-template-columns: 26px repeat(7, minmax(0,1fr)); }
.cal-head { border-bottom: 1px solid #f0f0f0; }
.cal-foot { border-top: 1px solid #f0f0f0; }
.ch-cell { text-align: center; padding: 7px 1px 6px; border-left: 1px solid #f5f5f5; }
.ch-cell:first-child, .cf-cell:first-child { border-left: none; }
.ch-name { font-size: 11px; font-weight: 600; }
.ch-date { font-size: 9px; color: #bbb; margin-top: 1px; }
.ch-cell.today .ch-name { color: #534AB7; }
.ch-cell.today .ch-date { color: #7F77DD; }
.cf-cell { text-align: center; padding: 5px 1px; font-size: 10px; font-weight: 600; color: #666; border-left: 1px solid #f5f5f5; }
.cf-lab { font-size: 8px; font-weight: 400; color: #ccc; display: flex; align-items: center; justify-content: center; }

.cal-body { display: grid; grid-template-columns: 26px repeat(7, minmax(0,1fr)); position: relative; }
.time-col { position: relative; }
.time-lab { position: absolute; right: 3px; font-size: 8px; color: #ccc; transform: translateY(-50%); }
.day-col { position: relative; border-left: 1px solid #f5f5f5; }
.day-col.today { background: #FBFAFF; }
.gline { position: absolute; left: 0; right: 0; height: 1px; background: #f5f5f5; pointer-events: none; }

.blk { position: absolute; left: 2px; right: 2px; border-radius: 5px; padding: 3px 3px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; gap: 1px; }
.blk:active { opacity: 0.75; }
.b-site { font-size: 10px; font-weight: 600; line-height: 1.2; }
.b-time { font-size: 8px; line-height: 1.2; }
.b-h { font-size: 8px; line-height: 1.2; }
.blk-note-dot { position: absolute; top: 3px; right: 3px; width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.55; }

.u-chip { position: absolute; left: 2px; right: 2px; border-radius: 5px; padding: 2px 3px; font-size: 9px; font-weight: 500; text-align: center; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.u-chip:active { opacity: 0.75; }

.off-chip { position: absolute; left: 2px; right: 2px; border: 1px dashed #ddd; border-radius: 5px; padding: 2px 0; text-align: center; font-size: 8px; color: #bbb; letter-spacing: 1px; background: #fafafa; }
.off-full { position: absolute; top: 2px; bottom: 2px; left: 2px; right: 2px; border: 1px dashed #e5e5e5; border-radius: 5px; background: #fafafa; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #ccc; letter-spacing: 2px; writing-mode: vertical-rl; }

/* ===== detail card ===== */
.detail { margin-top: 10px; background: white; border-radius: 10px; border: 1px solid #efefef; padding: 10px 12px; display: none; }
.detail.show { display: block; }
.detail-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.detail-site { font-size: 13px; font-weight: 600; }
.detail-close { font-size: 14px; color: #ccc; cursor: pointer; padding: 0 4px; }
.detail-row { font-size: 11px; color: #666; margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.tag { font-size: 9px; padding: 1px 6px; border-radius: 10px; }
.tag-站岗 { background: #EEEDFE; color: #3C3489; }
.tag-检查培训 { background: #E1F5EE; color: #085041; }
.tag-线上 { background: #E6F1FB; color: #0C447C; }
.tag-线下 { background: #E8EDF2; color: #33475B; }
.tag-OFF { background: #f0f0f0; color: #aaa; }
.detail-note { font-size: 11px; color: #999; margin-top: 5px; padding-top: 5px; border-top: 1px solid #f5f5f5; line-height: 1.5; }

.loading { text-align: center; padding: 40px 0; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <a class="back" href="/admin">‹ Admin</a>
    <span class="page-title">Operations Rota</span>
  </div>

  <div class="week-nav">
    <button class="week-btn" id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel">Loading...</span>
    <button class="week-btn" id="nextWeek">›</button>
  </div>

  <div class="person-tabs" id="personTabs"></div>

  <div class="stat-row" id="statRow">
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab"><span class="sdot" style="background:#7F77DD"></span>站岗</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab"><span class="sdot" style="background:#1D9E75"></span>检查/培训</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab"><span class="sdot" style="background:#378ADD"></span>线上</div></div>
    <div class="stat"><div class="stat-val">—</div><div class="stat-lab">合计</div></div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="cal" id="cal"><div class="loading">Loading...</div></div>

  <div class="detail" id="detail"></div>

</div>

<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'Operations Rota';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const PPH = 40; // px per hour

// 站点配色：与 Rota_next 表格颜色对齐 [背景, 标题色, 副文字色]
const SITE_COLORS = {
  '东区':        ['#DEF1FB','#0A5C88','#1578A9'], // Shoreditch 蓝
  'Shoreditch':  ['#DEF1FB','#0A5C88','#1578A9'],
  '巴特西':      ['#FCF3D6','#7F5F00','#A07C0A'], // Battersea 黄
  'Battersea':   ['#FCF3D6','#7F5F00','#A07C0A'],
  '塔桥':        ['#E7F1DF','#3C6B21','#55842F'], // TowerBridge 绿
  'Tower Bridge':['#E7F1DF','#3C6B21','#55842F'],
  'BC':          ['#FCEDDC','#8A4D07','#A96A17'], // BrentCross 橙
  'Brent Cross': ['#FCEDDC','#8A4D07','#A96A17'],
  '1店':         ['#E0F7FB','#0B6473','#157F90'], // Piccadilly 青
  'Piccadilly':  ['#E0F7FB','#0B6473','#157F90']
};
const TYPE_COLORS = {
  '线上': ['#EEEDFE','#3C3489','#534AB7'],
  '线下': ['#E8EDF2','#33475B','#52677D']
};
const FALLBACK_COLOR = ['#F1EFE8','#444441','#5F5E5A'];

function colorFor(site, typeK) {
  if (site && SITE_COLORS[site]) return SITE_COLORS[site];
  if (!site && TYPE_COLORS[typeK]) return TYPE_COLORS[typeK];
  return FALLBACK_COLOR;
}

let allData = [], people = [], activePerson = '', weekOffset = 0, weekRows = [];

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDisp(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function fmtTime(t) {
  if (!t || t === '' || t === '—') return null;
  const s = String(t).replace(/\D/g,'');
  if (s.length < 3) return null;
  const h = s.slice(0, s.length <= 3 ? 1 : 2);
  const m = s.slice(-2);
  return `${h.padStart(2,'0')}:${m}`;
}

function toDec(t) {
  const f = fmtTime(t);
  if (!f) return null;
  const [h, m] = f.split(':').map(Number);
  return h + m / 60;
}

function typeKey(type) {
  if (!type) return '检查培训';
  const t = type.trim();
  if (t === '站岗') return '站岗';
  if (t === '线上') return '线上';
  if (t === '线下') return '线下';
  if (t.toUpperCase() === 'OFF') return 'OFF';
  return '检查培训';
}

function tagLabel(type) {
  const k = typeKey(type);
  if (k === '站岗') return '站岗';
  if (k === '线上') return '线上';
  if (k === '线下') return '线下';
  if (k === 'OFF') return 'OFF';
  return '检查/培训';
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    if (cols[0]) rows.push(cols);
  }
  return rows;
}

function render() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('weekLabel').textContent = `${fmtDisp(ws)} – ${fmtDisp(we)}`;
  document.getElementById('detail').className = 'detail';

  const todayStr = fmtDate(new Date());
  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDates.push(fmtDate(d));
  }

  weekRows = allData.filter(r => r[0] === activePerson && weekDates.includes(r[3]));

  // ---- stats ----
  let soloH = 0, otherH = 0, onlineH = 0;
  weekRows.forEach(r => {
    const h = parseFloat(r[7]);
    if (isNaN(h)) return;
    const k = typeKey(r[1]);
    if (k === '站岗') soloH += h;
    else if (k === '检查培训' || k === '线下') otherH += h;
    else if (k === '线上') onlineH += h;
  });
  const totalH = soloH + otherH + onlineH;
  const sv = v => v > 0 ? Math.round(v*10)/10 + '<small>h</small>' : '—';
  document.getElementById('statRow').innerHTML = `
    <div class="stat"><div class="stat-val">${sv(soloH)}</div><div class="stat-lab"><span class="sdot" style="background:#7F77DD"></span>站岗</div></div>
    <div class="stat"><div class="stat-val">${sv(otherH)}</div><div class="stat-lab"><span class="sdot" style="background:#1D9E75"></span>检查/培训</div></div>
    <div class="stat"><div class="stat-val">${sv(onlineH)}</div><div class="stat-lab"><span class="sdot" style="background:#378ADD"></span>线上</div></div>
    <div class="stat"><div class="stat-val">${sv(totalH)}</div><div class="stat-lab">合计</div></div>`;

  // ---- legend: 只显示本周出现的站点/类型 ----
  const legendSeen = new Map();
  weekRows.forEach(r => {
    const k = typeKey(r[1]);
    if (k === 'OFF') return;
    const site = r[4] || '';
    if (!site && !String(r[1]).trim()) return;
    const label = site || tagLabel(r[1]);
    if (!legendSeen.has(label)) legendSeen.set(label, colorFor(site, k));
  });
  document.getElementById('legend').innerHTML = [...legendSeen.entries()]
    .map(([label, c]) => `<span class="legend-item"><span class="ldot" style="background:${c[0]};border:1px solid ${c[2]}55"></span>${label}</span>`)
    .join('');

  // ---- time range: from data, fallback 10–23 ----
  let minT = Infinity, maxT = -Infinity;
  weekRows.forEach(r => {
    if (typeKey(r[1]) === 'OFF') return;
    const s = toDec(r[5]), e = toDec(r[6]);
    if (s !== null) minT = Math.min(minT, s);
    if (e !== null) maxT = Math.max(maxT, e);
  });
  const gridStart = isFinite(minT) ? Math.floor(minT) : 10;
  const gridEnd = isFinite(maxT) ? Math.ceil(maxT) : 23;
  const bodyH = (gridEnd - gridStart) * PPH;

  // ---- group by date ----
  const byDate = {};
  weekRows.forEach((r, idx) => {
    if (!byDate[r[3]]) byDate[r[3]] = [];
    byDate[r[3]].push({ r, idx });
  });

  // ---- header ----
  let headHtml = '<div class="ch-cell"></div>';
  weekDates.forEach((date, i) => {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    headHtml += `<div class="ch-cell${date === todayStr ? ' today' : ''}">
      <div class="ch-name">${DAYS[d.getDay()]}</div>
      <div class="ch-date">${fmtDisp(d)}</div>
    </div>`;
  });

  // ---- time labels + gridlines ----
  let timeLabHtml = '';
  let glinesHtml = '';
  for (let h = gridStart; h <= gridEnd; h += 2) {
    const top = (h - gridStart) * PPH;
    timeLabHtml += `<div class="time-lab" style="top:${top}px">${h}:00</div>`;
    if (h > gridStart && h < gridEnd) glinesHtml += `<div class="gline" style="top:${top}px"></div>`;
  }

  // ---- day columns ----
  let bodyHtml = `<div class="time-col" style="height:${bodyH}px">${timeLabHtml}</div>`;
  weekDates.forEach(date => {
    const entries = byDate[date] || [];
    const timed = entries.filter(e => typeKey(e.r[1]) !== 'OFF' && toDec(e.r[5]) !== null && toDec(e.r[6]) !== null);
    const untimed = entries.filter(e => typeKey(e.r[1]) !== 'OFF' && (toDec(e.r[5]) === null || toDec(e.r[6]) === null)
      && (String(e.r[1]).trim() || String(e.r[4]).trim() || String(e.r[8] || '').trim()));
    const hasOff = entries.some(e => typeKey(e.r[1]) === 'OFF');

    let blocks = '';
    let chipTop = 2;
    if (timed.length === 0 && untimed.length === 0 && hasOff) {
      blocks = '<div class="off-full">OFF</div>';
    } else {
      if (hasOff) { blocks += `<div class="off-chip" style="top:${chipTop}px">OFF</div>`; chipTop += 20; }
      // 没有起止时间的班次 → 列顶小标签（点击看详情/备注）
      untimed.forEach(({ r, idx }) => {
        const k = typeKey(r[1]);
        const c = colorFor(r[4] || '', k);
        const label = r[4] || tagLabel(r[1]);
        blocks += `<div class="u-chip" style="top:${chipTop}px;background:${c[0]};color:${c[1]}" onclick="showDetail(${idx})">${label}</div>`;
        chipTop += 20;
      });
      timed.forEach(({ r, idx }) => {
        const k = typeKey(r[1]);
        const c = colorFor(r[4] || '', k);
        const s = toDec(r[5]), e = toDec(r[6]);
        const top = (s - gridStart) * PPH;
        const h = Math.max((e - s) * PPH - 2, 24);
        const hours = r[7] && r[7] !== '—' ? `${r[7]}h` : '';
        const note = r[8] || '';
        const showTime = h >= 44;
        const showH = h >= 34;
        const title = r[4] || tagLabel(r[1]);
        blocks += `<div class="blk" style="top:${top}px;height:${h}px;background:${c[0]};color:${c[2]}" onclick="showDetail(${idx})">
          ${note ? '<span class="blk-note-dot"></span>' : ''}
          <span class="b-site" style="color:${c[1]}">${title}</span>
          ${showTime ? `<span class="b-time" style="color:${c[2]}">${fmtTime(r[5])}–${fmtTime(r[6])}</span>` : ''}
          ${showH && hours ? `<span class="b-h" style="color:${c[2]}">${hours}</span>` : ''}
        </div>`;
      });
    }
    bodyHtml += `<div class="day-col${date === todayStr ? ' today' : ''}" style="height:${bodyH}px">${glinesHtml}${blocks}</div>`;
  });

  // ---- footer: daily totals ----
  let footHtml = '<div class="cf-cell cf-lab">合计</div>';
  weekDates.forEach(date => {
    const entries = byDate[date] || [];
    const dayH = entries.filter(e => typeKey(e.r[1]) !== 'OFF')
      .reduce((s, e) => s + (parseFloat(e.r[7]) || 0), 0);
    footHtml += `<div class="cf-cell">${dayH > 0 ? Math.round(dayH*10)/10 + 'h' : '—'}</div>`;
  });

  document.getElementById('cal').innerHTML =
    weekRows.length === 0
      ? '<div class="loading">本周暂无排班记录</div>'
      : `<div class="cal-head">${headHtml}</div>
         <div class="cal-body">${bodyHtml}</div>
         <div class="cal-foot">${footHtml}</div>`;
}

function showDetail(idx) {
  const r = weekRows[idx];
  if (!r) return;
  const k = typeKey(r[1]);
  const d = new Date(r[3] + 'T00:00:00');
  const ts = fmtTime(r[5]), te = fmtTime(r[6]);
  const el = document.getElementById('detail');
  el.innerHTML = `
    <div class="detail-top">
      <span class="detail-site">${r[4] || tagLabel(r[1])}</span>
      <span class="detail-close" onclick="document.getElementById('detail').className='detail'">✕</span>
    </div>
    <div class="detail-row">
      <span class="tag tag-${k}">${tagLabel(r[1])}</span>
      <span>${DAYS[d.getDay()]} ${fmtDisp(d)}</span>
      ${ts && te ? `<span>${ts}–${te}</span>` : ''}
      ${r[7] && r[7] !== '—' ? `<span>${r[7]}h</span>` : ''}
    </div>
    ${r[8] ? `<div class="detail-note">${r[8]}</div>` : ''}`;
  el.className = 'detail show';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderTabs() {
  const tabs = document.getElementById('personTabs');
  tabs.innerHTML = '';
  people.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'person-tab' + (p === activePerson ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => { activePerson = p; renderTabs(); render(); };
    tabs.appendChild(btn);
  });
}

async function load() {
  try {
    const res = await fetch(DATA_URL);
    const text = await res.text();
    allData = parseCSV(text);
    people = [...new Set(allData.map(r => r[0]).filter(Boolean))];
    if (people.length > 0) activePerson = people[0];
    renderTabs();
    render();
  } catch(e) {
    document.getElementById('cal').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

document.getElementById('prevWeek').onclick = () => { weekOffset--; render(); };
document.getElementById('nextWeek').onclick = () => { weekOffset++; render(); };

load();
</script>
</body>
</html>
