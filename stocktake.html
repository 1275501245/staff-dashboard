<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stock Check</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding-bottom: 100px; }

.header { background: #fff; border-bottom: 1px solid #efefef; padding: 16px; }
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.back { width: 30px; height: 30px; border-radius: 50%; background: #f5f5f5; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #999; text-decoration: none; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

.date-row { display: flex; align-items: center; gap: 6px; }
.date-nav { width: 32px; height: 32px; border: 1px solid #efefef; border-radius: 9px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; color: #999; flex-shrink: 0; }
.date-display { flex: 1; height: 32px; border: 1px solid #efefef; border-radius: 9px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #1a1a1a; cursor: pointer; position: relative; }
.date-display input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.today-btn { height: 32px; padding: 0 12px; border: 1px solid #f0c0c5; border-radius: 9px; background: #fdf0f2; color: #c8102e; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: inherit; }

.site-bar { background: #fff; border-bottom: 1px solid #efefef; padding: 10px 16px; }
.bar-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.site-row { display: flex; gap: 6px; flex-wrap: wrap; }
.site-btn { padding: 6px 14px; border: 1px solid #efefef; border-radius: 20px; background: #f5f5f5; font-size: 13px; color: #666; cursor: pointer; font-family: inherit; }
.site-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.body { padding: 14px 16px; }
.state-box { text-align: center; padding: 50px 20px; color: #aaa; font-size: 13px; }
.state-icon { font-size: 32px; margin-bottom: 10px; }
.state-title { font-size: 14px; font-weight: 500; color: #999; margin-bottom: 6px; }

.supp-section { margin-bottom: 16px; }
.supp-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; padding: 0 2px; }

.item-card { background: #fff; border: 1px solid #efefef; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
.item-row { display: flex; align-items: center; gap: 8px; }
.item-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.unit-inputs { display: flex; gap: 10px; }
.unit-box { display: flex; align-items: center; gap: 4px; }
.unit-label { font-size: 11px; color: #aaa; white-space: nowrap; }
.unit-input { width: 56px; height: 36px; border: 1px solid #efefef; border-radius: 9px; background: #f5f5f5; font-size: 16px; font-weight: 600; text-align: center; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.unit-input.active { border-color: #1a1a1a; background: #fff; }

.submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #efefef; padding: 12px 16px; display: flex; gap: 10px; z-index: 50; }
.submit-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.submit-btn:disabled { background: #ccc; cursor: not-allowed; }
.reset-btn { padding: 14px 18px; border-radius: 12px; border: 1px solid #efefef; background: #f5f5f5; color: #999; font-size: 14px; cursor: pointer; font-family: inherit; }

.numpad-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.2); z-index: 199; }
.numpad-wrap { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: #f5f5f5; border-top: 1px solid #ddd; padding: 10px 12px 32px; }
.numpad-wrap.show { display: block; }
.numpad-backdrop.show { display: block; }
.np-display { background: #fff; border: 1px solid #efefef; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.np-lbl { font-size: 12px; color: #aaa; }
.np-val { font-size: 24px; font-weight: 600; color: #1a1a1a; }
.np-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
.np-btn { height: 54px; border-radius: 10px; border: 1px solid #e0e0e0; background: #fff; font-size: 22px; font-weight: 400; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.np-btn:active { background: #efefef; }
.np-btn.gray { background: #e8e8e8; font-size: 16px; color: #555; }
.np-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.np-btn.done { background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 600; border-color: #1a1a1a; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a class="back" href="/home">←</a>
    <div>
      <div class="header-title">Stock Check</div>
      <div class="header-sub" id="hdr-sub"></div>
    </div>
  </div>
  <div class="date-row">
    <div class="date-nav" onclick="shiftDate(-1)">‹</div>
    <div class="date-display">
      <span id="date-label"></span>
      <input type="date" id="date-picker" onchange="onDateChange()">
    </div>
    <div class="date-nav" onclick="shiftDate(1)">›</div>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
</div>

<div class="site-bar">
  <div class="bar-label">Site</div>
  <div class="site-row" id="site-row"></div>
</div>

<div class="body" id="body">
  <div class="state-box"><div class="state-icon">☝️</div><div class="state-title">Select a site</div></div>
</div>

<div class="submit-bar">
  <button class="reset-btn" onclick="resetAll()">Reset</button>
  <button class="submit-btn" id="submit-btn" onclick="submitData()" disabled>Submit</button>
</div>

<div class="numpad-backdrop" id="np-backdrop" onclick="closeNumpad()"></div>
<div class="numpad-wrap" id="np-wrap">
  <div class="np-display">
    <div class="np-lbl" id="np-lbl"></div>
    <div class="np-val" id="np-val">0</div>
  </div>
  <div class="np-grid">
    <button class="np-btn" onclick="npIn('1')">1</button>
    <button class="np-btn" onclick="npIn('2')">2</button>
    <button class="np-btn" onclick="npIn('3')">3</button>
    <button class="np-btn" onclick="npIn('4')">4</button>
    <button class="np-btn" onclick="npIn('5')">5</button>
    <button class="np-btn" onclick="npIn('6')">6</button>
    <button class="np-btn" onclick="npIn('7')">7</button>
    <button class="np-btn" onclick="npIn('8')">8</button>
    <button class="np-btn" onclick="npIn('9')">9</button>
    <button class="np-btn gray" onclick="npIn('.')">.</button>
    <button class="np-btn" onclick="npIn('0')">0</button>
    <button class="np-btn gray" onclick="npDel()">⌫</button>
  </div>
  <div class="np-row2">
    <button class="np-btn gray" onclick="npClear()">Clear</button>
    <button class="np-btn done" onclick="closeNumpad()">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKJhVgwjqzZNyiGYnufrkpYiSjaP-k5RbnJcR_va5yC-58pWZ0gQdRol4JybMN-jOT/exec';
const SITES = ['Shoreditch', 'Battersea', 'Tower Bridge'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let selectedSite = '';
let suppliers = [];
let products = [];
let quantities = {};

let npKey = '', npInputId = '', npStr = '0';

function todayStr() { return new Date().toISOString().split('T')[0]; }

function formatLabel(d) {
  const dt = new Date(d + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (d === todayStr() ? 'Today · ' : '') + DAYS[dt.getDay()] + ' ' + dt.getDate() + ' ' + months[dt.getMonth()];
}

function dayOfDate(d) { return DAYS[new Date(d + 'T00:00:00').getDay()]; }

function shiftDate(n) {
  const p = document.getElementById('date-picker');
  const d = new Date(p.value + 'T00:00:00');
  d.setDate(d.getDate() + n);
  p.value = d.toISOString().split('T')[0];
  onDateChange();
}

function goToday() {
  document.getElementById('date-picker').value = todayStr();
  onDateChange();
}

function onDateChange() {
  const v = document.getElementById('date-picker').value;
  document.getElementById('date-label').textContent = formatLabel(v);
  document.getElementById('hdr-sub').textContent = formatLabel(v);
  quantities = {};
  renderItems();
}

function selectSite(site, btn) {
  selectedSite = site;
  document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  quantities = {};
  renderItems();
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (!json.table?.rows?.length) return [];
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((col, i) => { obj[col] = r.c[i]?.v ?? r.c[i]?.f ?? ''; });
    return obj;
  });
}

function renderItems() {
  const date = document.getElementById('date-picker').value;
  const dayStr = dayOfDate(date);

  if (!selectedSite) {
    document.getElementById('body').innerHTML = `<div class="state-box"><div class="state-icon">☝️</div><div class="state-title">Select a site</div></div>`;
    document.getElementById('submit-btn').disabled = true;
    return;
  }

  const todaySupps = suppliers.filter(s => {
    const days = (s['StocktakeDays'] || '').split(',').map(d => d.trim());
    return days.includes(dayStr);
  });

  if (!todaySupps.length) {
    document.getElementById('body').innerHTML = `<div class="state-box"><div class="state-icon">✅</div><div class="state-title">No stock check on ${dayStr}</div><div>Select a different date to do a catch-up count</div></div>`;
    document.getElementById('submit-btn').disabled = true;
    return;
  }

  let html = '';
  let hasProducts = false;

  todaySupps.forEach(supp => {
    const suppName = supp['SupplierName'];
    const suppProds = products.filter(p => p['SupplierName'] === suppName);
    if (!suppProds.length) return;
    hasProducts = true;

    html += `<div class="supp-section"><div class="supp-label">${suppName}</div>`;

    suppProds.forEach(p => {
      const name = p['MyName'];
      const unit = p['Unit'] || '';
      const subUnit = p['SubUnit'] || '';
      const qtyKey = name + '|qty';
      const subKey = name + '|subqty';
      if (!quantities[qtyKey]) quantities[qtyKey] = '0';
      if (subUnit && !quantities[subKey]) quantities[subKey] = '0';

      const mainId = 'inp_' + name.replace(/[^a-zA-Z0-9]/g, '_') + '_qty';
      const subId = 'inp_' + name.replace(/[^a-zA-Z0-9]/g, '_') + '_subqty';

      let unitBoxes = '';
      if (unit) {
        unitBoxes += `<div class="unit-box">
          <span class="unit-label">${unit}</span>
          <input class="unit-input" id="${mainId}" readonly value="${quantities[qtyKey]}"
            onclick="openNumpad('${qtyKey}','${name} · ${unit}','${mainId}')">
        </div>`;
      }
      if (subUnit) {
        unitBoxes += `<div class="unit-box">
          <span class="unit-label">${subUnit}</span>
          <input class="unit-input" id="${subId}" readonly value="${quantities[subKey]}"
            onclick="openNumpad('${subKey}','${name} · ${subUnit}','${subId}')">
        </div>`;
      }

      html += `<div class="item-card">
        <div class="item-name">${name}</div>
        <div class="unit-inputs">${unitBoxes}</div>
      </div>`;
    });

    html += `</div>`;
  });

  if (!hasProducts) {
    document.getElementById('body').innerHTML = `<div class="state-box"><div class="state-icon">📭</div><div class="state-title">No products found</div></div>`;
    document.getElementById('submit-btn').disabled = true;
    return;
  }

  document.getElementById('body').innerHTML = html;
  document.getElementById('submit-btn').disabled = false;
}

function openNumpad(key, label, inputId) {
  npKey = key; npInputId = inputId;
  npStr = quantities[key] || '0';
  document.getElementById('np-lbl').textContent = label;
  document.getElementById('np-val').textContent = npStr;
  document.getElementById('np-wrap').classList.add('show');
  document.getElementById('np-backdrop').classList.add('show');
  document.querySelectorAll('.unit-input').forEach(el => el.classList.remove('active'));
  document.getElementById(inputId)?.classList.add('active');
}

function closeNumpad() {
  document.getElementById('np-wrap').classList.remove('show');
  document.getElementById('np-backdrop').classList.remove('show');
  document.querySelectorAll('.unit-input').forEach(el => el.classList.remove('active'));
}

function npIn(ch) {
  if (ch === '.' && npStr.includes('.')) return;
  if (npStr === '0' && ch !== '.') npStr = ch;
  else npStr += ch;
  if (npStr.includes('.') && npStr.split('.')[1].length > 1) { npStr = npStr.slice(0,-1); return; }
  syncNumpad();
}

function npDel() { npStr = npStr.slice(0,-1) || '0'; syncNumpad(); }
function npClear() { npStr = '0'; syncNumpad(); }

function syncNumpad() {
  document.getElementById('np-val').textContent = npStr;
  quantities[npKey] = npStr;
  const inp = document.getElementById(npInputId);
  if (inp) inp.value = npStr;
}

function resetAll() {
  Object.keys(quantities).forEach(k => { quantities[k] = '0'; });
  document.querySelectorAll('.unit-input').forEach(el => { el.value = '0'; });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function submitData() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const date = document.getElementById('date-picker').value;
  const rows = [];

  // Collect all product names that have entries
  const productNames = [...new Set(Object.keys(quantities).map(k => k.split('|')[0]))];

  productNames.forEach(product => {
    const qty = parseFloat(quantities[product + '|qty']) || 0;
    const subQty = parseFloat(quantities[product + '|subqty']) || 0;
    if (!qty && !subQty) return;
    const prod = products.find(p => p['MyName'] === product);
    rows.push({ date, site: selectedSite, product, Quantity: qty, SubQuantity: subQty });
  });

  if (!rows.length) {
    showToast('No quantities entered');
    btn.disabled = false; btn.textContent = 'Submit';
    return;
  }

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'stocktake', rows })
    });
    showToast('✓ Submitted successfully');
    resetAll();
  } catch(e) {
    showToast('Failed to submit. Try again.');
  }

  btn.disabled = false; btn.textContent = 'Submit';
}

async function init() {
  const today = todayStr();
  document.getElementById('date-picker').value = today;
  document.getElementById('date-label').textContent = formatLabel(today);
  document.getElementById('hdr-sub').textContent = formatLabel(today);
  document.getElementById('site-row').innerHTML = SITES.map(s =>
    `<button class="site-btn" onclick="selectSite('${s}',this)">${s}</button>`
  ).join('');
  try {
    [suppliers, products] = await Promise.all([fetchSheet('Suppliers'), fetchSheet('Products')]);
  } catch(e) {
    document.getElementById('body').innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">Failed to load</div></div>`;
  }
}

init();
</script>
</body>
</html>
