<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prep List — Haidilao</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1a1a1a;min-height:100vh}

.site-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:12px}
.site-screen-title{font-size:20px;font-weight:600;margin-bottom:4px}
.site-screen-sub{font-size:13px;color:#888;margin-bottom:12px}
.site-btn{width:100%;max-width:320px;padding:16px 20px;background:#fff;border:1px solid #e5e5e5;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.15s;text-align:left}
.site-btn:hover{border-color:#007aff;background:#f0f5ff}
.site-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.site-dot.tb{background:#5DCAA5}.site-dot.sh{background:#7F77DD}.site-dot.ba{background:#EF9F27}

.main{display:none;padding:12px;max-width:600px;margin:0 auto;padding-bottom:40px}

.top-bar{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;border:1px solid #e5e5e5}
.top-bar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.back-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#007aff;padding:0;display:flex;align-items:center;gap:4px}
.top-actions{display:flex;align-items:center;gap:8px}
.sync{font-size:11px;color:#aaa}
.sync.syncing{color:#f59e0b}.sync.ok{color:#16a34a}.sync.err{color:#ef4444}
.reset-btn{font-size:12px;color:#888;background:none;border:1px solid #e5e5e5;border-radius:8px;padding:4px 10px;cursor:pointer}
.top-bar-row2{display:flex;align-items:center;justify-content:space-between}
.top-title{font-size:15px;font-weight:600}
.top-sub{font-size:11px;color:#aaa;margin-top:1px}
.prog-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-track{width:80px;height:6px;background:#eee;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:#16a34a;border-radius:4px;transition:width 0.3s}
.prog-text{font-size:12px;color:#888;min-width:32px;text-align:right}

.mod-prog{display:flex;align-items:center;gap:6px}
.mod-track{width:52px;height:4px;background:#e5e5e5;border-radius:4px;overflow:hidden}
.mod-fill{height:100%;border-radius:4px;background:#16a34a;transition:width 0.3s}
.mod-text{font-size:11px;color:#aaa;min-width:26px;text-align:right}

.section{background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #e5e5e5;overflow:hidden}
.section-head{display:flex;align-items:center;padding:8px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0;gap:8px}
.section-name{font-size:12px;font-weight:600;color:#555;flex:1}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:11px;font-weight:500;color:#999;text-align:left;padding:5px 14px;border-bottom:1px solid #f0f0f0;background:#fafafa}
th:nth-child(1){width:32px;text-align:center}
th:nth-child(3){width:80px;text-align:right}
td{padding:8px 12px;border-bottom:1px solid #f5f5f5;font-size:13px;vertical-align:middle}
td:nth-child(1){text-align:center;width:32px}
td:nth-child(3){text-align:right}
tr:last-child td{border-bottom:none}
tr.done-row td{opacity:0.38}
tr.done-row .itext{text-decoration:line-through}

.cb{width:20px;height:20px;border-radius:6px;border:1.5px solid #d0d0d0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;background:#fff;flex-shrink:0}
.cb:hover{border-color:#16a34a;background:#f0fdf4}
.cb.checked{background:#16a34a;border-color:#16a34a}
.cb.checked::after{content:'';display:block;width:10px;height:7px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}

.qty{font-size:11px;color:#888;background:#f5f5f5;border:0.5px solid #e5e5e5;border-radius:20px;padding:2px 7px;white-space:nowrap}
.qty.na{opacity:0.3}

.csec{background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #e5e5e5;overflow:hidden}
.csec-head{display:flex;align-items:center;padding:8px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0;gap:8px}
.csec-name{font-size:12px;font-weight:600;color:#555;flex:1}
.grps{padding:8px;display:flex;flex-direction:column;gap:8px}
.grp{border-radius:10px;overflow:hidden;border:1px solid #eee}
.grp-head{padding:7px 12px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px}
.grp-head.pu{background:#EEEDFE;color:#3C3489;border-bottom:1px solid #CECBF6}
.grp-head.gr{background:#E1F5EE;color:#085041;border-bottom:1px solid #9FE1CB}
.grp-head.bl{background:#E6F1FB;color:#0C447C;border-bottom:1px solid #B5D4F4}
.grp-head.am{background:#FAEEDA;color:#633806;border-bottom:1px solid #FAC775}
.grp-label{flex:1}
.mini-prog{display:flex;align-items:center;gap:5px}
.mini-track{width:44px;height:4px;background:rgba(0,0,0,0.1);border-radius:4px;overflow:hidden}
.mini-fill{height:100%;border-radius:4px;transition:width 0.3s}
.mini-fill.pu{background:#7F77DD}.mini-fill.gr{background:#1D9E75}.mini-fill.bl{background:#3B82C4}.mini-fill.am{background:#D97706}
.irow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background 0.1s}
.irow:last-child{border-bottom:none}
.irow:hover{background:#fafafa}
.irow.done-row{opacity:0.38}
.irow.done-row .itext{text-decoration:line-through}
.itext{font-size:13px;flex:1}

.state-msg{text-align:center;padding:60px 20px;color:#aaa;font-size:14px;line-height:1.6}
.state-msg .emoji{font-size:32px;display:block;margin-bottom:10px}
</style>
</head>
<body>

<div class="site-screen" id="site-screen">
  <div class="site-screen-title">Kitchen Prep List</div>
  <div class="site-screen-sub">Select your site to begin</div>
  <button class="site-btn" onclick="selectSite('tb','Tower Bridge')"><div class="site-dot tb"></div>Tower Bridge</button>
  <button class="site-btn" onclick="selectSite('sh','Shoreditch')"><div class="site-dot sh"></div>Shoreditch</button>
  <button class="site-btn" onclick="selectSite('ba','Battersea')"><div class="site-dot ba"></div>Battersea</button>
</div>

<div class="main" id="main">
  <div class="top-bar">
    <div class="top-bar-row1">
      <button class="back-btn" onclick="goBack()">&#8592; Sites</button>
      <div class="top-actions">
        <span class="sync" id="sync"></span>
        <button class="reset-btn" onclick="resetAll()">Reset</button>
      </div>
    </div>
    <div class="top-bar-row2">
      <div>
        <div class="top-title" id="site-title"></div>
        <div class="top-sub" id="today-label"></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-text" id="prog-text">0%</div>
      </div>
    </div>
  </div>
  <div id="content">
    <div class="state-msg"><span class="emoji">&#9203;</span>Loading prep list&#8230;</div>
  </div>
</div>

<script>
const SHEET_ID   = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'Prep';

// Column indices (0-based after header strip):
// 0=Section,1=Module,2=Group,3=Item,4=Qty_TB,5=Qty_SH,6=Qty_BA,7=TB,8=SH,9=BA
const QTY_COL  = { tb: 4, sh: 5, ba: 6 };
const SHOW_COL = { tb: 7, sh: 8, ba: 9 };

const GROUP_CLASS = {
  'Food Items':           'gr',
  'Packaging & Supplies': 'bl',
  'Defrost':              'am',
};

let site = '', siteLabel = '';
let allRows = [];

document.getElementById('today-label').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

function selectSite(code, label) {
  site = code; siteLabel = label;
  document.getElementById('site-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('site-title').textContent = label + ' — Prep List';
  allRows.length ? renderForSite() : loadSheet();
}

function goBack() {
  document.getElementById('site-screen').style.display = 'flex';
  document.getElementById('main').style.display = 'none';
}

async function loadSheet() {
  setSync('syncing', 'Loading…');
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    allRows = json.table.rows.map(r => ({
      section: (r.c[0]?.v || '').trim(),
      module:  (r.c[1]?.v || '').trim(),
      group:   (r.c[2]?.v || '').trim(),
      item:    (r.c[3]?.v || '').trim(),
      qty_tb:  (r.c[4]?.v || '').toString().trim(),
      qty_sh:  (r.c[5]?.v || '').toString().trim(),
      qty_ba:  (r.c[6]?.v || '').toString().trim(),
      tb:      r.c[7]?.v === true,
      sh:      r.c[8]?.v === true,
      ba:      r.c[9]?.v === true,
    })).filter(r => r.item);
    setSync('ok', 'Loaded ✓');
    renderForSite();
  } catch(e) {
    setSync('err', 'Failed');
    document.getElementById('content').innerHTML =
      '<div class="state-msg"><span class="emoji">&#9888;&#65039;</span>Failed to load.<br>Check your connection and try again.</div>';
  }
}

function renderForSite() {
  const qtyKey  = 'qty_' + site;   // e.g. qty_sh
  const showKey = site;             // e.g. sh

  const rows = allRows.filter(r => r[showKey] === true);

  // Build structure: module → groups → items
  const modules = [];
  const modIdx  = {};

  rows.forEach(r => {
    if (!modIdx[r.module]) {
      modIdx[r.module] = { module: r.module, section: r.section, groups: [], grpIdx: {} };
      modules.push(modIdx[r.module]);
    }
    const mod    = modIdx[r.module];
    const grpKey = r.group || '__';
    if (!mod.grpIdx[grpKey]) {
      mod.grpIdx[grpKey] = { group: r.group, items: [] };
      mod.groups.push(mod.grpIdx[grpKey]);
    }
    mod.grpIdx[grpKey].items.push({ item: r.item, qty: r[qtyKey] });
  });

  let html = '';
  let mNum = 0;

  modules.forEach(mod => {
    const mId      = 'm' + mNum++;
    const hasGroups = mod.groups.some(g => g.group);

    if (!hasGroups) {
      // Table layout (Rice & Soup, Other Tasks, Processing Needed flat)
      const items = mod.groups.flatMap(g => g.items);
      html += `<div class="section" id="${mId}">
        <div class="section-head">
          <span class="section-name">${mod.module}</span>
          <div class="mod-prog"><div class="mod-track"><div class="mod-fill" id="${mId}f" style="width:0%"></div></div><div class="mod-text" id="${mId}t">0%</div></div>
        </div>
        <table><thead><tr><th></th><th>Item</th><th>Min. Stock</th></tr></thead><tbody>`;
      items.forEach((r, i) => {
        const k  = mId + '_' + i;
        const na = r.qty === 'N/A';
        const qtyHtml = r.qty ? `<span class="qty${na?' na':''}">${r.qty}</span>` : '';
        html += `<tr id="tr${k}"><td><div class="cb" id="cb${k}" onclick="toggleCb('${k}','${mId}')"></div></td><td class="itext">${r.item}</td><td>${qtyHtml}</td></tr>`;
      });
      html += `</tbody></table></div>`;

    } else {
      // Grouped irow layout (Direct Refill)
      html += `<div class="csec" id="${mId}">
        <div class="csec-head">
          <span class="csec-name">${mod.module}</span>
          <div class="mod-prog"><div class="mod-track"><div class="mod-fill" id="${mId}f" style="width:0%"></div></div><div class="mod-text" id="${mId}t">0%</div></div>
        </div><div class="grps">`;

      mod.groups.forEach((grp, gi) => {
        const gId  = mId + 'g' + gi;
        const cls  = GROUP_CLASS[grp.group] || 'pu';
        html += `<div class="grp">`;
        if (grp.group) {
          html += `<div class="grp-head ${cls}"><span class="grp-label">${grp.group}</span>
            <div class="mini-prog"><div class="mini-track"><div class="mini-fill ${cls}" id="${gId}f" style="width:0%"></div></div><div class="mini-text" id="${gId}t">0%</div></div></div>`;
        }
        grp.items.forEach((r, i) => {
          const k  = gId + '_' + i;
          const na = r.qty === 'N/A';
          const qtyHtml = r.qty ? `<span class="qty${na?' na':''}">${r.qty}</span>` : '';
          html += `<div class="irow" id="ir${k}" onclick="toggleIrow('${k}','${mId}','${gId}')">
            <div class="cb" id="cb${k}"></div><span class="itext">${r.item}</span>${qtyHtml}</div>`;
        });
        html += `</div>`;
      });
      html += `</div></div>`;
    }
  });

  document.getElementById('content').innerHTML = html ||
    '<div class="state-msg"><span class="emoji">&#128203;</span>No items found for this site.</div>';
  updateAll();
}

// ── Toggle ────────────────────────────────────────────────────────────────────
function toggleCb(k, mId) {
  const cb = document.getElementById('cb' + k);
  const tr = document.getElementById('tr' + k);
  cb.classList.toggle('checked');
  tr.classList.toggle('done-row', cb.classList.contains('checked'));
  updateMod(mId); updateOverall();
}

function toggleIrow(k, mId, gId) {
  const ir   = document.getElementById('ir' + k);
  const cb   = document.getElementById('cb' + k);
  const done = !ir.classList.contains('done-row');
  ir.classList.toggle('done-row', done);
  cb.classList.toggle('checked', done);
  updateGrp(gId); updateMod(mId); updateOverall();
}

// ── Progress ──────────────────────────────────────────────────────────────────
function pct(done, total) { return total ? Math.round(done / total * 100) : 0; }

function setBar(fillId, textId, p) {
  const f = document.getElementById(fillId);
  const t = document.getElementById(textId);
  if (f) f.style.width = p + '%';
  if (t) t.textContent = p + '%';
}

function updateGrp(gId) {
  const all  = document.querySelectorAll(`[id^="ir${gId}_"]`).length;
  const done = document.querySelectorAll(`[id^="ir${gId}_"].done-row`).length;
  setBar(gId + 'f', gId + 't', pct(done, all));
}

function updateMod(mId) {
  const all  = document.querySelectorAll(`#${mId} .cb`).length;
  const done = document.querySelectorAll(`#${mId} .cb.checked`).length;
  setBar(mId + 'f', mId + 't', pct(done, all));
}

function updateOverall() {
  const all  = document.querySelectorAll('#content .cb').length;
  const done = document.querySelectorAll('#content .cb.checked').length;
  const p    = pct(done, all);
  document.getElementById('prog-fill').style.width = p + '%';
  document.getElementById('prog-text').textContent = p + '%';
}

function updateAll() {
  document.querySelectorAll('#content [id^="m"]').forEach(el => {
    if (!el.id.includes('f') && !el.id.includes('t')) {
      const mId = el.id;
      el.querySelectorAll('[id*="g"][id$="f"]').forEach(gf => {
        const gId = gf.id.replace('f', '');
        updateGrp(gId);
      });
      updateMod(mId);
    }
  });
  updateOverall();
}

function resetAll() {
  if (!confirm('Reset all items for ' + siteLabel + '?')) return;
  document.querySelectorAll('#content .cb').forEach(c => c.classList.remove('checked'));
  document.querySelectorAll('#content .done-row').forEach(r => r.classList.remove('done-row'));
  updateAll();
}

function setSync(cls, txt) {
  const el = document.getElementById('sync');
  el.className = 'sync ' + cls; el.textContent = txt;
  if (cls === 'ok') setTimeout(() => { el.textContent = ''; el.className = 'sync'; }, 2000);
}
</script>
</body>
</html>
