<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label Guide</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f3f0; color: #1a1917; padding: 16px; padding-bottom: 40px;
  max-width: 560px; margin: 0 auto;
}
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.back-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #e0ddd8; background: #fff;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #555; flex-shrink: 0; text-decoration: none;
}
.header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-text p { font-size: 12px; color: #888; margin-top: 1px; }

.highlight-box {
  background: #FAEEDA; border: 1.5px solid #BA7517; border-radius: 12px;
  padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
}
.highlight-box .en { font-size: 15px; font-weight: 700; color: #633806; }
.highlight-box .zh { font-size: 12.5px; color: #7A5E00; margin-top: 2px; }

.rules-card { background: #fff; border: 1.5px solid #e8e6e1; border-radius: 14px; padding: 4px 16px; margin-bottom: 18px; }
.rule-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f0ece6; }
.rule-row:last-child { border-bottom: none; }
.rule-num { flex-shrink: 0; font-size: 12px; font-weight: 700; color: #aaa; width: 16px; }
.rule-en { font-size: 13.5px; color: #1a1917; line-height: 1.45; }
.rule-zh { font-size: 12px; color: #999; margin-top: 2px; }

.section-title { font-size: 13px; font-weight: 700; color: #888; margin: 4px 0 10px; }

.form-card { background: #fff; border-radius: 12px; border: 1px solid #e8e6e1; border-left-width: 4px; padding: 14px 16px; margin-bottom: 10px; }
.form-en { font-size: 15px; font-weight: 700; }
.form-zh { font-size: 12px; color: #999; margin-top: 1px; margin-bottom: 8px; }
.form-subtext { font-size: 12px; color: #666; margin-bottom: 6px; }
.form-usecase { font-size: 12px; color: #888; margin-bottom: 10px; }
.form-example {
  background: #f8f6f2; border: 1px dashed #d3d1c7; border-radius: 8px;
  padding: 10px 12px; font-family: ui-monospace, monospace; font-size: 13px; color: #333; line-height: 1.7;
}

.state-msg { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; line-height: 1.6; }
.state-msg .emoji { font-size: 32px; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" id="back-btn" href="/sop">&#8592;</a>
  <div class="header-text">
    <h1 id="page-title">Loading…</h1>
    <p id="page-sub"></p>
  </div>
</div>

<div id="content"><div class="state-msg"><span class="emoji">⏳</span>Loading…</div></div>

<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'LabelGuide';
const META_SHEET_NAME = 'GuideMeta';
const GUIDE_NAME = 'LabelGuide';

async function fetchGviz(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
}

async function fetchMeta() {
  const json = await fetchGviz(META_SHEET_NAME);
  const row = json.table.rows.find(r => (r.c[0]?.v || '').trim() === GUIDE_NAME);
  if (!row) return { titleEn: 'Guide', titleZh: '', backUrl: '/sop' };
  return {
    titleEn: (row.c[1]?.v || 'Guide').trim(),
    titleZh: (row.c[2]?.v || '').trim(),
    backUrl: (row.c[4]?.v || '/sop').trim(),
  };
}

async function fetchRows() {
  const json = await fetchGviz(SHEET_NAME);
  return json.table.rows.map(r => ({
    type: (r.c[0]?.v || '').trim(),
    order: parseInt(r.c[1]?.v) || 0,
    en: (r.c[2]?.v || '').trim(),
    zh: (r.c[3]?.v || '').trim(),
    subtext: (r.c[4]?.v || '').trim(),
    usecase: (r.c[5]?.v || '').trim(),
    example: (r.c[6]?.v || '').trim(),
    color: (r.c[7]?.v || '').trim(),
  }));
}

async function init() {
  try {
    const [meta, rows] = await Promise.all([fetchMeta(), fetchRows()]);
    document.getElementById('page-title').textContent = meta.titleEn;
    document.title = meta.titleEn;
    document.getElementById('page-sub').textContent = meta.titleZh;
    document.getElementById('back-btn').setAttribute('href', meta.backUrl);
    render(rows);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="state-msg"><span class="emoji">⚠️</span>Failed to load guide.<br>Check your connection and try again.</div>';
  }
}

function render(rows) {
  const rules = rows.filter(r => r.type === 'Rule').sort((a, b) => a.order - b.order);
  const forms = rows.filter(r => r.type === 'Form').sort((a, b) => a.order - b.order);
  const topRule = rules.find(r => r.order === 1);
  const restRules = rules.filter(r => r.order !== 1);

  let html = '';

  if (topRule) {
    html += `<div class="highlight-box">
      <div>
        <div class="en">${topRule.en}</div>
        <div class="zh">${topRule.zh}</div>
      </div>
    </div>`;
  }

  if (restRules.length) {
    html += `<div class="rules-card">
      ${restRules.map(r => `
        <div class="rule-row">
          <div class="rule-num">${r.order}</div>
          <div>
            <div class="rule-en">${r.en}</div>
            <div class="rule-zh">${r.zh}</div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  if (forms.length) {
    html += `<div class="section-title">3 Label Forms · 3种标签形式</div>`;
    forms.forEach(f => {
      html += `<div class="form-card" style="border-left-color:${f.color}">
        <div class="form-en">Form ${f.order}: ${f.en}</div>
        <div class="form-zh">${f.zh}</div>
        ${f.subtext ? `<div class="form-subtext">${f.subtext}</div>` : ''}
        ${f.usecase ? `<div class="form-usecase">${f.usecase}</div>` : ''}
        ${f.example ? `<div class="form-example">${f.example.split('\n').map(l => `<div>${l}</div>`).join('')}</div>` : ''}
      </div>`;
    });
  }

  document.getElementById('content').innerHTML = html;
}

init();
</script>
</body>
</html>
