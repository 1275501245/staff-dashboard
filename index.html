<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .nav { display: flex; gap: 6px; padding: 14px 16px 0; max-width: 480px; margin: 0 auto; }
  .nav a { flex: 1; text-align: center; padding: 8px; border-radius: 10px; font-size: 13px; font-weight: 500; text-decoration: none; border: 1px solid #e0e0e0; background: white; color: #888; }
  .nav a.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px 16px 40px; }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }
  .staff-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .staff-tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; background: white; }
  .staff-tab.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .week-nav button { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 6px 14px; font-size: 16px; cursor: pointer; }
  .week-nav span { flex: 1; text-align: center; font-size: 13px; font-weight: 500; }
  .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #efefef; }
  .card-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .today-status { display: flex; align-items: center; gap: 12px; }
  .status-icon { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .status-ok { background: #e8f5e9; }
  .status-bad { background: #ffebee; }
  .status-text h2 { font-size: 17px; font-weight: 600; }
  .status-text p { font-size: 12px; color: #888; margin-top: 3px; }
  .penalty-note { margin-top: 10px; padding: 8px 12px; background: #fff3f3; border-radius: 8px; font-size: 12px; color: #c62828; }
  .adjusted-note { margin-top: 6px; padding: 6px 12px; background: #fff8e1; border-radius: 8px; font-size: 11px; color: #856404; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat { background: #f9f9f9; border-radius: 12px; padding: 12px 14px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 3px; }
  .green { color: #2e7d32; }
  .red { color: #c62828; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 14px; }
  .day-item { text-align: center; }
  .day-name { font-size: 10px; color: #aaa; margin-bottom: 5px; }
  .day-dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 15px; }
  .day-ok { background: #e8f5e9; color: #2e7d32; }
  .day-bad { background: #ffebee; color: #c62828; }
  .day-empty { background: #f5f5f5; color: #ccc; }
  .day-off { background: #f5f5f5; color: #bbb; font-size: 10px; }
  .day-today { box-shadow: 0 0 0 2px #1a1a1a; }
  .day-penalty { font-size: 9px; color: #c62828; margin-top: 3px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 6px; }
  .progress-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #2e7d32; border-radius: 3px; }
  .net-banner { border-radius: 12px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
  .net-pos { background: #e8f5e9; }
  .net-neg { background: #ffebee; }
  .net-label { font-size: 13px; font-weight: 500; }
  .net-val { font-size: 22px; font-weight: 700; }
  .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; }
  .error { text-align: center; padding: 40px 20px; color: #c62828; font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/index" class="active">Progress</a>
  <a href="/details" >Refunds</a>
  <a href="/policy" >Policy</a>
</nav>
<div class="container">
  <div class="header">
    <h1>Staff Dashboard</h1>
    <p>Refund & Reward Tracker</p>
  </div>
  <div class="staff-tabs" id="staff-tabs"></div>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8249;</button>
    <span id="week-label"></span>
    <button onclick="changeWeek(1)">&#8250;</button>
  </div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>

<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const STAFF = ['Prabin','Harshitha','Kin','Ashh','Surbhi'];
const SITE = { Prabin:'Shoreditch', Harshitha:'Shoreditch', Kin:'Battersea', Ashh:'Tower Bridge', Surbhi:'Shoreditch' };
const SPLIT = { Prabin: 2/3, Harshitha: 1/3, Surbhi: 0 };
const HOURLY = 13.75;
const FLOWER_TARGET = 7;
const REWARD_HOURS = 2;
const THRESHOLD = 0.02;
const DAY_NAMES = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];

let currentOffset = 0;
let selectedStaff = 'Prabin';
let sheetData = [];

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const daysFromSat = day === 6 ? 0 : day + 1;
  const sat = new Date(now);
  sat.setDate(now.getDate() - daysFromSat + offset * 7);
  sat.setHours(0, 0, 0, 0);
  return sat;
}

function weekDates(weekStart) {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
}

function normalizeDate(raw) {
  if (!raw) return null;
  if (typeof raw === 'string' && raw.startsWith('Date(')) {
    const p = raw.replace('Date(','').replace(')','').split(',');
    return `${p[0]}-${String(parseInt(p[1])+1).padStart(2,'0')}-${String(parseInt(p[2])).padStart(2,'0')}`;
  }
  if (typeof raw === 'string') return raw.slice(0, 10);
  return null;
}

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Data`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => {
    const rawRefund = parseFloat(r.c[4]?.v || 0);
    const adjustedRefund = r.c[5]?.v != null ? parseFloat(r.c[5].v) : null;
    return {
      date: normalizeDate(r.c[0]?.v),
      staff: r.c[1]?.v || '',
      site: r.c[2]?.v || '',
      revenue: parseFloat(r.c[3]?.v || 0),
      refund: rawRefund,
      adjustedRefund,
      effectiveRefund: adjustedRefund !== null ? adjustedRefund : rawRefund,
      isAdjusted: adjustedRefund !== null,
    };
  });
}

function getStaffDay(name, dateStr) {
  return sheetData.find(r => r.date === dateStr && r.staff === name) || null;
}

function calcDay(data) {
  if (!data || data.revenue === 0) return null;
  const rate = data.effectiveRefund / data.revenue;
  const ok = rate < THRESHOLD;
  const excess = ok ? 0 : Math.max(0, data.effectiveRefund - data.revenue * THRESHOLD);
  const penaltyAmt = excess * 0.5;
  const penaltyHrs = penaltyAmt / HOURLY;
  return { ok, rate, refund: data.refund, effectiveRefund: data.effectiveRefund, revenue: data.revenue, site: data.site, penaltyAmt, penaltyHrs, isAdjusted: data.isAdjusted };
}

function calcWeek(name, dates) {
  let flowers = 0, penaltyAmt = 0, penaltyHrs = 0;
  const days = dates.map(d => {
    const data = getStaffDay(name, dateKey(d));
    if (!data) return { status: 'empty' };
    if (data.revenue === 0) return { status: 'off' };
    const calc = calcDay(data);
    if (calc.ok) flowers++;
    else { penaltyAmt += calc.penaltyAmt; penaltyHrs += calc.penaltyHrs; }
    return { status: calc.ok ? 'ok' : 'bad', ...calc };
  });
  const rewardHrs = Math.floor(flowers / FLOWER_TARGET) * REWARD_HOURS;
  return { days, flowers, penaltyAmt, penaltyHrs, rewardHrs, net: rewardHrs - penaltyHrs };
}

function renderTabs() {
  document.getElementById('staff-tabs').innerHTML = STAFF.map(n =>
    `<div class="staff-tab ${n === selectedStaff ? 'active' : ''}" onclick="selectStaff('${n}')">${n}</div>`
  ).join('');
}

function renderContent() {
  const weekStart = getWeekStart(currentOffset);
  const dates = weekDates(weekStart);
  document.getElementById('week-label').textContent = `${fmtDate(dates[0])} – ${fmtDate(dates[6])}`;

  const todayStr = dateKey(new Date());
  const name = selectedStaff;
  const c = calcWeek(name, dates);
  const todayIdx = dates.findIndex(d => dateKey(d) === todayStr);
  const todayDay = todayIdx >= 0 ? c.days[todayIdx] : null;

  let todayHTML = '';
  if (todayDay && todayDay.status !== 'empty' && todayDay.status !== 'off') {
    const ok = todayDay.ok;
    const rateStr = (todayDay.rate * 100).toFixed(1) + '%';
    todayHTML = `
      <div class="card">
        <div class="card-title">Today · ${todayDay.site || ''}</div>
        <div class="today-status">
          <div class="status-icon ${ok ? 'status-ok' : 'status-bad'}">${ok ? '✓' : '✕'}</div>
          <div class="status-text">
            <h2 style="color:${ok ? '#2e7d32' : '#c62828'}">${ok ? 'On target' : 'Above threshold'}</h2>
            <p>Refund rate ${rateStr} · Refund £${todayDay.effectiveRefund.toFixed(2)}</p>
          </div>
        </div>
        ${!ok ? `<div class="penalty-note">Penalty: £${todayDay.penaltyAmt.toFixed(2)} · ${todayDay.penaltyHrs.toFixed(2)}h deducted</div>` : ''}
        ${todayDay.isAdjusted ? `<div class="adjusted-note">Adjusted: original £${todayDay.refund.toFixed(2)} → £${todayDay.effectiveRefund.toFixed(2)} (non-staff refund removed)</div>` : ''}
      </div>`;
  } else if (todayDay && todayDay.status === 'off') {
    todayHTML = `<div class="card"><div class="card-title">Today</div><p style="color:#aaa;font-size:14px;">Day off</p></div>`;
  } else {
    todayHTML = `<div class="card"><div class="card-title">Today</div><p style="color:#aaa;font-size:14px;">No data yet</p></div>`;
  }

  const progressPct = Math.round((c.flowers % FLOWER_TARGET) / FLOWER_TARGET * 100);
  const netColor = c.net >= 0 ? '#2e7d32' : '#c62828';
  const netClass = c.net >= 0 ? 'net-pos' : 'net-neg';

  const daysHTML = dates.map((d, i) => {
    const s = c.days[i];
    const isToday = dateKey(d) === todayStr;
    let cls = 'day-empty', icon = '·';
    if (s.status === 'ok') { cls = 'day-ok'; icon = '✓'; }
    if (s.status === 'bad') { cls = 'day-bad'; icon = '✕'; }
    if (s.status === 'off') { cls = 'day-off'; icon = 'OFF'; }
    if (isToday) cls += ' day-today';
    const penaltyLine = s.status === 'bad' ? `<div class="day-penalty">-£${s.penaltyAmt.toFixed(2)}</div>` : '';
    return `<div class="day-item"><div class="day-name">${DAY_NAMES[i]}</div><div class="day-dot ${cls}">${icon}</div>${penaltyLine}</div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    ${todayHTML}
    <div class="card">
      <div class="card-title">This week</div>
      <div class="days-grid">${daysHTML}</div>
      <div class="progress-label">
        <span>Flower progress: ${c.flowers % FLOWER_TARGET} / ${FLOWER_TARGET}</span>
        <span>${c.flowers} total · +${c.rewardHrs.toFixed(1)}h earned</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-val green">+${c.rewardHrs.toFixed(1)}h</div><div class="stat-lbl">Reward hours</div></div>
      <div class="stat"><div class="stat-val red">-£${c.penaltyAmt.toFixed(2)}<br><span style="font-size:13px;">${c.penaltyHrs.toFixed(2)}h</span></div><div class="stat-lbl">Penalty this week</div></div>
    </div>
    <div class="net-banner ${netClass}">
      <div class="net-label">Net this week</div>
      <div class="net-val" style="color:${netColor}">${c.net >= 0 ? '+' : ''}${c.net.toFixed(2)}h</div>
    </div>
  `;
}

function selectStaff(name) { selectedStaff = name; renderTabs(); renderContent(); }
function changeWeek(dir) { currentOffset += dir; renderContent(); }

async function init() {
  try {
    sheetData = await fetchData();
    renderTabs();
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">Failed to load data.<br><small>${e.message}</small></div>`;
  }
}
init();
</script>
</body>
</html>
