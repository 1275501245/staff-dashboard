<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP · Mini Hot Pot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:1.25rem 1rem 5rem}
.topbar{display:flex;align-items:center;margin-bottom:1.5rem}
.back{display:flex;align-items:center;gap:4px;font-size:13px;color:#666;text-decoration:none}
.back svg{width:16px;height:16px}
.page-title{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.page-sub{font-size:13px;color:#888;margin-bottom:1.5rem}
.section-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;padding-left:2px}
.list{background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden;margin-bottom:1.5rem}
.list-item{display:flex;align-items:center;padding:14px 16px;text-decoration:none;color:#1a1a1a;border-bottom:0.5px solid #f0f0f0;transition:background 0.12s}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:#f9f9f9}
.item-icon{width:36px;height:36px;border-radius:9px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-right:12px}
.item-text{flex:1}
.item-name{font-size:15px;font-weight:500;color:#1a1a1a}
.item-desc{font-size:12px;color:#888;margin-top:2px}
.item-arrow svg{width:16px;height:16px;color:#ccc}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="/home" class="back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
      Back
    </a>
  </div>

  <div class="page-title">SOP</div>
  <div class="page-sub">Standards & procedures</div>

  <div class="section-label">Guides</div>
  <div class="list" id="guides-list">
    <div class="list-item"><div class="item-text"><div class="item-desc">Loading…</div></div></div>
  </div>
</div>

<script>
const SHEET_ID   = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const SHEET_NAME = 'SOP';

async function load() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    const rows = json.table.rows
      .map(r => ({
        icon: (r.c[0]?.v || '').trim(),
        name: (r.c[1]?.v || '').trim(),
        desc: (r.c[2]?.v || '').trim(),
        url:  (r.c[3]?.v || '').trim(),
      }))
      .filter(r => r.name && r.url);
    render(rows);
  } catch (e) {
    document.getElementById('guides-list').innerHTML =
      '<div class="list-item"><div class="item-text"><div class="item-desc">Failed to load guides.</div></div></div>';
  }
}

function render(rows) {
  document.getElementById('guides-list').innerHTML = rows.map(r => `
    <a href="${r.url}" class="list-item">
      <div class="item-icon">${r.icon}</div>
      <div class="item-text">
        <div class="item-name">${r.name}</div>
        <div class="item-desc">${r.desc}</div>
      </div>
      <div class="item-arrow">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
      </div>
    </a>`).join('');
}

load();
</script>
</body>
</html>
