<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP · 菜品手册</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:1.25rem 1rem 5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.back{display:flex;align-items:center;gap:4px;font-size:13px;color:#666;text-decoration:none}
.back svg{width:16px;height:16px}
.lang-toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.lang-btn{padding:4px 12px;font-size:12px;font-weight:500;background:transparent;color:#888;border:none;cursor:pointer}
.lang-btn.active{background:#1a1a1a;color:#fff}
.cats{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-bottom:1.25rem;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{padding:5px 14px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#666;white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.cat.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.sub-label{font-size:12px;color:#888;margin-bottom:8px;padding-left:2px}
.section-group{margin-bottom:1.25rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.item-card{border:1px solid #e5e5e5;border-radius:12px;background:#fff;padding:12px;cursor:pointer;transition:all 0.15s;text-align:left;width:100%}
.item-card:hover{background:#f9f9f9}
.item-card.active{border-color:#1a1a1a}
.ic-icon{width:32px;height:32px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:18px}
.ic-name{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.3}
.detail-wrap{margin-top:1rem}
.detail-card{border:1px solid #e5e5e5;border-radius:12px;background:#fff;overflow:hidden}
.dc-head{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:12px}
.dc-icon{width:40px;height:40px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dc-name{font-size:16px;font-weight:500;color:#1a1a1a}
.dc-cat{font-size:12px;color:#888;margin-top:2px}
.dc-section{padding:14px 16px;border-top:1px solid #f0f0f0}
.sec-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.sec-text{font-size:13px;color:#1a1a1a;line-height:1.75}
.loading{text-align:center;padding:3rem;color:#888;font-size:13px}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="/index.html" class="back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
      <span id="back-label">返回</span>
    </a>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('zh')" id="btn-zh">中文</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">English</button>
    </div>
  </div>
  <div class="cats" id="cat-bar"><div style="color:#aaa;font-size:13px;padding:4px 0">Loading...</div></div>
  <div id="content"><div class="loading">Loading...</div></div>
  <div class="detail-wrap" id="detail-wrap" style="display:none">
    <div class="detail-card" id="detail-card"></div>
  </div>
</div>
<script>
const SHEET_ID='1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const SHEET_NAME='MenuSOP';
const LABELS={
  zh:{back:'返回',std:'出品标准',method:'操作方法',storage:'储存方法'},
  en:{back:'Back',std:'Standards',method:'Method',storage:'Storage'}
};
let lang='zh',allItems=[],currentCat='',selectedItem=null;

async function fetchData(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substring(47,text.length-2));
  return json.table.rows.map(r=>({
    cat:r.c[0]?.v||'',sub:r.c[1]?.v||'',name:r.c[2]?.v||'',
    std:r.c[3]?.v||'',method:r.c[4]?.v||'',storage:r.c[5]?.v||''
  })).filter(r=>r.name&&r.name!=='Name'&&r.cat!=='Category');
}

function catIcon(cat){
  const map={'自选菜品':'🥩','汤底':'🍲','拌饭':'🍚','小料':'🥄','饮品':'🧋'};
  return map[cat]||'📋';
}

function buildCats(){
  const cats=[...new Set(allItems.map(i=>i.cat))];
  if(!currentCat)currentCat=cats[0];
  document.getElementById('cat-bar').innerHTML=cats.map(c=>
    `<div class="cat${c===currentCat?' active':''}" onclick="setCat('${c}')">${catIcon(c)} ${c}</div>`
  ).join('');
}

function renderContent(){
  const items=allItems.filter(i=>i.cat===currentCat);
  const bySub={};
  items.forEach(i=>{const k=i.sub||'';if(!bySub[k])bySub[k]=[];bySub[k].push(i);});
  const hasSubs=Object.keys(bySub).some(k=>k!=='');
  let html='';
  Object.entries(bySub).forEach(([sub,its])=>{
    if(hasSubs&&sub)html+=`<div class="sub-label">${sub}</div>`;
    html+=`<div class="section-group"><div class="grid">`;
    its.forEach(item=>{
      const a=selectedItem&&selectedItem.name===item.name?' active':'';
      html+=`<button class="item-card${a}" onclick='selectItem(${JSON.stringify(JSON.stringify(item))})'>
        <div class="ic-icon">${catIcon(item.cat)}</div>
        <div class="ic-name">${item.name}</div>
      </button>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('content').innerHTML=html||'<div class="empty">暂无内容</div>';
}

function selectItem(jsonStr){
  selectedItem=JSON.parse(jsonStr);
  renderContent();
  renderDetail();
  document.getElementById('detail-wrap').style.display='block';
  setTimeout(()=>document.getElementById('detail-wrap').scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function renderDetail(){
  if(!selectedItem)return;
  const L=LABELS[lang];
  const catDisplay=selectedItem.sub?`${selectedItem.cat} · ${selectedItem.sub}`:selectedItem.cat;
  document.getElementById('detail-card').innerHTML=`
    <div class="dc-head">
      <div class="dc-icon">${catIcon(selectedItem.cat)}</div>
      <div><div class="dc-name">${selectedItem.name}</div><div class="dc-cat">${catDisplay}</div></div>
    </div>
    <div class="dc-section"><div class="sec-label">${L.std}</div><div class="sec-text">${selectedItem.std||'—'}</div></div>
    <div class="dc-section"><div class="sec-label">${L.method}</div><div class="sec-text">${selectedItem.method||'—'}</div></div>
    <div class="dc-section"><div class="sec-label">${L.storage}</div><div class="sec-text">${selectedItem.storage||'—'}</div></div>
  `;
}

function setCat(cat){
  currentCat=cat;selectedItem=null;
  document.getElementById('detail-wrap').style.display='none';
  buildCats();renderContent();
}

function setLang(l){
  lang=l;
  document.getElementById('btn-zh').classList.toggle('active',l==='zh');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('back-label').textContent=LABELS[l].back;
  if(selectedItem)renderDetail();
}

async function init(){
  try{allItems=await fetchData();buildCats();renderContent();}
  catch(e){document.getElementById('content').innerHTML=`<div class="empty">加载失败: ${e.message}</div>`;}
}
init();
</script>
</body>
</html>
