<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP · Standards & Procedures</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.back-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #e0e0e0; background: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; flex-shrink: 0; text-decoration: none; }
.header-text h1 { font-size: 18px; font-weight: 600; }
.header-text p { font-size: 12px; color: #aaa; margin-top: 2px; }
.filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid #e0e0e0; background: white; color: #555; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.filter-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.tag-section { margin-bottom: 16px; }
.tag-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding: 0 2px; }
.sop-list { background: white; border-radius: 16px; border: 1px solid #efefef; overflow: hidden; }
.sop-item { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 13px; color: #1a1a1a; line-height: 1.6; display: flex; align-items: flex-start; gap: 10px; }
.sop-item:last-child { border-bottom: none; }
.sop-dot { width: 6px; height: 6px; border-radius: 50%; background: #1a1a1a; flex-shrink: 0; margin-top: 7px; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
.empty { text-align: center; padding: 40px; color: #ccc; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="/home" class="back-btn">‹</a>
    <div class="header-text">
      <h1>SOP</h1>
      <p>Standards & Procedures</p>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterTag('all', this)">All</button>
  </div>
  <div id="sop-content"><div class="loading">Loading...</div></div>
</div>
<script>
const SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
let allItems = [];
let currentTag = 'all';

async function fetchSOP() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=SOP&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => ({
    tag: r.c[0]?.v || '',
    item: r.c[1]?.v || '',
  })).filter(r => r.tag && r.item);
}

function filterTag(tag, btn) {
  currentTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const items = currentTag === 'all' ? allItems : allItems.filter(i => i.tag === currentTag);
  if (!items.length) {
    document.getElementById('sop-content').innerHTML = '<div class="empty">No items found</div>';
    return;
  }
  const byTag = {};
  items.forEach(i => {
    if (!byTag[i.tag]) byTag[i.tag] = [];
    byTag[i.tag].push(i);
  });
  document.getElementById('sop-content').innerHTML = Object.entries(byTag).map(([tag, items]) => `
    <div class="tag-section">
      <div class="tag-label">${tag}</div>
      <div class="sop-list">
        ${items.map(i => `
          <div class="sop-item">
            <div class="sop-dot"></div>
            <div>${i.item}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function init() {
  try {
    allItems = await fetchSOP();
    const tags = [...new Set(allItems.map(i => i.tag))];
    const bar = document.getElementById('filter-bar');
    tags.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = tag;
      btn.onclick = () => filterTag(tag, btn);
      bar.appendChild(btn);
    });
    render();
  } catch(e) {
    document.getElementById('sop-content').innerHTML = `<div class="loading">Failed: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
