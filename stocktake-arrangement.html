<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stocktake Arrangement</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding-bottom: 40px; }

.header { background: #fff; border-bottom: 1px solid #efefef; padding: 16px; }
.header-top { display: flex; align-items: center; gap: 12px; }
.back { width: 30px; height: 30px; border-radius: 50%; background: #f5f5f5; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #999; text-decoration: none; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

.site-bar { background: #fff; border-bottom: 1px solid #efefef; padding: 10px 16px; }
.bar-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.site-row { display: flex; gap: 6px; flex-wrap: wrap; }
.site-btn { padding: 6px 14px; border: 1px solid #efefef; border-radius: 20px; background: #f5f5f5; font-size: 13px; color: #666; cursor: pointer; font-family: inherit; }
.site-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.state-box { text-align: center; padding: 50px 20px; color: #aaa; font-size: 13px; }

.day-block {}
.day-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 0 2px; }
.day-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.day-dot.today { background: #1a8f5f; }
.day-name { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
.day-name.today { color: #1a8f5f; }

.card { background: #fff; border: 1px solid #efefef; border-radius: 14px; overflow: hidden; }
.card.today { border: 1.5px solid #1a8f5f; }

.supp-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid #f5f5f5; }
.supp-row:last-child { border-bottom: none; }
.supp-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.supp-main { flex: 1; min-width: 0; }
.supp-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.supp-meta { font-size: 11px; color: #bbb; margin-top: 2px; }
.supp-meta .order { color: #d97706; }
.supp-count { font-size: 11px; color: #aaa; white-space: nowrap; }

.empty-row { padding: 13px 14px; font-size: 12px; color: #bbb; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a class="back" href="/admin">←</a>
    <div>
      <div class="header-title">Stocktake Arrangement</div>
      <div class="header-sub" id="hdr-sub">Weekly stocktake schedule</div>
    </div>
  </div>
</div>

<div class="site-bar">
  <div class="bar-label">Site</div>
  <div class="site-row" id="site-row"></div>
</div>

<div class="body" id="body">
  <div class="state-box">Loading…</div>
</div>

<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const DAY_ORDER = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DOT_COLORS = ['#3a5fc8','#c8303a','#2a7a52','#9333ea','#d97706','#0891b2','#e05c2a','#0f9d6e','#4a6cf7','#d4537e'];

let schedule = [];
let countMap = {};
let selectedSite = '';

function todayDayShort() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[new Date().getDay()];
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (!json.table?.rows?.length) return [];
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((col, i) => { obj[col] = r.c[i]?.v ?? r.c[i]?.f ?? ''; });
    return obj;
  });
}

function selectSite(site, btn) {
  selectedSite = site;
  document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const today = todayDayShort();
  const siteRows = schedule.filter(r => r['Site'] === selectedSite);

  let html = '';
  DAY_ORDER.forEach(day => {
    const daySupps = siteRows.filter(r => {
      const days = String(r['StocktakeDay'] || '').split(',').map(d => d.trim());
      return days.includes(day);
    });

    const isToday = day === today;

    html += `<div class="day-block">
      <div class="day-hdr">
        <div class="day-dot${isToday ? ' today' : ''}"></div>
        <div class="day-name${isToday ? ' today' : ''}">${isToday ? 'Today · ' + day : day}</div>
      </div>
      <div class="card${isToday ? ' today' : ''}">`;

    if (!daySupps.length) {
      html += `<div class="empty-row">No stocktake</div>`;
    } else {
      daySupps.forEach((r, idx) => {
        const name = r['SupplierName'];
        const count = countMap[name] || 0;
        const color = DOT_COLORS[idx % DOT_COLORS.length];
        const metaParts = [];
        if (r['OrderDay']) metaParts.push(`<span class="order">Order ${r['OrderDay']}</span>`);
        if (r['DeliveryDay']) metaParts.push(`Delivery ${r['DeliveryDay']}`);
        else if (r['LeadTime']) metaParts.push(`Lead ${r['LeadTime']}`);
        html += `<div class="supp-row">
          <div class="supp-dot" style="background:${color}"></div>
          <div class="supp-main">
            <div class="supp-name">${name}</div>
            ${metaParts.length ? `<div class="supp-meta">${metaParts.join(' · ')}</div>` : ''}
          </div>
          <div class="supp-count">${count} item${count !== 1 ? 's' : ''}</div>
        </div>`;
      });
    }

    html += `</div></div>`;
  });

  document.getElementById('body').innerHTML = html;
  document.getElementById('hdr-sub').textContent = `Weekly stocktake schedule · ${selectedSite}`;
}

async function init() {
  let products;
  try {
    [schedule, products] = await Promise.all([fetchSheet('SupplierSchedule'), fetchSheet('Products')]);
  } catch(e) {
    document.getElementById('body').innerHTML = `<div class="state-box">⚠️ Failed to load. Check Sheet sharing settings.</div>`;
    return;
  }

  countMap = {};
  products.forEach(p => {
    const s = p['SupplierName'];
    if (!s) return;
    countMap[s] = (countMap[s] || 0) + 1;
  });

  // Sites derived from SupplierSchedule — no hardcoding
  const sites = [...new Set(schedule.map(r => r['Site']).filter(Boolean))];
  document.getElementById('site-row').innerHTML = sites.map((s, i) =>
    `<button class="site-btn${i === 0 ? ' active' : ''}" onclick="selectSite('${s}',this)">${s}</button>`
  ).join('');

  selectedSite = sites[0] || '';
  render();
}

init();
</script>
</body>
</html>
