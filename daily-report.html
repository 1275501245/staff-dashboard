<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.container { max-width: 680px; margin: 0 auto; padding: 16px 16px 40px; }
.top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
h1 { font-size: 20px; font-weight: 600; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 14px; }
.view-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.view-tabs button, .tabs button { flex: 1; text-align: center; padding: 8px; border-radius: 10px; font-size: 13px; font-weight: 500; border: 1px solid #e0e0e0; background: white; color: #888; cursor: pointer; }
.view-tabs button.active, .tabs button.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.pager { display: flex; align-items: center; gap: 8px; }
.pager button { width: 32px; height: 32px; border-radius: 10px; border: 1px solid #e0e0e0; background: white; color: #1a1a1a; font-size: 15px; cursor: pointer; }
.pager button:disabled { color: #ccc; cursor: default; }
.pager .date-label { font-size: 13px; font-weight: 600; min-width: 96px; text-align: center; }
.tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.totals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.metric { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 12px 14px; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
.metric-value { font-size: 20px; font-weight: 600; }
.metric.sat { border-left: 4px solid #ef6c00; border-radius: 0 16px 16px 0; }
.metric.sat .metric-value { color: #ef6c00; }
.site-card { background: white; border-radius: 16px; border: 1px solid #efefef; margin-bottom: 12px; padding: 14px 16px; }
.site-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.site-name { font-size: 15px; font-weight: 600; }
.site-right { display: flex; align-items: center; gap: 8px; }
.site-sub { font-size: 13px; font-weight: 600; white-space: nowrap; }
.sat-chip { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: #fff3e0; color: #ef6c00; white-space: nowrap; }
.nodata-badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: #f5f5f5; color: #aaa; white-space: nowrap; }
.rev-bar { height: 5px; border-radius: 3px; background: #f0f0f0; margin-top: 9px; overflow: hidden; display: flex; }
.rev-bar .seg-d { background: #00b8a9; height: 100%; }
.rev-bar .seg-h { background: #f5b301; height: 100%; }
.plat-table { border-top: 1px solid #f0f0f0; margin-top: 9px; padding-top: 6px; }
.plat-head { display: flex; justify-content: space-between; font-size: 11px; color: #bbb; padding-bottom: 2px; }
.plat-row { display: flex; justify-content: space-between; font-size: 13px; color: #555; padding: 3px 0; align-items: center; }
.plat-name { display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-d { background: #00b8a9; } .dot-h { background: #f5b301; }
.num { display: inline-block; min-width: 42px; text-align: right; }
.rev { display: inline-block; min-width: 84px; text-align: right; color: #1a1a1a; font-weight: 600; }
.note-line { font-size: 12px; color: #b26a00; margin-top: 7px; }
.loading { text-align: center; padding: 60px; color: #888; }
.sum-controls { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sum-controls label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 4px; }
.sum-controls input, .sum-controls select { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 13px; font-family: inherit; background: white; color: #1a1a1a; }
.sum-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.sum-card { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 14px 16px; border-top: 4px solid #e0e0e0; }
.sum-card.d { border-top-color: #00b8a9; }
.sum-card.h { border-top-color: #f5b301; }
.sum-card.t { border-top-color: #1a1a1a; grid-column: 1 / -1; }
.sum-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.sum-nums { display: flex; justify-content: space-between; align-items: baseline; }
.sum-rev { font-size: 22px; font-weight: 700; }
.sum-ord { font-size: 13px; color: #888; }
.sum-table { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 6px 16px 10px; }
.sum-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; align-items: center; }
.sum-row:last-child { border-bottom: none; }
.sum-row .site { font-weight: 600; }
.sum-row .vals { color: #555; }
.sum-row .vals b { color: #1a1a1a; }
.rank-card { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 6px 16px 8px; margin-bottom: 12px; }
.rank-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f5f5f5; }
.rank-row:last-child { border-bottom: none; }
.rank-num { font-size: 12px; font-weight: 700; color: #bbb; width: 16px; flex-shrink: 0; }
.rank-site { flex: 1; min-width: 0; }
.rank-site .nm { font-size: 14px; font-weight: 600; }
.rank-site .dt { font-size: 11px; color: #bbb; }
.chip { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; white-space: nowrap; }
.g0 { background: #e8f5e9; color: #2e7d32; }
.g1 { background: #f1f8e9; color: #558b2f; }
.g2 { background: #fff3e0; color: #ef6c00; }
.g3 { background: #ffebee; color: #c62828; }
.gx { background: #f5f5f5; color: #aaa; font-weight: 500; }
.chart-card { background: white; border: 1px solid #efefef; border-radius: 16px; padding: 14px 16px 10px; margin-bottom: 12px; }
.chart-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
.chart-title { font-size: 13px; font-weight: 600; }
.chart-unit { font-size: 11px; color: #bbb; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 11px; color: #888; margin: 4px 0 8px; }
.chart-legend span { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.chart-card svg { width: 100%; height: auto; display: block; touch-action: pan-y; }
.chart-empty { font-size: 12px; color: #aaa; padding: 18px 0 12px; text-align: center; }
#chartTip { position: fixed; z-index: 10; background: #1a1a1a; color: white; font-size: 12px; padding: 6px 10px; border-radius: 8px; pointer-events: none; display: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
</style>
</head>
<body>
<div class="container">
  <div class="top-row">
    <h1>Daily Report</h1>
    <div class="pager" id="pagerBox">
      <button id="prevBtn" aria-label="Previous day">&#8249;</button>
      <span class="date-label" id="dateLabel">&ndash;</span>
      <button id="nextBtn" aria-label="Next day">&#8250;</button>
    </div>
  </div>
  <div class="subtitle" id="subtitle">Loading...</div>

  <div class="view-tabs" id="viewTabs">
    <button data-v="daily" class="active">Daily</button>
    <button data-v="summary">&Sigma; Summary</button>
    <button data-v="metrics">Metrics</button>
  </div>

  <div id="dailyView">
    <div class="tabs" id="tabs">
      <button data-p="All" class="active">All</button>
      <button data-p="Deliveroo">Deliveroo</button>
      <button data-p="HungryPanda">HungryPanda</button>
    </div>
    <div class="totals">
      <div class="metric"><div class="metric-label">Orders</div><div class="metric-value" id="totOrders">&ndash;</div></div>
      <div class="metric"><div class="metric-label">Revenue</div><div class="metric-value" id="totRev" style="font-size:17px;">&ndash;</div></div>
      <div class="metric sat"><div class="metric-label">Orders / hr</div><div class="metric-value" id="totSat">&ndash;</div></div>
    </div>
    <div id="content"><div class="loading">Loading...</div></div>
  </div>

  <div id="summaryView" style="display:none;">
    <div class="sum-controls">
      <div><label>From</label><input type="date" id="sumFrom"></div>
      <div><label>To</label><input type="date" id="sumTo"></div>
      <div style="grid-column: 1 / -1;"><label>Site</label>
        <select id="sumSite">
          <option value="All">All sites</option>
          <option>Shoreditch</option>
          <option>Tower Bridge</option>
          <option>Battersea</option>
          <option>Brent Cross</option>
        </select>
      </div>
    </div>
    <div id="sumResult"></div>
  </div>

  <div id="metricsView" style="display:none;">
    <div id="metricsContent"><div class="loading">Loading...</div></div>
  </div>
</div>
<div id="chartTip"></div>
<script>
const SHEET_ID = '189O3dYKEwvR1zMxBs--eVM8VpK_w2AEV6IzUJ-JoAmc';
const DAILY_GID = '1203914948';
const METRICS_GID = '72312209'; // DailyReport_Metrics tab (Deliveroo service metrics)
const SITES_SHEET_ID = '1ZTljEXM9SPKUzy4rIjGSEvEDMH3ctZlVWbU3a0bBV8s';
const SITES = ['Shoreditch', 'Tower Bridge', 'Battersea', 'Brent Cross'];
const PLATFORMS = ['Deliveroo', 'HungryPanda'];
const EXPECTED_HEADERS = ['date', 'site', 'platform', 'orders', 'revenue'];
// Fallback active service hours; overridden by the Sites tab when reachable
let SITE_HOURS = { 'Shoreditch': 13, 'Tower Bridge': 11, 'Battersea': 12, 'Brent Cross': 11 };

let allRows = [];
let dates = [];
let dateIdx = 0;
let platform = 'All';
let view = 'daily';
let metricsRows = null;   // null = not fetched yet
let metricsError = null;
const SITE_COLORS = { 'Shoreditch': '#00b8a9', 'Tower Bridge': '#4a7de0', 'Battersea': '#f5b301', 'Brent Cross': '#e0567a' };

// --- CSV parsing (handles quoted fields) ---
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch !== '\r') field += ch;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${DAILY_GID}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const rows = parseCSV(await res.text());
  if (!rows.length) throw new Error('Empty sheet');
  const headers = rows[0].map(h => String(h).trim().toLowerCase());
  const missing = EXPECTED_HEADERS.filter(h => !headers.includes(h));
  if (missing.length) throw new Error(`Wrong tab (gid ${DAILY_GID}) or headers wrong (missing: ${missing.join(', ')})`);
  const col = name => headers.indexOf(name);
  const [cDate, cSite, cPlat, cOrd, cRev, cNotes] =
    ['date', 'site', 'platform', 'orders', 'revenue', 'notes'].map(col);
  return rows.slice(1).map(r => ({
    date: String(r[cDate] || '').trim(),
    site: String(r[cSite] || '').trim(),
    platform: String(r[cPlat] || '').trim(),
    orders: parseInt(r[cOrd], 10) || 0,
    revenue: parseFloat(String(r[cRev] || '').replace(/[£,]/g, '')) || 0,
    notes: cNotes === -1 ? '' : String(r[cNotes] || '').trim(),
  })).filter(r => /^\d{4}-\d{2}-\d{2}$/.test(r.date) && r.site && r.platform);
}

async function fetchSiteHours() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SITES_SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sites`;
    const text = await (await fetch(url)).text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    json.table.rows.forEach(r => {
      const name = r.c[0]?.v, hrs = parseFloat(r.c[10]?.v);
      if (name && hrs > 0) SITE_HOURS[String(name).trim()] = hrs;
    });
  } catch (e) { /* keep fallback hours */ }
}

// --- Formatting ---
const gbp = n => '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
const satOf = (orders, site) => (orders / (SITE_HOURS[site] || 11));

// --- Service metrics (DailyReport_Metrics tab, Deliveroo only) ---
async function fetchMetrics() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${METRICS_GID}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const rows = parseCSV(await res.text());
  if (!rows.length) throw new Error('Empty sheet');
  const headers = rows[0].map(h => String(h).trim().toLowerCase());
  const missing = ['date', 'site', 'preptime', 'accuracy'].filter(h => !headers.includes(h));
  if (missing.length) throw new Error(`Wrong tab (gid ${METRICS_GID}) or headers wrong (missing: ${missing.join(', ')})`);
  const col = name => headers.indexOf(name);
  const num = v => { const s = String(v ?? '').replace(/[%,]/g, '').trim(); if (s === '') return null; const n = parseFloat(s); return isNaN(n) ? null : n; };
  const [cDate, cSite, cPrep, cAcc, cNotes] =
    ['date', 'site', 'preptime', 'accuracy', 'notes'].map(col);
  const parsed = rows.slice(1).map(r => ({
    date: String(r[cDate] || '').trim(),
    site: String(r[cSite] || '').trim(),
    preptime: num(r[cPrep]),
    accuracy: num(r[cAcc]),
    notes: cNotes === -1 ? '' : String(r[cNotes] || '').trim(),
  })).filter(r => /^\d{4}-\d{2}-\d{2}$/.test(r.date) && r.site);
  const byKey = new Map(); // same site + date entered twice -> last row wins
  parsed.forEach(r => byKey.set(r.site + '|' + r.date, r));
  return [...byKey.values()].sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
}

// Grading: index 0=Excellent 1=Good 2=Fair 3=Poor (lower value is better for both metrics)
const GRADES = ['Excellent', 'Good', 'Fair', 'Poor'];
const PREP_T = [14, 16, 18];   // minutes
const ACC_T = [2.8, 4, 6];     // inaccuracy %
const gradeOf = (v, T) => v < T[0] ? 0 : v < T[1] ? 1 : v < T[2] ? 2 : 3;
const BAND_FILL = ['rgba(76,175,80,0.10)', 'rgba(139,195,74,0.09)', 'rgba(255,167,38,0.10)', 'rgba(239,83,80,0.09)'];
const BAND_TEXT = ['#2e7d32', '#558b2f', '#ef6c00', '#c62828'];

// Latest reading per site, ranked best -> worst
function buildRanking(rows) {
  const latest = SITES.map(s => {
    const rs = rows.filter(r => r.site === s && (r.preptime != null || r.accuracy != null));
    return { site: s, row: rs.length ? rs[rs.length - 1] : null };
  });
  const score = e => {
    if (!e.row) return -1;
    let sc = 0, n = 0;
    if (e.row.preptime != null) { sc += 3 - gradeOf(e.row.preptime, PREP_T); n++; }
    if (e.row.accuracy != null) { sc += 3 - gradeOf(e.row.accuracy, ACC_T); n++; }
    return n ? sc / n : -1;
  };
  latest.sort((a, b) => {
    const d = score(b) - score(a);
    if (d) return d;
    const av = a.row?.accuracy ?? Infinity, bv = b.row?.accuracy ?? Infinity;
    if (av !== bv) return av - bv;
    return (a.row?.preptime ?? Infinity) - (b.row?.preptime ?? Infinity);
  });
  const fmtD = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  const chip = (v, T, unit) => {
    if (v == null) return `<span class="chip gx">\u2013</span>`;
    const g = gradeOf(v, T);
    return `<span class="chip g${g}">${v.toLocaleString('en-GB', { maximumFractionDigits: 1 })}${unit} \u00b7 ${GRADES[g]}</span>`;
  };
  return `<div class="rank-card">` + latest.map((e, i) => `
    <div class="rank-row">
      <span class="rank-num">${e.row ? i + 1 : '\u2013'}</span>
      <span class="rank-site">
        <span class="nm"><span class="dot" style="background:${SITE_COLORS[e.site]};margin-right:6px;"></span>${e.site}</span>
        ${e.row ? `<span class="dt"> \u00b7 ${fmtD(e.row.date)}</span>` : ''}
      </span>
      ${e.row ? chip(e.row.preptime, PREP_T, ' min') + chip(e.row.accuracy, ACC_T, '%') : '<span class="chip gx">No data</span>'}
    </div>`).join('') + `</div>`;
}

// Line chart with grade bands in the background; all sites, one metric
function buildBandChart(rows, key, opts) {
  const series = SITES.map(s => ({
    site: s,
    pts: rows.filter(r => r.site === s && r[key] != null).map(r => ({ d: r.date, v: r[key] })),
  })).filter(sr => sr.pts.length);

  const head = `<div class="chart-head"><span class="chart-title">${opts.title}</span><span class="chart-unit">${opts.unit}</span></div>`;
  if (!series.length) return `<div class="chart-card">${head}<div class="chart-empty">No data yet</div></div>`;

  const allPts = series.flatMap(sr => sr.pts);
  const ts = d => new Date(d + 'T00:00:00').getTime();
  const dayList = [...new Set(allPts.map(p => p.d))].sort();
  const t0 = ts(dayList[0]), t1 = ts(dayList[dayList.length - 1]);

  // Domain: data range extended to the nearest grade boundary on each side, so the
  // relevant band edges are always visible for context.
  const T = opts.thresholds;
  let dMin = Math.min(...allPts.map(p => p.v)), dMax = Math.max(...allPts.map(p => p.v));
  const below = T.filter(t => t <= dMin), above = T.filter(t => t >= dMax);
  let lo = below.length ? below[below.length - 1] : dMin;
  let hi = above.length ? above[0] : dMax;
  let pad = Math.max((hi - lo) * 0.12, 0.4);
  lo -= pad; hi += pad;
  lo = Math.max(lo, 0);

  const W = 640, H = 250, mL = 44, mR = 76, mT = 12, mB = 28;
  const x = d => t1 === t0 ? mL + (W - mL - mR) / 2 : mL + (ts(d) - t0) / (t1 - t0) * (W - mL - mR);
  const y = v => mT + (1 - (v - lo) / (hi - lo)) * (H - mT - mB);
  const fmt1 = v => v.toLocaleString('en-GB', { maximumFractionDigits: opts.dec });
  const fmtD = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${opts.title} trend">`;
  // grade bands (value axis is "lower is better": band 0 sits at the bottom)
  const edges = [lo, ...T.filter(t => t > lo && t < hi), hi];
  const zoneAt = v => gradeOf(v + 1e-9, T);
  for (let i = 0; i < edges.length - 1; i++) {
    const zi = zoneAt(edges[i]);
    const yTop = y(edges[i + 1]), yBot = y(edges[i]);
    svg += `<rect x="${mL}" y="${yTop.toFixed(1)}" width="${W - mL - mR}" height="${(yBot - yTop).toFixed(1)}" fill="${BAND_FILL[zi]}"/>`;
    if (yBot - yTop >= 15) {
      svg += `<text x="${W - mR + 8}" y="${((yTop + yBot) / 2 + 3.5).toFixed(1)}" text-anchor="start" font-size="10.5" font-weight="600" fill="${BAND_TEXT[zi]}">${GRADES[zi]}</text>`;
    }
  }
  // boundary lines + y labels at grade edges and domain ends
  edges.forEach(v => {
    const yy = y(v);
    svg += `<line x1="${mL}" y1="${yy.toFixed(1)}" x2="${W - mR}" y2="${yy.toFixed(1)}" stroke="#eaeaea" stroke-width="1"/>`;
    svg += `<text x="${mL - 8}" y="${(yy + 3.5).toFixed(1)}" text-anchor="end" font-size="10.5" fill="#bbb">${fmt1(v)}</text>`;
  });
  // x tick labels
  const step = Math.max(1, Math.ceil(dayList.length / 6));
  dayList.forEach((d, i) => {
    if (i % step !== 0 && i !== dayList.length - 1) return;
    svg += `<text x="${x(d).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="10.5" fill="#bbb">${fmtD(d)}</text>`;
  });
  // site lines + points (+ value labels while data is sparse)
  const showLabels = allPts.length <= 14;
  series.forEach(sr => {
    const c = SITE_COLORS[sr.site] || '#888';
    if (sr.pts.length > 1) {
      const path = sr.pts.map(p => `${x(p.d).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
      svg += `<polyline points="${path}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    sr.pts.forEach(p => {
      const px = x(p.d).toFixed(1), py = y(p.v).toFixed(1);
      svg += `<circle cx="${px}" cy="${py}" r="3.5" fill="${c}" stroke="white" stroke-width="1.5"/>`;
      if (showLabels) svg += `<text x="${px}" y="${(parseFloat(py) - 9).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="600" fill="${c}">${fmt1(p.v)}</text>`;
      svg += `<circle cx="${px}" cy="${py}" r="12" fill="transparent" class="hit" data-tip="${sr.site} \u00b7 ${fmtD(p.d)} \u00b7 ${fmt1(p.v)}${opts.tipUnit}"/>`;
    });
  });
  svg += `</svg>`;

  const legend = `<div class="chart-legend">` + series.map(sr =>
    `<span><span class="dot" style="background:${SITE_COLORS[sr.site]}"></span>${sr.site}</span>`).join('') + `</div>`;
  return `<div class="chart-card">${head}${legend}${svg}</div>`;
}

function renderMetrics() {
  const box = document.getElementById('metricsContent');
  if (metricsError) { box.innerHTML = `<div class="loading" style="color:#c62828;">Failed: ${metricsError}</div>`; return; }
  if (metricsRows === null) { box.innerHTML = '<div class="loading">Loading...</div>'; return; }
  if (!metricsRows.length) { box.innerHTML = '<div class="loading">No data yet \u2014 add rows to the DailyReport_Metrics tab.</div>'; return; }
  box.innerHTML =
    buildRanking(metricsRows) +
    buildBandChart(metricsRows, 'preptime', { title: 'Prep time', unit: 'Deliveroo \u00b7 minutes \u00b7 lower is better', thresholds: PREP_T, tipUnit: ' min', dec: 1 }) +
    buildBandChart(metricsRows, 'accuracy', { title: 'Inaccuracy', unit: 'Deliveroo \u00b7 % \u00b7 lower is better', thresholds: ACC_T, tipUnit: '%', dec: 1 });
}

async function loadMetrics() {
  try { metricsRows = await fetchMetrics(); }
  catch (e) { metricsError = e.message; }
  if (view === 'metrics') renderMetrics();
}

// Tooltip on chart points (tap or hover)
const tip = document.getElementById('chartTip');
function showTip(target, cx, cy) {
  tip.textContent = target.dataset.tip;
  tip.style.display = 'block';
  const r = tip.getBoundingClientRect();
  let left = cx - r.width / 2;
  left = Math.max(6, Math.min(left, window.innerWidth - r.width - 6));
  tip.style.left = left + 'px';
  tip.style.top = Math.max(6, cy - r.height - 12) + 'px';
}
document.addEventListener('pointerover', e => {
  if (e.target.classList && e.target.classList.contains('hit')) {
    const b = e.target.getBoundingClientRect();
    showTip(e.target, b.left + b.width / 2, b.top);
  } else if (!tip.contains(e.target)) tip.style.display = 'none';
});
document.addEventListener('pointerdown', e => {
  if (e.target.classList && e.target.classList.contains('hit')) {
    const b = e.target.getBoundingClientRect();
    showTip(e.target, b.left + b.width / 2, b.top);
  } else tip.style.display = 'none';
});

// --- Daily view ---
function renderDaily() {
  const day = dates[dateIdx];
  document.getElementById('dateLabel').textContent = day ? fmtDate(day) : '\u2013';
  document.getElementById('prevBtn').disabled = dateIdx <= 0;
  document.getElementById('nextBtn').disabled = dateIdx >= dates.length - 1;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.p === platform));

  const dayRows = allRows.filter(r => r.date === day);
  let totO = 0, totR = 0, totHrs = 0;

  const html = SITES.map(site => {
    const siteRows = dayRows.filter(r => r.site === site);
    if (!siteRows.length) {
      return `<div class="site-card"><div class="site-header">
        <span class="site-name">${site}</span>
        <span class="nodata-badge">No data</span>
      </div></div>`;
    }
    const shown = siteRows.filter(r => platform === 'All' || r.platform === platform);
    const sO = shown.reduce((a, r) => a + r.orders, 0);
    const sR = shown.reduce((a, r) => a + r.revenue, 0);
    totO += sO; totR += sR; totHrs += (SITE_HOURS[site] || 11);
    const sat = satOf(sO, site);

    const dRev = shown.filter(r => r.platform === 'Deliveroo').reduce((a, r) => a + r.revenue, 0);
    const hRev = shown.filter(r => r.platform === 'HungryPanda').reduce((a, r) => a + r.revenue, 0);
    const dPct = sR > 0 ? (dRev / sR * 100) : 0;

    const rowsHtml = PLATFORMS
      .filter(p => platform === 'All' || p === platform)
      .map(p => {
        const r = siteRows.find(x => x.platform === p);
        const cls = p === 'Deliveroo' ? 'dot-d' : 'dot-h';
        return `<div class="plat-row">
          <span class="plat-name"><span class="dot ${cls}"></span>${p}</span>
          <span><span class="num">${r ? r.orders : '\u2014'}</span><span class="rev">${r ? gbp(r.revenue) : '\u2014'}</span></span>
        </div>`;
      }).join('');

    const notes = [...new Set(siteRows.filter(r => r.notes).map(r => `${r.platform}: ${r.notes}`))];
    const notesHtml = notes.length ? `<div class="note-line">&#9888; ${notes.join(' \u00b7 ')}</div>` : '';

    return `<div class="site-card">
      <div class="site-header">
        <span class="site-name">${site}</span>
        <span class="site-right">
          <span class="sat-chip">${sat.toFixed(1)} /h</span>
          <span class="site-sub">${sO} \u00b7 ${gbp(sR)}</span>
        </span>
      </div>
      <div class="rev-bar" title="Deliveroo vs HungryPanda revenue split">
        <span class="seg-d" style="width:${dPct.toFixed(1)}%"></span>
        <span class="seg-h" style="width:${(100 - dPct).toFixed(1)}%"></span>
      </div>
      <div class="plat-table">
        <div class="plat-head"><span>Platform</span><span><span class="num">Orders</span><span class="rev" style="font-weight:400;color:#bbb;">Revenue</span></span></div>
        ${rowsHtml}
      </div>
      ${notesHtml}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = html;
  document.getElementById('totOrders').textContent = totO;
  document.getElementById('totRev').textContent = gbp(totR);
  document.getElementById('totSat').textContent = totHrs > 0 ? (totO / totHrs).toFixed(1) : '\u2013';
}

// --- Summary view ---
function renderSummary() {
  const from = document.getElementById('sumFrom').value;
  const to = document.getElementById('sumTo').value;
  const site = document.getElementById('sumSite').value;
  const box = document.getElementById('sumResult');
  if (!from || !to) { box.innerHTML = '<div class="loading">Pick a date range.</div>'; return; }
  if (from > to) { box.innerHTML = '<div class="loading">"From" is after "To".</div>'; return; }

  const rows = allRows.filter(r => r.date >= from && r.date <= to && (site === 'All' || r.site === site));
  if (!rows.length) { box.innerHTML = '<div class="loading">No data in this range.</div>'; return; }

  const agg = p => {
    const rs = rows.filter(r => r.platform === p);
    return { o: rs.reduce((a, r) => a + r.orders, 0), v: rs.reduce((a, r) => a + r.revenue, 0) };
  };
  const d = agg('Deliveroo'), h = agg('HungryPanda');
  const days = [...new Set(rows.map(r => r.date))].length;

  let html = `<div class="sum-cards">
    <div class="sum-card d"><div class="sum-title"><span class="dot dot-d"></span>Deliveroo</div>
      <div class="sum-nums"><span class="sum-rev">${gbp(d.v)}</span><span class="sum-ord">${d.o} orders</span></div></div>
    <div class="sum-card h"><div class="sum-title"><span class="dot dot-h"></span>HungryPanda</div>
      <div class="sum-nums"><span class="sum-rev">${gbp(h.v)}</span><span class="sum-ord">${h.o} orders</span></div></div>
    <div class="sum-card t"><div class="sum-title">Total \u00b7 ${site === 'All' ? 'All sites' : site} \u00b7 ${days} day${days > 1 ? 's' : ''}</div>
      <div class="sum-nums"><span class="sum-rev">${gbp(d.v + h.v)}</span><span class="sum-ord">${d.o + h.o} orders</span></div></div>
  </div>`;

  if (site === 'All') {
    const perSite = SITES.map(s => {
      const rs = rows.filter(r => r.site === s);
      return { s, o: rs.reduce((a, r) => a + r.orders, 0), v: rs.reduce((a, r) => a + r.revenue, 0) };
    }).filter(x => x.o > 0 || x.v > 0);
    if (perSite.length) {
      html += `<div class="sum-table">` + perSite.map(x =>
        `<div class="sum-row"><span class="site">${x.s}</span><span class="vals">${x.o} orders \u00b7 <b>${gbp(x.v)}</b></span></div>`
      ).join('') + `</div>`;
    }
  }
  box.innerHTML = html;
}

// --- View switching & events ---
function setView(v) {
  view = v;
  document.querySelectorAll('#viewTabs button').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  document.getElementById('dailyView').style.display = v === 'daily' ? '' : 'none';
  document.getElementById('summaryView').style.display = v === 'summary' ? '' : 'none';
  document.getElementById('metricsView').style.display = v === 'metrics' ? '' : 'none';
  document.getElementById('pagerBox').style.visibility = v === 'daily' ? 'visible' : 'hidden';
  if (v === 'summary') renderSummary();
  if (v === 'metrics') {
    renderMetrics();
    if (metricsRows === null && !metricsError) loadMetrics(); // lazy fetch on first open
  }
}

document.getElementById('prevBtn').onclick = () => { if (dateIdx > 0) { dateIdx--; renderDaily(); } };
document.getElementById('nextBtn').onclick = () => { if (dateIdx < dates.length - 1) { dateIdx++; renderDaily(); } };
document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => { platform = b.dataset.p; renderDaily(); });
document.querySelectorAll('#viewTabs button').forEach(b => b.onclick = () => setView(b.dataset.v));
['sumFrom', 'sumTo', 'sumSite'].forEach(id => document.getElementById(id).onchange = renderSummary);

async function init() {
  try {
    const [rows] = await Promise.all([fetchData(), fetchSiteHours()]);
    allRows = rows;
    dates = [...new Set(allRows.map(r => r.date))].sort();
    document.getElementById('subtitle').textContent = `Last updated: ${new Date().toLocaleString('en-GB')}`;
    if (!dates.length) {
      document.getElementById('content').innerHTML = '<div class="loading">No data yet \u2014 add rows to the DailyReport tab.</div>';
      return;
    }
    const y = new Date(); y.setDate(y.getDate() - 1);
    const yi = dates.indexOf(y.toISOString().slice(0, 10));
    dateIdx = yi !== -1 ? yi : dates.length - 1;
    document.getElementById('sumFrom').value = dates[0];
    document.getElementById('sumTo').value = dates[dates.length - 1];
    renderDaily();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:#c62828;">Failed: ${e.message}</div>`;
  }
}
init();
</script>
